<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>女性抗衰门诊 - 评估系统</title>
  <style>
/* 女性抗衰门诊H5量表评估系统 - 样式文件 */

:root {
  --color-primary: #7B68AE;
  --color-primary-light: #9B8DC4;
  --color-primary-dark: #5A4D7A;
  --color-bg: #F8F6FA;
  --color-white: #FFFFFF;
  --color-text: #333333;
  --color-text-secondary: #666666;
  --color-border: #E8E0F0;
  --color-green: #27AE60;
  --color-yellow: #F39C12;
  --color-orange: #E67E22;
  --color-red: #E74C3C;
  --color-darkred: #C0392B;
  --color-gray: #95A5A6;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(123, 104, 174, 0.1);
  --font-size-base: 16px;
  --font-size-lg: 18px;
  --font-size-xl: 22px;
  --font-size-xxl: 28px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-size-base);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
  max-width: 100vw;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== 页面容器 ========== */
.page {
  display: none;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 100px;
}

.page.active {
  display: block;
}

/* ========== 首页 ========== */
.home-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  text-align: center;
}

.welcome-text {
  font-size: var(--font-size-xxl);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1.4;
  margin-bottom: 32px;
}

.welcome-info {
  font-size: var(--font-size-xl);
  color: var(--color-text);
  margin-bottom: 24px;
}

.home-logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
  border-radius: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: white;
}

/* ========== 按钮 ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 10px;
  font-size: var(--font-size-base);
  font-weight: 600;
  padding: 12px 32px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  line-height: 1.4;
}

.btn:active {
  transform: scale(0.97);
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
  color: white;
}

.btn-secondary {
  background: var(--color-white);
  color: var(--color-primary);
  border: 1px solid var(--color-primary);
}

.btn-outline {
  background: transparent;
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}

.btn-lg {
  padding: 14px 48px;
  font-size: var(--font-size-lg);
  border-radius: 12px;
}

.btn-sm {
  padding: 8px 16px;
  font-size: 14px;
}

.btn-block {
  width: 100%;
  margin-bottom: 10px;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-back {
  background: none;
  border: none;
  color: var(--color-primary);
  font-size: var(--font-size-base);
  padding: 8px 0;
  cursor: pointer;
  font-weight: 600;
}

/* ========== 表单 ========== */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: var(--font-size-base);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--color-border);
  border-radius: 10px;
  font-size: var(--font-size-lg);
  color: var(--color-text);
  background: var(--color-white);
  transition: border-color 0.2s;
  outline: none;
}

.form-input:focus {
  border-color: var(--color-primary);
}

.form-input::placeholder {
  color: var(--color-gray);
}

.input-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-unit {
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

/* ========== 量表列表 ========== */
.scale-categories {
  padding: 8px 0;
}

.category-section {
  margin-bottom: 24px;
}

.category-title {
  font-size: var(--font-size-lg);
  font-weight: 700;
  color: var(--color-primary-dark);
  padding: 8px 0;
  margin-bottom: 8px;
  border-bottom: 2px solid var(--color-border);
}

.scale-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.scale-card {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  border-left: 4px solid var(--color-primary-light);
}

.scale-card:active {
  transform: scale(0.98);
}

.scale-card.completed {
  border-left-color: var(--color-green);
  background: linear-gradient(135deg, #f0faf4, var(--color-white));
}

.scale-card-name {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 4px;
}

.scale-card-desc {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.4;
  margin-bottom: 8px;
}

.scale-card-status {
  font-size: 13px;
  color: var(--color-green);
  font-weight: 500;
}

.scale-card-status.pending {
  color: var(--color-gray);
}

.scale-card-count {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 12px;
  color: var(--color-gray);
  background: var(--color-bg);
  padding: 2px 8px;
  border-radius: 10px;
}

/* ========== 量表填写 ========== */
.fill-header {
  margin-bottom: 16px;
}

.fill-header h2 {
  font-size: var(--font-size-xl);
  color: var(--color-primary-dark);
  margin: 8px 0;
}

.fill-desc {
  font-size: 14px;
  color: var(--color-text-secondary);
}

.progress-bar-container {
  position: relative;
  height: 28px;
  background: var(--color-border);
  border-radius: 14px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
  border-radius: 14px;
  transition: width 0.3s;
}

.progress-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
}

.question-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.question-item {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  border-left: 4px solid var(--color-border);
}

.question-item.answered {
  border-left-color: var(--color-primary);
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--color-primary);
  color: white;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
}

.question-text {
  font-size: var(--font-size-base);
  font-weight: 500;
  color: var(--color-text);
  line-height: 1.5;
  margin-bottom: 12px;
}

.question-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option-label {
  display: flex;
  align-items: flex-start;
  padding: 12px 14px;
  border: 2px solid var(--color-border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  gap: 10px;
}

.option-label:active {
  background: #f5f0fa;
}

.option-label.selected {
  border-color: var(--color-primary);
  background: linear-gradient(135deg, #f5f0fa, var(--color-white));
}

.option-label input[type="radio"] {
  display: none;
}

.option-radio {
  width: 22px;
  height: 22px;
  min-width: 22px;
  border: 2px solid var(--color-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}

.option-label.selected .option-radio {
  border-color: var(--color-primary);
  background: var(--color-primary);
}

.option-label.selected .option-radio::after {
  content: '';
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
}

.option-text {
  font-size: var(--font-size-base);
  color: var(--color-text);
  line-height: 1.5;
}

.fill-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  background: var(--color-white);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  z-index: 100;
}

/* ========== 结果展示 ========== */
.result-header {
  text-align: center;
  margin-bottom: 16px;
}

.result-header h2 {
  font-size: var(--font-size-xl);
  color: var(--color-primary-dark);
}

.result-date {
  font-size: 14px;
  color: var(--color-gray);
}

.result-score-card {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.result-score {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 8px;
}

.result-score.green { color: var(--color-green); }
.result-score.yellow { color: var(--color-yellow); }
.result-score.orange { color: var(--color-orange); }
.result-score.red { color: var(--color-red); }
.result-score.darkred { color: var(--color-darkred); }

.result-level {
  font-size: var(--font-size-lg);
  font-weight: 600;
}

.result-sub-card {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
}

.result-sub-card h3 {
  font-size: 15px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}

.result-sub-score {
  font-size: 24px;
  font-weight: 700;
}

.result-subscales {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.result-subscales h3 {
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  margin-bottom: 12px;
}

.result-sub-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--color-border);
  font-size: var(--font-size-base);
}

.result-sub-item:last-child {
  border-bottom: none;
}

.result-constitution {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.result-constitution h3 {
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  margin-bottom: 12px;
}

.result-main-constitution {
  font-size: var(--font-size-xl);
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 8px;
  text-align: center;
}

.result-tendency {
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  text-align: center;
  margin-bottom: 16px;
}

.constitution-bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.const-bar-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.const-name {
  width: 60px;
  font-size: 13px;
  text-align: right;
  color: var(--color-text-secondary);
}

.const-bar-bg {
  flex: 1;
  height: 16px;
  background: var(--color-border);
  border-radius: 8px;
  overflow: hidden;
}

.const-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s;
}

.const-score {
  width: 30px;
  font-size: 13px;
  font-weight: 600;
  text-align: left;
}

.result-advice {
  background: linear-gradient(135deg, #f5f0fa, #fff5f0);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  font-size: var(--font-size-base);
  line-height: 1.6;
  color: var(--color-text);
  border-left: 4px solid var(--color-primary);
}

.result-actions {
  margin-top: 24px;
}

/* ========== 历史记录 ========== */
.history-list {
  margin-top: 8px;
}

.history-date {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-gray);
  padding: 8px 0 4px;
}

.history-item {
  background: var(--color-white);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.history-item:active {
  transform: scale(0.98);
}

.history-item-name {
  font-size: var(--font-size-base);
  font-weight: 500;
  flex: 1;
}

.history-item-score {
  font-size: var(--font-size-base);
  font-weight: 700;
  margin: 0 12px;
}

.history-item-level {
  font-size: 13px;
  color: var(--color-text-secondary);
}

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-gray);
}

.empty-state p {
  font-size: var(--font-size-lg);
  margin-bottom: 20px;
}

/* ========== 后台管理页样式 ========== */
.admin-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 2px solid var(--color-border);
  margin-bottom: 24px;
}

.admin-header h1 {
  font-size: var(--font-size-xl);
  color: var(--color-primary-dark);
}

.admin-nav {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}

.admin-nav .btn {
  padding: 8px 20px;
}

.admin-nav .btn.active {
  background: var(--color-primary);
  color: white;
}

.admin-login {
  max-width: 400px;
  margin: 60px auto;
  background: var(--color-white);
  padding: 40px 32px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.admin-login h2 {
  text-align: center;
  margin-bottom: 24px;
  color: var(--color-primary-dark);
}

.patient-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--color-white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  font-size: 14px;
}

.patient-table th {
  background: var(--color-primary);
  color: white;
  padding: 12px 10px;
  text-align: left;
  font-weight: 600;
  white-space: nowrap;
}

.patient-table td {
  padding: 10px;
  border-bottom: 1px solid var(--color-border);
}

.patient-table tr:last-child td {
  border-bottom: none;
}

.patient-table tr:hover td {
  background: #f5f0fa;
}

.patient-table .score-cell {
  font-weight: 600;
  white-space: nowrap;
}

.scale-config-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.scale-config-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--color-white);
  border-radius: 10px;
  box-shadow: var(--shadow);
}

.scale-config-item label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: var(--font-size-base);
}

.scale-config-item input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: var(--color-primary);
}

.admin-detail-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.admin-detail-content {
  background: var(--color-white);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}

.admin-detail-content h3 {
  margin-bottom: 16px;
  color: var(--color-primary-dark);
}

.detail-record {
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}

.detail-record-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-weight: 600;
}

.detail-record-body {
  font-size: 14px;
  color: var(--color-text-secondary);
}

.detail-record-body .qna {
  padding: 4px 0;
  border-bottom: 1px dashed var(--color-border);
}

.detail-record-body .qna:last-child {
  border-bottom: none;
}

/* ========== 响应式 ========== */
@media (min-width: 768px) {
  body {
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.08);
  }
  
  .admin-container {
    max-width: 100%;
  }
  
  .patient-table {
    font-size: 14px;
  }
}

/* ========== 微信兼容 ========== */
@media (prefers-color-scheme: dark) {
  :root {
    --color-bg: #1a1a2e;
    --color-white: #16213e;
    --color-text: #e0e0e0;
    --color-text-secondary: #a0a0a0;
    --color-border: #2a2a4a;
  }
}

/* 滚动条美化 */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-thumb {
  background: var(--color-primary-light);
  border-radius: 2px;
}

  <!-- ===== 共享数据：存储管理 ===== -->
  <script>
// 数据存储模块 - 使用localStorage + 导出功能

const StorageManager = {
  // 键名前缀
  PREFIX: 'ksmz_',
  
  // 获取患者列表
  getPatients() {
    const data = localStorage.getItem(this.PREFIX + 'patients');
    return data ? JSON.parse(data) : [];
  },
  
  // 保存患者列表
  savePatients(patients) {
    localStorage.setItem(this.PREFIX + 'patients', JSON.stringify(patients));
  },
  
  // 添加或更新患者
  savePatient(patient) {
    const patients = this.getPatients();
    const idx = patients.findIndex(p => p.phone === patient.phone && p.name === patient.name);
    if (idx >= 0) {
      // 合并量表记录
      if (patient.records) {
        patients[idx].records = patients[idx].records || [];
        patient.records.forEach(record => {
          // 同一量表同一天不重复
          const existIdx = patients[idx].records.findIndex(r => 
            r.scaleId === record.scaleId && r.date === record.date
          );
          if (existIdx >= 0) {
            patients[idx].records[existIdx] = record;
          } else {
            patients[idx].records.push(record);
          }
        });
      }
      patients[idx].lastVisit = new Date().toISOString();
    } else {
      patient.createTime = new Date().toISOString();
      patient.lastVisit = new Date().toISOString();
      patient.records = patient.records || [];
      patients.push(patient);
    }
    this.savePatients(patients);
    return patient;
  },
  
  // 获取单个患者
  getPatient(name, phone) {
    const patients = this.getPatients();
    return patients.find(p => p.name === name && p.phone === phone);
  },
  
  // 保存量表记录
  saveRecord(name, phone, record) {
    const patients = this.getPatients();
    const patient = patients.find(p => p.name === name && p.phone === phone);
    if (!patient) {
      // 新建患者
      this.savePatient({ name, phone, records: [record] });
    } else {
      if (!patient.records) patient.records = [];
      const existIdx = patient.records.findIndex(r => 
        r.scaleId === record.scaleId && r.date === record.date
      );
      if (existIdx >= 0) {
        patient.records[existIdx] = record;
      } else {
        patient.records.push(record);
      }
      patient.lastVisit = new Date().toISOString();
      this.savePatients(patients);
    }
  },
  // 获取医生配置的量表组合
  getScaleConfig() {
    const data = localStorage.getItem(this.PREFIX + 'scaleConfig');
    return data ? JSON.parse(data) : { enabledScales: SCALES.map(s => s.id) };
  },
  
  // 保存量表配置
  saveScaleConfig(config) {
    localStorage.setItem(this.PREFIX + 'scaleConfig', JSON.stringify(config));
  },
  
  // 导出CSV
  exportCSV() {
    const patients = this.getPatients();
    if (patients.length === 0) {
      alert('暂无数据可导出');
      return;
    }
    
    // 收集所有量表ID
    const scaleIds = new Set();
    patients.forEach(p => {
      if (p.records) {
        p.records.forEach(r => scaleIds.add(r.scaleId));
      }
    });
    
    // 构建表头
    let headers = ['姓名', '手机号', '填写日期'];
    const scaleMap = {};
    SCALES.forEach(s => scaleMap[s.id] = s.name);
    Array.from(scaleIds).sort().forEach(id => {
      headers.push(scaleMap[id] || id);
    });
    
    // 构建数据行 - 按日期分组
    let rows = [];
    patients.forEach(p => {
      if (!p.records || p.records.length === 0) {
        rows.push([p.name, p.phone, '-', ...Array.from(scaleIds).map(() => '')]);
        return;
      }
      // 按日期分组
      const dateGroups = {};
      p.records.forEach(r => {
        if (!dateGroups[r.date]) dateGroups[r.date] = {};
        dateGroups[r.date][r.scaleId] = r.scoreDisplay || r.totalScore;
      });
      
      Object.keys(dateGroups).sort().forEach(date => {
        let row = [p.name, p.phone, date];
        Array.from(scaleIds).sort().forEach(id => {
          row.push(dateGroups[date][id] !== undefined ? dateGroups[date][id] : '');
        });
        rows.push(row);
      });
    });
    
    // 生成CSV
    let csv = '\uFEFF'; // BOM for Excel
    csv += headers.join(',') + '\n';
    rows.forEach(row => {
      csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
    });
    
    // 下载
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `抗衰门诊量表数据_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  },
  
  // 导出详细数据JSON
  exportJSON() {
    const patients = this.getPatients();
    const blob = new Blob([JSON.stringify(patients, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `抗衰门诊量表详细数据_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  },
  
  // 清除所有数据（管理员操作）
  clearAllData() {
    if (confirm('确定要清除所有数据吗？此操作不可恢复！')) {
      localStorage.removeItem(this.PREFIX + 'patients');
      localStorage.removeItem(this.PREFIX + 'scaleConfig');
      return true;
    }
    return false;
  }
};
  </script>

  <script>
// 主应用逻辑 - 女性抗衰门诊H5量表评估系统


const App = {
  currentPatient: null,
  currentScale: null,
  currentAnswers: {},
  
  // 初始化
  init() {
    this.showPage('home');
  },
  
  // ========== 页面路由 ==========
  showPage(page, data) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('active'));
    
    const target = document.getElementById('page-' + page);
    if (target) {
      target.classList.add('active');
      window.scrollTo(0, 0);
    }
    
    switch(page) {
      case 'home': this.renderHome(); break;
      case 'login': this.renderLogin(); break;
      case 'scaleList': this.renderScaleList(); break;
      case 'scaleFill': this.renderScaleFill(data); break;
      case 'scaleResult': this.renderScaleResult(data); break;
      case 'history': this.renderHistory(); break;
    }
  },
  
  // ========== 首页 ==========
  renderHome() {
    const patient = this.currentPatient;
    if (patient) {
      document.getElementById('home-welcome').innerHTML = 
        `<div class="welcome-info">您好，<strong>${patient.name}</strong></div>`;
      document.getElementById('home-actions').innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="App.showPage('scaleList')">开始评估</button>
        <button class="btn btn-secondary btn-lg" onclick="App.showPage('history')">查看记录</button>
        <button class="btn btn-outline btn-sm" onclick="App.logout()" style="margin-top:20px;">切换用户</button>
      `;
    } else {
      document.getElementById('home-welcome').innerHTML = 
        '<div class="welcome-text">女性抗衰门诊<br/>量表评估系统</div>';
      document.getElementById('home-actions').innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="App.showPage('login')">开始评估</button>
      `;
    }
  },
  
  // ========== 登录页 ==========
  renderLogin() {
    document.getElementById('login-form').innerHTML = `
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="input-name" placeholder="请输入您的姓名" class="form-input" />
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="input-phone" placeholder="请输入手机号" maxlength="11" class="form-input" />
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="App.doLogin()">确认登录</button>
      <button class="btn btn-outline btn-sm" onclick="App.showPage('home')" style="margin-top:12px;">返回首页</button>
    `;
  },
  
  doLogin() {
    const name = document.getElementById('input-name').value.trim();
    const phone = document.getElementById('input-phone').value.trim();
    
    if (!name) { alert('请输入姓名'); return; }
    if (!phone || phone.length < 11) { alert('请输入正确的手机号'); return; }
    
    this.currentPatient = StorageManager.getPatient(name, phone) || { name, phone, records: [] };
    this.showPage('scaleList');
  },
  
  logout() {
    this.currentPatient = null;
    this.showPage('home');
  },
  
  // ========== 量表列表 ==========
  renderScaleList() {
    const config = StorageManager.getScaleConfig();
    const enabledIds = config.enabledScales || SCALES.map(s => s.id);
    const categories = {};
    const completedIds = new Set();
    
    // 检查已完成的量表
    if (this.currentPatient && this.currentPatient.records) {
      this.currentPatient.records.forEach(r => completedIds.add(r.scaleId));
    }
    
    // 按分类组织
    SCALES.forEach(scale => {
      if (!enabledIds.includes(scale.id)) return;
      if (!categories[scale.category]) categories[scale.category] = [];
      categories[scale.category].push(scale);
    });
    
    let html = '<div class="scale-categories">';
    const categoryOrder = ['认知评估', '情绪评估', '更年期评估', '睡眠评估', '营养评估', '骨骼评估', '盆底评估', '运动评估', '待补充'];
    
    categoryOrder.forEach(cat => {
      if (!categories[cat]) return;
      html += `
        <div class="category-section">
          <div class="category-title">${CATEGORY_NAMES[cat] || cat}</div>
          <div class="scale-cards">
      `;
      
      categories[cat].forEach(scale => {
        const completed = completedIds.has(scale.id);
        const lastRecord = this.currentPatient && this.currentPatient.records ? 
          this.currentPatient.records.filter(r => r.scaleId === scale.id).pop() : null;
        
        html += `
          <div class="scale-card ${completed ? 'completed' : ''}" onclick="App.showPage('scaleFill', '${scale.id}')">
            <div class="scale-card-name">${scale.name}</div>
            <div class="scale-card-desc">${scale.description.substring(0, 40)}...</div>
            ${completed ? `<div class="scale-card-status">已评估 · ${lastRecord ? lastRecord.scoreDisplay : ''}</div>` : 
              '<div class="scale-card-status pending">待评估</div>'}
            <div class="scale-card-count">${scale.questions.length}题</div>
          </div>
        `;
      });
      
      html += '</div></div>';
    });
    
    html += '</div>';
    document.getElementById('scale-list-content').innerHTML = html;
  },
  
  // ========== 量表填写 ==========
  renderScaleFill(scaleId) {
    const scale = getScaleById(scaleId);
    if (!scale) { alert('量表不存在'); return; }
    
    this.currentScale = scale;
    this.currentAnswers = {};
    
    let html = `
      <div class="fill-header">
        <button class="btn-back" onclick="App.showPage('scaleList')">← 返回</button>
        <h2>${scale.name}</h2>
        <p class="fill-desc">${scale.description}</p>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="fill-progress" style="width: 0%"></div>
        <span class="progress-text" id="fill-progress-text">0/${scale.questions.length}</span>
      </div>
      <div class="question-list" id="question-list">
    `;
    
    scale.questions.forEach((q, idx) => {
      html += `
        <div class="question-item" id="q-${idx}" data-idx="${idx}">
          <div class="question-number">${idx + 1}</div>
          <div class="question-text">${q.text}</div>
          <div class="question-options">
      `;
      
      if (q.type === 'input') {
        html += `
          <div class="input-group">
            <input type="${q.inputType || 'number'}" 
                   class="form-input" 
                   placeholder="请输入${q.unit || ''}" 
                   data-qidx="${idx}"
                   onchange="App.handleInput(${idx}, this.value, '${q.factor || ''}')" />
            ${q.unit ? `<span class="input-unit">${q.unit}</span>` : ''}
          </div>
        `;
      } else {
        q.options.forEach((opt, oi) => {
          html += `
            <label class="option-label" onclick="App.handleSelect(${idx}, ${oi}, event)">
              <input type="radio" name="q${idx}" value="${opt.score}" />
              <span class="option-radio"></span>
              <span class="option-text">${opt.text}</span>
            </label>
          `;
        });
      }
      
      html += '</div></div>';
    });
    
    html += `
      </div>
      <div class="fill-footer">
        <button class="btn btn-primary btn-lg btn-block" id="btn-submit" onclick="App.submitScale()" disabled>
          提交评估
        </button>
      </div>
    `;
    
    document.getElementById('scale-fill-content').innerHTML = html;
  },
  
  handleSelect(qIdx, optIdx, event) {
    const q = this.currentScale.questions[qIdx];
    const opt = q.options[optIdx];
    
    this.currentAnswers[qIdx] = {
      score: opt.score,
      text: opt.text,
      factor: q.factor || null,
      group: q.group || null,
      constitution: q.constitution || null,
      weight: q.weight || 1
    };
    
    // 视觉反馈
    const qEl = document.getElementById('q-' + qIdx);
    qEl.querySelectorAll('.option-label').forEach((el, i) => {
      el.classList.toggle('selected', i === optIdx);
    });
    qEl.classList.add('answered');
    
    this.updateProgress();
  },
  
  handleInput(qIdx, value, factor) {
    const numVal = parseFloat(value);
    if (isNaN(numVal)) {
      delete this.currentAnswers[qIdx];
    } else {
      this.currentAnswers[qIdx] = {
        score: 0, // input类型题目score由评分公式处理
        inputValue: numVal,
        factor: factor,
        group: null,
        constitution: null,
        weight: 1
      };
    }
    this.updateProgress();
  },
  
  updateProgress() {
    const total = this.currentScale.questions.length;
    const answered = Object.keys(this.currentAnswers).length;
    const pct = Math.round((answered / total) * 100);
    
    document.getElementById('fill-progress').style.width = pct + '%';
    document.getElementById('fill-progress-text').textContent = `${answered}/${total}`;
    
    const btn = document.getElementById('btn-submit');
    if (answered >= total) {
      btn.disabled = false;
      btn.textContent = '提交评估';
    } else {
      btn.disabled = true;
      btn.textContent = `请完成所有题目（${answered}/${total}）`;
    }
  },
  
  // ========== 评分计算 ==========
  calculateScore(scale, answers) {
    const formula = scale.scoring.formula;
    let result = { totalScore: 0, details: {}, scoreDisplay: '' };
    
    switch(formula) {
      case 'sum': {
        let sum = 0;
        Object.keys(answers).forEach(idx => {
          sum += answers[idx].score * (answers[idx].weight || 1);
        });
        // Handle decimal scores (MNA)
        result.totalScore = Math.round(sum * 10) / 10;
        result.scoreDisplay = result.totalScore + '分';
        break;
      }
      
      case 'sas': {
        let rawSum = 0;
        Object.keys(answers).forEach(idx => {
          rawSum += answers[idx].score;
        });
        const standardScore = Math.ceil(rawSum * 1.25);
        result.totalScore = standardScore;
        result.scoreDisplay = `标准分${standardScore}分（原始分${rawSum}）`;
        result.rawScore = rawSum;
        break;
      }
      
      case 'sds': {
        let rawSum = 0;
        Object.keys(answers).forEach(idx => {
          rawSum += answers[idx].score;
        });
        const standardScore = Math.ceil(rawSum * 1.25);
        result.totalScore = standardScore;
        result.scoreDisplay = `标准分${standardScore}分（原始分${rawSum}）`;
        result.rawScore = rawSum;
        break;
      }
      
      case 'kupperman': {
        let weightedSum = 0;
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          weightedSum += a.score * a.weight;
        });
        result.totalScore = weightedSum;
        result.scoreDisplay = weightedSum + '分';
        break;
      }
      
      case 'had': {
        let anxietyScore = 0, depressionScore = 0;
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group === 'anxiety') anxietyScore += a.score;
          if (a.group === 'depression') depressionScore += a.score;
        });
        result.totalScore = anxietyScore + depressionScore;
        result.anxietyScore = anxietyScore;
        result.depressionScore = depressionScore;
        result.scoreDisplay = `焦虑${anxietyScore}分 / 抑郁${depressionScore}分`;
        
        // Determine levels for each
        const anxLevel = scale.scoring.anxietyLevels.find(l => anxietyScore >= l.min && anxietyScore <= l.max);
        const depLevel = scale.scoring.depressionLevels.find(l => depressionScore >= l.min && depressionScore <= l.max);
        result.anxietyLevel = anxLevel || { label: '未知', color: 'gray' };
        result.depressionLevel = depLevel || { label: '未知', color: 'gray' };
        break;
      }
      
      case 'cdr': {
        // CDR special scoring - memory is primary determinant
        const scores = Object.keys(answers).map(idx => answers[idx].score);
        const memoryScore = scores[0]; // first question is memory
        const otherScores = scores.slice(1);
        let cdr = 0;
        
        if (memoryScore === 0 && otherScores.every(s => s === 0)) cdr = 0;
        else if (memoryScore === 0.5 || (memoryScore === 0 && otherScores.some(s => s >= 0.5))) cdr = 0.5;
        else if (memoryScore >= 1) {
          const countGTE1 = otherScores.filter(s => s >= 1).length;
          if (countGTE1 >= 3) cdr = Math.min(memoryScore, ...otherScores.filter(s => s >= 1));
          else cdr = memoryScore;
        }
        
        // Simplified CDR logic
        if (memoryScore === 3) cdr = 3;
        else if (memoryScore === 2) cdr = 2;
        else if (memoryScore === 1) cdr = 1;
        else if (memoryScore === 0.5) cdr = 0.5;
        else if (otherScores.some(s => s > 0)) cdr = 0.5;
        
        result.totalScore = cdr;
        result.scoreDisplay = `CDR=${cdr}`;
        break;
      }
      
      case 'psqi': {
        // Simplified PSQI - use sum of select questions
        let sum = 0;
        Object.keys(answers).forEach(idx => {
          sum += answers[idx].score;
        });
        // Simplified: treat as sum / 3 approximation for 7 components
        result.totalScore = Math.min(21, Math.round(sum * 7 / 17));
        result.scoreDisplay = result.totalScore + '分';
        break;
      }
      
      case 'osta': {
        const ageAnswer = Object.keys(answers).find(idx => answers[idx].factor === 'age');
        const weightAnswer = Object.keys(answers).find(idx => answers[idx].factor === 'weight');
        const age = ageAnswer ? answers[ageAnswer].inputValue : 50;
        const weight = weightAnswer ? answers[weightAnswer].inputValue : 60;
        const ostaIndex = Math.floor((weight - age) * 0.2);
        result.totalScore = ostaIndex;
        result.scoreDisplay = `OSTA指数=${ostaIndex}`;
        break;
      }
      
      case 'frax': {
        let riskCount = 0;
        Object.keys(answers).forEach(idx => {
          if (answers[idx].score >= 1) riskCount++;
        });
        result.totalScore = riskCount;
        result.scoreDisplay = `风险因子${riskCount}项`;
        break;
      }
      
      case 'pfdi20': {
        let popdi = 0, cradi = 0, udi = 0;
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group === 'popdi6') popdi += a.score;
          if (a.group === 'cradi8') cradi += a.score;
          if (a.group === 'udi6') udi += a.score;
        });
        const popdiScore = Math.round(popdi / 6 * 25);
        const cradiScore = Math.round(cradi / 8 * 25);
        const udiScore = Math.round(udi / 6 * 25);
        result.totalScore = popdiScore + cradiScore + udiScore;
        result.subscales = { '盆底脱垂(POPDI-6)': popdiScore, '肠道(CRADI-8)': cradiScore, '泌尿(UDI-6)': udiScore };
        result.scoreDisplay = `总分${result.totalScore}分`;
        break;
      }
      
      case 'pfiq7': {
        let cra = 0, ura = 0, pra = 0;
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group === 'crai7') cra += a.score;
          if (a.group === 'urai7') ura += a.score;
          if (a.group === 'prai7') pra += a.score;
        });
        const craScore = Math.round(cra / 7 * 100 / 3);
        const uraScore = Math.round(ura / 7 * 100 / 3);
        const praScore = Math.round(pra / 7 * 100 / 3);
        result.totalScore = craScore + uraScore + praScore;
        result.subscales = { '肠道(CRAI-7)': craScore, '泌尿(URAI-7)': uraScore, '盆腔(PRAI-7)': praScore };
        result.scoreDisplay = `总分${result.totalScore}分`;
        break;
      }
      
      case 'parq': {
        let yesCount = 0;
        Object.keys(answers).forEach(idx => {
          if (answers[idx].score >= 1) yesCount++;
        });
        result.totalScore = yesCount;
        result.scoreDisplay = yesCount > 0 ? `有${yesCount}项需注意` : '全部通过';
        break;
      }
      
      case 'exercise': {
        let sum = 0;
        Object.keys(answers).forEach(idx => { sum += answers[idx].score; });
        result.totalScore = sum;
        result.scoreDisplay = sum + '分';
        break;
      }
      
      case 'tcm': {
        // 中医体质辨识
        const constitutions = {
          pinghe: { scores: [], count: 0 },
          qixu: { scores: [], count: 0 },
          yangxu: { scores: [], count: 0 },
          yinxu: { scores: [], count: 0 },
          tanshi: { scores: [], count: 0 },
          shire: { scores: [], count: 0 },
          xueyu: { scores: [], count: 0 },
          qiyu: { scores: [], count: 0 },
          tebing: { scores: [], count: 0 }
        };
        
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          const c = a.constitution;
          if (c && constitutions[c]) {
            constitutions[c].scores.push(a.score);
            constitutions[c].count++;
          }
        });
        
        // 计算转化分
        const convertedScores = {};
        Object.keys(constitutions).forEach(c => {
          const d = constitutions[c];
          if (d.count > 0) {
            const sum = d.scores.reduce((a, b) => a + b, 0);
            convertedScores[c] = Math.round((sum - d.count) / (d.count * 4) * 100);
          } else {
            convertedScores[c] = 0;
          }
        });
        
        // 判定
        const pingheScore = convertedScores.pinghe || 0;
        const maxOther = Math.max(...Object.keys(convertedScores).filter(k => k !== 'pinghe').map(k => convertedScores[k]));
        
        let mainConstitution = '';
        let tendencyConstitutions = [];
        
        if (pingheScore >= 60 && maxOther < 30) {
          mainConstitution = '平和质';
        } else {
          // 找最高的偏颇体质
          let maxC = '', maxV = 0;
          Object.keys(convertedScores).forEach(c => {
            if (c !== 'pinghe' && convertedScores[c] > maxV) {
              maxV = convertedScores[c];
              maxC = c;
            }
          });
          if (maxV >= 40) mainConstitution = scale.scoring.constitutionNames[maxC] + '（主）';
          else if (maxV >= 30) mainConstitution = scale.scoring.constitutionNames[maxC] + '（倾向）';
          
          // 其他倾向
          Object.keys(convertedScores).forEach(c => {
            if (c !== 'pinghe' && c !== maxC && convertedScores[c] >= 30) {
              tendencyConstitutions.push(scale.scoring.constitutionNames[c]);
            }
          });
        }
        
        result.totalScore = 0;
        result.constitutionScores = convertedScores;
        result.mainConstitution = mainConstitution || '平和质';
        result.tendencyConstitutions = tendencyConstitutions;
        result.scoreDisplay = mainConstitution || '平和质';
        if (tendencyConstitutions.length > 0) {
          result.scoreDisplay += '，倾向：' + tendencyConstitutions.join('、');
        }
        break;
      }
      
      case 'menqol': {
        const groups = { vasomotor: [], psychosocial: [], physical: [], sexual: [] };
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group && groups[a.group]) groups[a.group].push(a.score);
        });
        
        const vasomotorAvg = groups.vasomotor.length ? (groups.vasomotor.reduce((a,b)=>a+b,0) / groups.vasomotor.length) : 0;
        const psychosocialAvg = groups.psychosocial.length ? (groups.psychosocial.reduce((a,b)=>a+b,0) / groups.psychosocial.length) : 0;
        const physicalAvg = groups.physical.length ? (groups.physical.reduce((a,b)=>a+b,0) / groups.physical.length) : 0;
        const sexualAvg = groups.sexual.length ? (groups.sexual.reduce((a,b)=>a+b,0) / groups.sexual.length) : 0;
        
        result.totalScore = Math.round((vasomotorAvg + psychosocialAvg + physicalAvg + sexualAvg) / 4 * 10) / 10;
        result.subscales = { '血管域': Math.round(vasomotorAvg*10)/10, '心理域': Math.round(psychosocialAvg*10)/10, '生理域': Math.round(physicalAvg*10)/10, '性域': Math.round(sexualAvg*10)/10 };
        result.scoreDisplay = `均分${result.totalScore}`;
        break;
      }
      
      case 'fss': {
        let sum = 0, count = 0;
        Object.keys(answers).forEach(idx => { sum += answers[idx].score; count++; });
        const avg = count > 0 ? Math.round(sum / count * 10) / 10 : 0;
        result.totalScore = avg;
        result.scoreDisplay = `平均分${avg}分`;
        break;
      }
      
      case 'gsrs': {
        const groups = { reflux: [], pain: [], indigestion: [], diarrhea: [], constipation: [] };
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group && groups[a.group]) groups[a.group].push(a.score);
        });
        
        const refluxAvg = groups.reflux.length ? Math.round(groups.reflux.reduce((a,b)=>a+b,0)/groups.reflux.length*10)/10 : 0;
        const painAvg = groups.pain.length ? Math.round(groups.pain.reduce((a,b)=>a+b,0)/groups.pain.length*10)/10 : 0;
        const indigAvg = groups.indigestion.length ? Math.round(groups.indigestion.reduce((a,b)=>a+b,0)/groups.indigestion.length*10)/10 : 0;
        const diarrAvg = groups.diarrhea.length ? Math.round(groups.diarrhea.reduce((a,b)=>a+b,0)/groups.diarrhea.length*10)/10 : 0;
        const constAvg = groups.constipation.length ? Math.round(groups.constipation.reduce((a,b)=>a+b,0)/groups.constipation.length*10)/10 : 0;
        
        const totalAvg = Math.round((refluxAvg + painAvg + indigAvg + diarrAvg + constAvg) / 5 * 10) / 10;
        result.totalScore = totalAvg;
        result.subscales = { '反流': refluxAvg, '腹痛': painAvg, '消化不良': indigAvg, '腹泻': diarrAvg, '便秘': constAvg };
        result.scoreDisplay = `均分${totalAvg}`;
        break;
      }
      
      case 'fsfi': {
        const groups = { desire: [], arousal: [], lubrication: [], orgasm: [], satisfaction: [], pain: [] };
        Object.keys(answers).forEach(idx => {
          const a = answers[idx];
          if (a.group && groups[a.group]) groups[a.group].push(a.score);
        });
        
        const weights = scale.scoring.domainWeights || {};
        const domainScores = {};
        let total = 0;
        Object.keys(groups).forEach(g => {
          const scores = groups[g];
          const avg = scores.length ? scores.reduce((a,b)=>a+b,0) / scores.length : 0;
          const weight = weights[g] || 0.3;
          domainScores[g] = Math.round(avg * weight * scores.length * 10) / 10;
          total += domainScores[g];
        });
        
        result.totalScore = Math.round(total * 10) / 10;
        result.subscales = { 
          '性欲': domainScores.desire || 0, 
          '主观唤起': domainScores.arousal || 0, 
          '润滑': domainScores.lubrication || 0,
          '高潮': domainScores.orgasm || 0, 
          '满意度': domainScores.satisfaction || 0, 
          '疼痛': domainScores.pain || 0 
        };
        result.scoreDisplay = `总分${result.totalScore}分`;
        break;
      }
      
      default: {
        let sum = 0;
        Object.keys(answers).forEach(idx => { sum += answers[idx].score; });
        result.totalScore = sum;
        result.scoreDisplay = sum + '分';
      }
    }
    
    // 确定分级
    const level = scale.scoring.levels.find(l => result.totalScore >= l.min && result.totalScore <= l.max);
    result.level = level || { label: '参考具体得分', color: 'gray' };
    
    return result;
  },
  
  // ========== 提交量表 ==========
  submitScale() {
    const scale = this.currentScale;
    const answers = this.currentAnswers;
    
    // 验证所有题目已回答
    const unanswered = scale.questions.length - Object.keys(answers).length;
    if (unanswered > 0) {
      alert(`还有${unanswered}题未作答，请完成所有题目`);
      return;
    }
    
    const result = this.calculateScore(scale, answers);
    
    // 保存记录
    const record = {
      scaleId: scale.id,
      scaleName: scale.name,
      date: new Date().toISOString().slice(0, 10),
      time: new Date().toISOString(),
      answers: answers,
      totalScore: result.totalScore,
      scoreDisplay: result.scoreDisplay,
      level: result.level,
      subscales: result.subscales || null,
      mainConstitution: result.mainConstitution || null,
      tendencyConstitutions: result.tendencyConstitutions || null,
      constitutionScores: result.constitutionScores || null,
      anxietyScore: result.anxietyScore || null,
      depressionScore: result.depressionScore || null,
      anxietyLevel: result.anxietyLevel || null,
      depressionLevel: result.depressionLevel || null
    };
    
    StorageManager.saveRecord(this.currentPatient.name, this.currentPatient.phone, record);
    
    // 更新当前患者数据
    this.currentPatient = StorageManager.getPatient(this.currentPatient.name, this.currentPatient.phone);
    
    this.showPage('scaleResult', record);
  },
  
  // ========== 结果展示 ==========
  renderScaleResult(record) {
    const scale = getScaleById(record.scaleId);
    
    let html = `
      <div class="result-header">
        <h2>${scale.name}</h2>
        <div class="result-date">${record.date}</div>
      </div>
      <div class="result-score-card">
        <div class="result-score ${record.level.color}">${record.scoreDisplay}</div>
        <div class="result-level" style="color: var(--color-${record.level.color})">${record.level.label}</div>
      </div>
    `;
    
    // HAD量表特殊显示
    if (record.scaleId === 'had' && record.anxietyScore !== null) {
      html += `
        <div class="result-sub-card">
          <h3>焦虑因子</h3>
          <div class="result-sub-score">${record.anxietyScore}分</div>
          <div style="color: var(--color-${record.anxietyLevel.color})">${record.anxietyLevel.label}</div>
        </div>
        <div class="result-sub-card">
          <h3>抑郁因子</h3>
          <div class="result-sub-score">${record.depressionScore}分</div>
          <div style="color: var(--color-${record.depressionLevel.color})">${record.depressionLevel.label}</div>
        </div>
      `;
    }
    
    // 子量表分数
    if (record.subscales) {
      html += '<div class="result-subscales"><h3>分项得分</h3>';
      Object.keys(record.subscales).forEach(key => {
        html += `<div class="result-sub-item"><span>${key}</span><span>${record.subscales[key]}</span></div>`;
      });
      html += '</div>';
    }
    
    // 中医体质特殊显示
    if (record.constitutionScores) {
      html += '<div class="result-constitution"><h3>体质辨识结果</h3>';
      html += `<div class="result-main-constitution">${record.mainConstitution}</div>`;
      if (record.tendencyConstitutions && record.tendencyConstitutions.length > 0) {
        html += `<div class="result-tendency">倾向体质：${record.tendencyConstitutions.join('、')}</div>`;
      }
      html += '<div class="constitution-bars">';
      const names = scale.scoring.constitutionNames;
      Object.keys(record.constitutionScores).forEach(c => {
        const score = record.constitutionScores[c];
        const pct = Math.min(100, score);
        html += `
          <div class="const-bar-item">
            <span class="const-name">${names[c]}</span>
            <div class="const-bar-bg"><div class="const-bar-fill" style="width:${pct}%; background: ${score >= 40 ? '#e74c3c' : score >= 30 ? '#f39c12' : '#27ae60'}"></div></div>
            <span class="const-score">${score}</span>
          </div>
        `;
      });
      html += '</div></div>';
    }
    
    // 建议
    html += this.getAdvice(record);
    
    // 操作按钮
    html += `
      <div class="result-actions">
        <button class="btn btn-primary btn-lg btn-block" onclick="App.showPage('scaleList')">继续评估其他量表</button>
        <button class="btn btn-outline btn-block" onclick="App.showPage('home')">返回首页</button>
      </div>
    `;
    
    document.getElementById('scale-result-content').innerHTML = html;
  },
  
  // 生成建议
  getAdvice(record) {
    const level = record.level;
    const scaleId = record.scaleId;
    
    const adviceMap = {
      'green': '您在此项评估中表现良好，建议保持健康的生活方式，定期复查。',
      'yellow': '您在此项评估中存在轻度异常，建议关注相关症状，适当调整生活方式，必要时咨询医生。',
      'orange': '您在此项评估中存在中度异常，建议及时就医，进行进一步检查和评估。',
      'red': '您在此项评估中存在明显异常，强烈建议尽快就医，接受专业诊治。',
      'darkred': '您在此项评估中存在严重异常，请立即就医或联系您的医生。'
    };
    
    let advice = adviceMap[level.color] || adviceMap['yellow'];
    
    // 特定量表建议
    if (scaleId === 'parq' && record.totalScore > 0) {
      advice = '您存在运动风险因素，建议在医生指导下制定运动方案，避免剧烈运动。';
    } else if (scaleId === 'parq') {
      advice = '您可以安全地进行体力活动，建议循序渐进，坚持规律运动。';
    }
    
    if (scaleId === 'cdr' && record.totalScore > 0) {
      advice = '建议到神经内科进行详细的认知功能评估，明确诊断后制定干预方案。';
    }
    
    return `<div class="result-advice"><strong>💡 建议：</strong>${advice}</div>`;
  },
  
  // ========== 历史记录 ==========
  renderHistory() {
    const patient = this.currentPatient;
    if (!patient || !patient.records || patient.records.length === 0) {
      document.getElementById('history-content').innerHTML = `
        <div class="empty-state">
          <p>暂无评估记录</p>
          <button class="btn btn-primary" onclick="App.showPage('scaleList')">开始评估</button>
        </div>
      `;
      return;
    }
    
    let html = '<div class="history-list">';
    
    // 按日期分组
    const dateGroups = {};
    patient.records.forEach(r => {
      if (!dateGroups[r.date]) dateGroups[r.date] = [];
      dateGroups[r.date].push(r);
    });
    
    Object.keys(dateGroups).sort().reverse().forEach(date => {
      html += `<div class="history-date">${date}</div>`;
      dateGroups[date].forEach(r => {
        const levelColor = r.level ? r.level.color : 'gray';
        html += `
          <div class="history-item" onclick="App.showPage('scaleResult', ${JSON.stringify(r).replace(/"/g, '&quot;')})">
            <div class="history-item-name">${r.scaleName}</div>
            <div class="history-item-score" style="color: var(--color-${levelColor})">${r.scoreDisplay}</div>
            <div class="history-item-level">${r.level ? r.level.label : ''}</div>
          </div>
        `;
      });
    });
    
    html += '</div>';
    
    html += `
      <div style="margin-top:20px;">
        <button class="btn btn-outline btn-block" onclick="App.showPage('scaleList')">继续评估</button>
        <button class="btn btn-outline btn-block" onclick="App.showPage('home')">返回首页</button>
      </div>
    `;
    
    document.getElementById('history-content').innerHTML = html;
  }
};

        document.getElementById('tab-' + tab).classList.add('active');
        
        switch(tab) {
          case 'dashboard': this.renderDashboard(); break;
          case 'patients': this.renderPatients(); break;
          case 'config': this.renderConfig(); break;
          case 'export': this.renderExport(); break;
        }
      },
      
      renderDashboard() {
        const patients = StorageManager.getPatients();
        const totalPatients = patients.length;
        const totalRecords = patients.reduce((sum, p) => sum + (p.records ? p.records.length : 0), 0);
        
        // 统计量表使用情况
        const scaleUsage = {};
        patients.forEach(p => {
          if (p.records) {
            p.records.forEach(r => {
              scaleUsage[r.scaleId] = (scaleUsage[r.scaleId] || 0) + 1;
            });
          }
        });
        
        // 最近7天新增
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        const recentPatients = patients.filter(p => new Date(p.lastVisit) >= weekAgo).length;
        
        let html = `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${totalPatients}</div>
              <div class="stat-label">患者总数</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${totalRecords}</div>
              <div class="stat-label">评估总次数</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${recentPatients}</div>
              <div class="stat-label">近7天活跃</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${Object.keys(scaleUsage).length}</div>
              <div class="stat-label">使用量表数</div>
            </div>
          </div>
        `;
        
        // 量表使用排行
        if (Object.keys(scaleUsage).length > 0) {
          html += '<h3 style="margin-bottom:12px;">量表使用排行</h3>';
          const sorted = Object.entries(scaleUsage).sort((a, b) => b[1] - a[1]);
          const scaleMap = {};
          SCALES.forEach(s => scaleMap[s.id] = s.name);
          
          html += '<div style="background:white; border-radius:12px; padding:16px; box-shadow:0 2px 12px rgba(123,104,174,0.1);">';
          sorted.forEach(([id, count]) => {
            const pct = Math.round(count / sorted[0][1] * 100);
            html += `
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                <span style="width:140px; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${scaleMap[id] || id}</span>
                <div style="flex:1; height:16px; background:var(--color-border); border-radius:8px; overflow:hidden;">
                  <div style="width:${pct}%; height:100%; background:linear-gradient(90deg, var(--color-primary), var(--color-primary-light)); border-radius:8px;"></div>
                </div>
                <span style="font-size:13px; font-weight:600; color:var(--color-primary); width:30px;">${count}</span>
              </div>
            `;
          });
          html += '</div>';
        }
        
        document.getElementById('dashboard-content').innerHTML = html;
      },
      
      renderPatients() {
        const patients = StorageManager.getPatients();
        const scaleMap = {};
        SCALES.forEach(s => scaleMap[s.id] = s.name);
        
        if (patients.length === 0) {
          document.getElementById('patients-content').innerHTML = `
            <div class="empty-state">
              <p>暂无患者数据</p>
            </div>
          `;
          return;
        }
        
        let html = `
          <div style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:14px; color:var(--color-text-secondary);">共 ${patients.length} 位患者</span>
            <input type="text" id="patient-search" placeholder="搜索姓名/手机号" 
                   class="form-input" style="width:200px; padding:8px 12px; font-size:14px;"
                   oninput="AdminApp.filterPatients(this.value)" />
          </div>
          <div style="overflow-x:auto;">
            <table class="patient-table" id="patient-table">
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>手机号</th>
                  <th>评估次数</th>
                  <th>最近评估</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
        `;
        
        patients.forEach((p, idx) => {
          const recordCount = p.records ? p.records.length : 0;
          const lastDate = p.lastVisit ? new Date(p.lastVisit).toLocaleDateString() : '-';
          html += `
            <tr data-idx="${idx}">
              <td>${p.name}</td>
              <td>${p.phone}</td>
              <td>${recordCount}</td>
              <td>${lastDate}</td>
              <td>
                <button class="btn btn-primary btn-sm" onclick="AdminApp.showDetail(${idx})">详情</button>
              </td>
            </tr>
          `;
        });
        
        html += '</tbody></table></div>';
        document.getElementById('patients-content').innerHTML = html;
      },
      
      filterPatients(keyword) {
        const rows = document.querySelectorAll('#patient-table tbody tr');
        keyword = keyword.toLowerCase();
        rows.forEach(row => {
          const text = row.textContent.toLowerCase();
          row.style.display = text.includes(keyword) ? '' : 'none';
        });
      },
      
      showDetail(patientIdx) {
        const patients = StorageManager.getPatients();
        const patient = patients[patientIdx];
        const scaleMap = {};
        SCALES.forEach(s => scaleMap[s.id] = s.name);
        
        let html = `
          <div class="admin-detail-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <h3>${patient.name} - 详细数据</h3>
              <button class="btn btn-outline btn-sm" onclick="document.getElementById('detail-modal').style.display='none'">关闭</button>
            </div>
            <div style="font-size:14px; color:var(--color-text-secondary); margin-bottom:16px;">
              手机号：${patient.phone} | 注册时间：${new Date(patient.createTime).toLocaleDateString()}
            </div>
        `;
        
        if (!patient.records || patient.records.length === 0) {
          html += '<div class="empty-state"><p>暂无评估记录</p></div>';
        } else {
          // 按日期倒序
          const sortedRecords = [...patient.records].sort((a, b) => new Date(b.time) - new Date(a.time));
          
          sortedRecords.forEach(record => {
            const levelColor = record.level ? record.level.color : 'gray';
            html += `
              <div class="detail-record">
                <div class="detail-record-header">
                  <span>${scaleMap[record.scaleId] || record.scaleName}</span>
                  <span style="color:var(--color-${levelColor});">${record.scoreDisplay}</span>
                </div>
                <div style="font-size:13px; color:var(--color-gray); margin-bottom:8px;">
                  ${record.date} | ${record.level ? record.level.label : ''}
                </div>
            `;
            
            // 子量表
            if (record.subscales) {
              html += '<div style="font-size:13px; margin-bottom:8px;">';
              Object.entries(record.subscales).forEach(([k, v]) => {
                html += `<span style="margin-right:12px;">${k}: ${v}</span>`;
              });
              html += '</div>';
            }
            
            // 中医体质
            if (record.mainConstitution) {
              html += `<div style="font-size:13px; margin-bottom:8px; color:var(--color-primary); font-weight:600;">${record.mainConstitution}`;
              if (record.tendencyConstitutions && record.tendencyConstitutions.length > 0) {
                html += `，倾向：${record.tendencyConstitutions.join('、')}`;
              }
              html += '</div>';
            }
            
            // 答题详情
            const scale = getScaleById(record.scaleId);
            if (scale) {
              html += '<div class="detail-record-body">';
              scale.questions.forEach((q, qi) => {
                const a = record.answers[String(qi)];
                if (a) {
                  html += `<div class="qna"><strong>Q${qi+1}.</strong> ${q.text} → ${a.text || a.inputValue || '-'}</div>`;
                }
              });
              html += '</div>';
            }
            
            html += '</div>';
          });
        }
        
        html += '</div>';
        document.getElementById('detail-modal').innerHTML = html;
        document.getElementById('detail-modal').style.display = 'flex';
      },
      
      renderConfig() {
        const config = StorageManager.getScaleConfig();
        const enabledIds = config.enabledScales || SCALES.map(s => s.id);
        const categories = {};
        const categoryOrder = ['认知评估', '情绪评估', '更年期评估', '睡眠评估', '营养评估', '骨骼评估', '盆底评估', '运动评估', '待补充'];
        
        SCALES.forEach(scale => {
          if (!categories[scale.category]) categories[scale.category] = [];
          categories[scale.category].push(scale);
        });
        
        let html = `
          <p style="font-size:14px; color:var(--color-text-secondary); margin-bottom:16px;">
            勾选要在患者端显示的量表，取消勾选则隐藏
          </p>
        `;
        
        categoryOrder.forEach(cat => {
          if (!categories[cat]) return;
          html += `<h3 style="margin:16px 0 8px; color:var(--color-primary-dark);">${cat}</h3>`;
          html += '<div class="scale-config-grid">';
          
          categories[cat].forEach(scale => {
            const checked = enabledIds.includes(scale.id) ? 'checked' : '';
            html += `
              <div class="scale-config-item">
                <label>
                  <input type="checkbox" value="${scale.id}" ${checked} onchange="AdminApp.toggleScale('${scale.id}', this.checked)" />
                  ${scale.name}
                </label>
              </div>
            `;
          });
          
          html += '</div>';
        });
        
        html += `
          <div style="margin-top:24px; display:flex; gap:12px;">
            <button class="btn btn-primary" onclick="AdminApp.selectAll()">全选</button>
            <button class="btn btn-outline" onclick="AdminApp.deselectAll()">全不选</button>
            <button class="btn btn-secondary" onclick="AdminApp.saveConfig()">保存配置</button>
          </div>
        `;
        
        document.getElementById('config-content').innerHTML = html;
      },
      
      toggleScale(id, enabled) {
        // 实时更新，不需要额外操作
      },
      
      selectAll() {
        document.querySelectorAll('.scale-config-item input[type="checkbox"]').forEach(cb => cb.checked = true);
      },
      
      deselectAll() {
        document.querySelectorAll('.scale-config-item input[type="checkbox"]').forEach(cb => cb.checked = false);
      },
      
      saveConfig() {
        const checkboxes = document.querySelectorAll('.scale-config-item input[type="checkbox"]');
        const enabledScales = [];
        checkboxes.forEach(cb => {
          if (cb.checked) enabledScales.push(cb.value);
        });
        
        if (enabledScales.length === 0) {
          alert('请至少选择一个量表');
          return;
        }
        
        StorageManager.saveScaleConfig({ enabledScales });
        alert('配置已保存');
      },
      
      renderExport() {
        const patients = StorageManager.getPatients();
        const totalRecords = patients.reduce((sum, p) => sum + (p.records ? p.records.length : 0), 0);
        
        let html = `
          <div style="background:white; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(123,104,174,0.1); margin-bottom:16px;">
            <h3 style="margin-bottom:16px;">数据导出</h3>
            <p style="font-size:14px; color:var(--color-text-secondary); margin-bottom:16px;">
              当前共 ${patients.length} 位患者，${totalRecords} 条评估记录
            </p>
            <div style="display:flex; flex-direction:column; gap:12px; max-width:400px;">
              <button class="btn btn-primary btn-lg btn-block" onclick="StorageManager.exportCSV()">
                📊 导出CSV（评分汇总）
              </button>
              <button class="btn btn-secondary btn-lg btn-block" onclick="StorageManager.exportJSON()">
                📋 导出JSON（完整数据）
              </button>
            </div>
          </div>
          
          <div style="background:white; border-radius:12px; padding:24px; box-shadow:0 2px 12px rgba(123,104,174,0.1);">
            <h3 style="margin-bottom:16px; color:var(--color-red);">⚠️ 危险操作</h3>
            <p style="font-size:14px; color:var(--color-text-secondary); margin-bottom:16px;">
              清除所有数据将删除所有患者和评估记录，此操作不可恢复
            </p>
            <button class="btn btn-outline" style="border-color:var(--color-red); color:var(--color-red);" onclick="AdminApp.clearData()">
              清除所有数据
            </button>
          </div>
        `;
        
        document.getElementById('export-content').innerHTML = html;
      },
      
      clearData() {
        if (StorageManager.clearAllData()) {
          alert('数据已清除');
          this.init();
        }
      }
    };
    
    // 点击弹窗外关闭
    document.getElementById('detail-modal').addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });
    
    // 检查登录状态
    document.addEventListener('DOMContentLoaded', () => AdminLogin.checkAuth());
  </script>

  <!-- ===== 模式切换逻辑 ===== -->
  <script>
    // 当前模式
    let currentMode = 'eval';
    const DEFAULT_ADMIN_PASSWORD = 'ksmz';
    let adminAuthenticated = false;

    // 获取当前管理密码（优先localStorage，否则默认）
    function getAdminPassword() {
      return localStorage.getItem('admin_password') || DEFAULT_ADMIN_PASSWORD;
    }
    
    // 切换到评估模式
    function switchToEval() {
      currentMode = 'eval';
      document.getElementById('eval-mode').classList.add('active');
      document.getElementById('admin-mode').classList.remove('active');
      document.getElementById('btn-eval').classList.add('active');
      document.getElementById('btn-admin').classList.remove('active');
      // 重置管理端导航按钮高亮
      document.querySelectorAll('.admin-nav .btn').forEach((b, i) => {
        b.classList.toggle('active', i === 0);
      });
      window.scrollTo(0, 0);
    }
    
    // 尝试切换到管理模式（需要密码）
    function trySwitchToAdmin() {
      if (adminAuthenticated) {
        doSwitchToAdmin();
        return;
      }
      // 显示密码弹窗
      document.getElementById('admin-password-overlay').classList.add('show');
      document.getElementById('mode-switch-password').value = '';
      setTimeout(() => document.getElementById('mode-switch-password').focus(), 100);
    }
    
    // 验证管理密码
    function verifyAdminPassword() {
      const pwd = document.getElementById('mode-switch-password').value;
      if (pwd === getAdminPassword()) {
        adminAuthenticated = true;
        document.getElementById('admin-password-overlay').classList.remove('show');
        doSwitchToAdmin();
      } else {
        alert('密码错误');
        document.getElementById('mode-switch-password').value = '';
        document.getElementById('mode-switch-password').focus();
      }
    }
    
    // 取消管理切换
    function cancelAdminSwitch() {
      document.getElementById('admin-password-overlay').classList.remove('show');
    }

    // 显示修改密码对话框
    function showChangePasswordDialog() {
      document.getElementById('old-password').value = '';
      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
      document.getElementById('change-pwd-overlay').classList.add('show');
      setTimeout(() => document.getElementById('old-password').focus(), 100);
    }

    // 取消修改密码
    function cancelChangePassword() {
      document.getElementById('change-pwd-overlay').classList.remove('show');
    }

    // 执行修改密码
    function doChangePassword() {
      const oldPwd = document.getElementById('old-password').value;
      const newPwd = document.getElementById('new-password').value;
      const confirmPwd = document.getElementById('confirm-password').value;

      if (!oldPwd) {
        alert('请输入旧密码');
        document.getElementById('old-password').focus();
        return;
      }
      if (oldPwd !== getAdminPassword()) {
        alert('旧密码错误');
        document.getElementById('old-password').value = '';
        document.getElementById('old-password').focus();
        return;
      }
      if (!newPwd) {
        alert('新密码不能为空');
        document.getElementById('new-password').focus();
        return;
      }
      if (newPwd !== confirmPwd) {
        alert('两次输入的新密码不一致');
        document.getElementById('confirm-password').value = '';
        document.getElementById('confirm-password').focus();
        return;
      }
      if (newPwd === oldPwd) {
        alert('新密码不能与旧密码相同');
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        document.getElementById('new-password').focus();
        return;
      }

      localStorage.setItem('admin_password', newPwd);
      document.getElementById('change-pwd-overlay').classList.remove('show');
      alert('密码修改成功！');
    }

    // 点击修改密码弹窗外关闭
    document.getElementById('change-pwd-overlay').addEventListener('click', function(e) {
      if (e.target === this) cancelChangePassword();
    });
    
    // 执行切换到管理模式
    function doSwitchToAdmin() {
      currentMode = 'admin';
      document.getElementById('eval-mode').classList.remove('active');
      document.getElementById('admin-mode').classList.add('active');
      document.getElementById('btn-eval').classList.remove('active');
      document.getElementById('btn-admin').classList.add('active');
      window.scrollTo(0, 0);
      AdminApp.init();
    }
    
    // 点击弹窗外关闭
    document.getElementById('admin-password-overlay').addEventListener('click', function(e) {
      if (e.target === this) cancelAdminSwitch();
    });
    
    // 页面加载时初始化评估端
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
