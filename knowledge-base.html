\n| **主治** | 气虚乏力、慢性疲劳、贫血、颈椎病、肩周炎、坐骨神经痛、慢性支气管炎、过敏性鼻炎、消化不良、产后缺乳 | 同灵骨穴，配合增强疗效 |\n| **针法** | 直刺或向腕关节方向斜刺，深0.8-1.2寸（体虚者浅刺0.5-0.8寸），多用补法 | 可随证补泻 |\n| **留针** | 40-60分钟，可配合温针灸 | 同灵骨穴 |\n\n**临床应用注意**：\n- 实热证（高热、便秘、口臭）慎用，恐助热生火\n- 与妇科穴配伍：治疗气虚型月经不调、产后缺乳效果佳\n- 配足三里+气海艾灸：补气升阳，适合抗衰门诊气虚型患者\n\n### 1.4 重子穴+重仙穴 — 妇科与痛证双效穴组\n\n| 项目 | 重子穴 | 重仙穴 |\n|---|---|---|\n| **定位** | 手掌面，第一、二掌骨间，距掌指横纹1.5寸，靠第一掌骨尺侧缘 | 重子穴直上1.5寸 |\n| **穴性** | 属\"木\"性穴位 | 属\"木\"性穴位 |\n| **主治** | 月经不调、痛经（寒凝瘀血型）、产后身痛、腰背劳损、坐骨神经痛、久年胃病（虚寒型） | 同重子穴 |\n| **针法** | 向掌心斜刺，深0.5-0.8寸，虚寒补法、实热泻法 | 同重子穴 |\n| **留针** | 30-40分钟，可加艾灸 | 同重子穴 |\n\n### 1.5 其他妇科相关董氏奇穴速查\n\n| 穴名 | 定位 | 主治 | 备注 |\n|---|---|---|---|\n| 通骨穴 | 小指第一节与第二节横纹上，中央旁开三分，共两穴 | 脊椎炎、骨刺、腰椎间盘突出、坐骨神经痛、腰扭伤 | \"以骨治骨\"，配灵骨+大白补气 |\n| 指五金穴 | 食指背侧第一节尺侧，近端指骨三分点 | 肠炎、腹痛、鱼刺卡喉、咽喉肿痛 | 贴骨浅刺2-3分 |\n| 三其穴 | 小腿外侧，阳陵泉下2/4/6寸 | 胆囊炎、偏头痛、更年期综合征 | 疏肝利胆 |\n| 木妇穴 | — | 白带过多 | 配妇科穴用 |\n\n### 1.6 董氏奇穴在妇科的临床运用原则\n\n1. **以指代腹**：通过手部穴位调节全身气血，体现\"上病下治、远端取穴\"\n2. **穴少效广**：妇科穴+还巢穴两穴即可覆盖大部分妇科病症\n3. **动气针法**：针刺后嘱患者活动患处（如小腹呼吸运动），引气至病所\n4. **按月经周期施治**：经净后开始，持续到排卵期结束\n5. **皮内针方案**：图钉型皮内针埋针2天，适用于痛经发作时\n\n---\n\n## 二、五行针灸 — 身心同治的针灸体系\n\n### 2.1 核心理论\n\n五行针灸源自《黄帝内经》，由英国华思礼（J.R. Worsley）先生系统化传播，后由诺娜女士、龙梅女士等传回中国。其核心在于：\n\n- **护持一行（Causative Factor, CF）**：每人五行中有一行为主导，称为\"护持一行\"。它是生命的核心，其他四行围绕运转。一切身心失调，根源在于护持一行失衡。\n- **调神为先**：五行针灸特别重视\"调神\"，先恢复神的清明，再调气血。与传统针灸\"调气为主\"有本质区别。\n- **身心同治**：情绪障碍与躯体症状不可分割，通过五行生克关系整体调节。\n\n### 2.2 主行判断 — 四诊合参定五行\n\n| 五行 | 面色 | 眼神 | 主导情绪 | 脉象 | 失衡表现 |\n|---|---|---|---|---|---|\n| **木** | 偏青（橄榄色） | 锐利灵动，如鹰隼 | 因压抑/束缚而怒 | 弦长，如按琴弦 | 胸胁胀痛、抑郁/易怒 |\n| **火** | 偏赤（浅朱） | 明亮热情，如星火 | 因缺乏温暖而失落 | 洪大，来盛去衰 | 畏寒、心悸、失眠 |\n| **土** | 偏黄（熟粟） | 温和安定，如静水 | 因过度担责而焦虑 | 缓滑，寸部略沉 | 腹胀、便溏、思虑过度 |\n| **金** | 偏白（蛋清） | 清冷专注，如秋霜 | 因否定而悲伤 | 浮涩，如刀刮竹 | 咳嗽、皮肤干燥、悲忧难解 |\n| **水** | 偏黑（深檀） | 深邃含蓄，如深潭 | 因失控而恐惧 | 沉细，尺部尤弱 | 腰膝酸软、耳鸣、恐惧易惊 |\n\n**诊断要点**：\n- 望诊重点看**面色光泽**和**眼神**（神态比面色更重要）\n- 问诊追问**情绪触发点**：\"生气时胸胁胀闷还是头痛？\"\"悲伤时胸闷欲哭还是咽喉哽塞？\"\n- 切诊重点检查**背俞穴**（肝/心/脾/肺/肾俞）及**原穴**（太冲/神门/太白/太渊/太溪）的压痛、结节、温度异常\n- 判断主行需要**整体感受**，不能仅凭单一指标\n\n### 2.3 临床操作流程\n\n#### 首次治疗三步法\n\n**第一步：祛除内障（内七龙/外七龙）**\n\n判断标准：患者是否存在目光涣散、神采缺失（\"内障\"征象）\n\n| 类型 | 穴位 | 操作 |\n|---|---|---|\n| 内七龙 | 鸠尾、天枢（双）、伏兔（双）、解溪（双） | 从上到下、从右到左进针，直刺，得气后捻转泻法（逆时针180°），留针5min |\n| 外七龙 | 百会、大杼、肾俞（双）、仆参（双） | 同上 |\n\n观察针眼周围有无圆形红晕：有→待红晕退尽出针；无→即刻出针。出针时改补法（顺时针180°），按压针孔。\n\n**第二步：祛除AE（邪气）**\n\n| 项目 | 内容 |\n|---|---|\n| **取穴** | 双侧肺俞、厥阴俞（心包俞）、心俞、肝俞、脾俞、肾俞 |\n| **操作** | 从上到下、从右到左，斜刺（逆膀胱经方向，针尖向上）、浅刺（刚入皮肤即可），留针5min |\n| **出针** | 同进针顺序，出针后**不压针孔**（让邪气外泄） |\n\n**第三步：扶助主管穴（原穴）**\n\n| 主行 | 阳经原穴 | 阴经原穴 |\n|---|---|---|\n| 木 | 丘墟 | 太冲 |\n| 相火 | 阳池 | 大陵（禁灸） |\n| 君火 | 腕骨 | 神门 |\n| 土 | 冲阳 | 太白 |\n| 金 | 合谷 | 太渊 |\n| 水 | 京骨 | 太溪（传统穴上1寸） |\n\n**操作**：先阳经后阴经，先左后右。每穴先**麦粒灸3壮**，再进针得气后行补法（顺时针180°），不留针，按压针孔起针。\n\n#### 后续治疗两步法\n\n**第一步：通阻滞**\n\n根据脉诊判断阻滞类型：\n\n| 阻滞类型 | 疏通穴位 |\n|---|---|\n| 夫妻不和 | 补至阴、复溜、太溪、中封、腕骨、神门+主导行原穴 |\n| 肝-肺阻滞 | 期门、中府 |\n| 大肠-胃阻滞 | 迎香、承泣 |\n| 脾-心阻滞 | 大包、极泉 |\n| 小肠-膀胱阻滞 | 听宫、睛明 |\n| 肾-心包阻滞 | 步廊、天池（男）/天泉（女） |\n| 三焦-胆阻滞 | 耳和髎、瞳子髎 |\n| 任督阻滞 | 会阴、承浆、长强、龈交 |\n| 瘢痕阻滞 | 紧邻瘢痕上下之腧穴，顺经络方向进针，施补法 |\n\n**第二步：扶助主管穴** — 同首次第三步\n\n### 2.4 选穴核心原则 — 补母泻子法\n\n遵循\"虚则补其母，实则泻其子\"：\n\n| 五行 | 虚证（补母） | 实证（泻子） |\n|---|---|---|\n| 木（肝） | 补水→取肾经合穴阴谷 | 泻火→取肝经荥穴行间 |\n| 火（心） | 补木→取肝经输穴太冲 | 泻土→取心经合穴少海 |\n| 土（脾） | 补火→取脾经荥穴大都 | 泻金→取脾经经穴商丘 |\n| 金（肺） | 补土→取肺经输穴太渊 | 泻水→取肺经合穴尺泽 |\n| 水（肾） | 补金→取肾经经穴复溜 | 泻木→取肾经荥穴然谷 |\n\n### 2.5 临床研究证据\n\n1. **双心疾病**（心血管+焦虑抑郁）：五行针灸+常规治疗 vs 常规治疗，观察组焦虑/抑郁评分、复发率、中医症状积分均低于对照组（P<0.05）[来源：《国际临床研究杂志》2025]\n2. **抑郁症**：舍曲林+五行针灸 vs 单用舍曲林，治疗组HAM-D评分更低、5-羟色胺水平更高（P<0.05）[来源：《光明中医》2024]\n3. **慢性广泛性疼痛**：中国临床试验注册（ChiCTR2200061878），每周1次×12次+12周随访\n\n### 2.6 五行针灸与公主陛下临床方向的结合点\n\n1. **卵巢早衰/更年期**：多属水行失衡（肾不藏精）或木行失衡（肝失疏泄），五行针灸从护持一行入手调神+调体\n2. **身心同治**：公主陛下是五行针灸身心同治医生，五行针灸正是此方向的核心技法——先调神（内七龙/AE祛邪），再调体（扶助主管穴）\n3. **与董氏奇穴互补**：董氏偏\"调气治体\"（妇科穴+还巢穴直达胞宫），五行针灸偏\"调神治心\"（主行诊断+原穴扶正），两者结合可实现身心同治的完整方案\n4. **操作规范**：首次治疗需完成三步（内七龙→AE→扶助主管穴），后续治疗两步（通阻滞→扶助主管穴），每次治疗约30-40分钟\n\n---\n\n## 三、今日学习总结\n\n### 核心收获\n1. **董氏奇穴妇科穴组**：妇科穴+还巢穴是妇科第一要穴组合，倒马针法+左右交替取穴，对痛经/月经不调/不孕/子宫肌瘤均有特效\n2. **五行针灸临床流程**：首次三步（祛内障→祛AE→扶原穴），后续两步（通阻滞→扶原穴），核心是判断护持一行\n3. **两者互补关系**：董氏调气治体，五行调神治心，合则身心同治\n\n### 待深挖\n- [ ] 董氏奇穴：还巢穴详细定位与操作、下三皇穴组、姐妹穴定位\n- [ ] 五行针灸：五输穴配五行详细推演、各主行的时令穴应用\n- [ ] 美容针灸（下周五）\n- [ ] 艾灸/火龙灸操作规范（下周五）\n- [ ] 中药灌肠方与针灸配合方案\n\n---\n\n*参考来源：《董氏针灸正经奇穴学》、中国临床试验注册中心ChiCTR2200061878、《五行针灸指南》（中国中医药出版社2014）、《五行针灸治疗模式》（2017）、《国际临床研究杂志》2025、《光明中医》2024*\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-29", "name": "五行针灸体系详解", "desc": "五行诊断+配穴法则", "content": "# 五行针灸体系详解\n\n## 一、五行针灸是什么\n\n五行针灸是以\"五行\"为诊断和治疗核心、**身心同治**的经典针灸流派。它不同于常见的TCM针灸——不辨证型（不辨寒热虚实），而是找出每个人的护持一行，针对性扶持，所有症状便会逐步好转。\n\n**核心主张**：每个人五行俱全，但有一行是主旋律、是底色，称为\"护持一行\"（Causative Factor, CF），像DNA一样终生不变。这一行不是\"最弱的\"，而是这个人的核心——人只有做自己的那一行才是最健康的；一旦这一行失衡，身心才会出问题。治疗只针对CF，帮人做回自己，不需要对症取穴。\n\n## 二、源流\n\n- 理论根基：《黄帝内经》《难经》《灵枢·阴阳二十五人》\n- 近代集大成者：英国华思礼教授（J.R. Worsley, 1923-2003），1950s在台、新、韩学得此法，获\"Master\"称号后带入西方\n- 回传中国：诺娜·弗兰格林（Nora Franglen）为华思礼弟子，将五行针灸带回中国传播\n\n## 三、核心概念\n\n### 1. 护持一行（Causative Factor / CF）\n\n- 每个人五行俱全，但有一行是主旋律、底色，像DNA一样终生不变\n- 这一行不是\"最弱的\"，而是这个人的核心——做自己那一行时最健康，失衡时身心才出问题\n- 失衡时，其他四行也会受影响（一荣俱荣、一损皆损）\n- 治疗只针对CF，不是哪个症状扎哪个穴\n- CF诊断依据：气味、面色、声音、情绪（四诊中尤其重视这四项）\n\n### 2. 五行对应关系\n\n| | 木 | 火 | 土 | 金 | 水 |\n|---|---|---|---|---|---|\n| **脏腑** | 肝/胆 | 心/小肠+心包/三焦 | 脾/胃 | 肺/大肠 | 肾/膀胱 |\n| **情绪** | 怒 | 喜 | 思(忧) | 悲 | 恐 |\n| **声音** | 呼喊 | 笑 | 歌 | 哭 | 呻吟 |\n| **面色** | 青/绿 | 红 | 黄 | 白 | 蓝/黑 |\n| **气味** | 酸腐/油脂味 | 焦味 | 甘甜/芳香 | 腥味 | 腐败/朽味 |\n| **季节** | 春 | 夏 | 长夏 | 秋 | 冬 |\n| **脉象** | 弦长 | 洪大 | 缓滑 | 浮涩 | 沉细 |\n\n### 3. 七大能量阻滞（Energetic Blocks）\n\n治疗CF之前，必须先清除阻滞，否则治疗无效。按优先级排列：\n\n1. **附体（Possession）**——内七龙/外七龙清除。患者\"眼神无神\"、仿佛被控制\n2. **邪气（Aggressive Energy, AE）**——沿克 cycle 传播的毒邪，必须通过背俞穴测试+引流清除\n3. **夫妻不和（Husband/Wife Imbalance）**——左右手脉象严重失衡\n4. **脐脉（Umbilical Pulse）**\n5. **Akabani失衡**——经脉左右敏感性差异\n6. **出入阻滞（Entry/Exit Block）**——经气在两经交接处不通，最常见\n7. **神层面阻滞（Spirit Level Block）**——KI24/HT1/CV1\n\n## 四、诊断方法\n\n### 核心四诊（气味、面色、声音、情绪）\n\n**气味**：五行针灸最独特的诊断手段。一个人CF失衡后，身体会散发特定气味：\n- 木：酸腐/旧油脂味（如橄榄油、羊膻味）\n- 火：焦味/烧焦味\n- 土：芳香/甜味\n- 金：腥味/腐臭味\n- 水：朽败/陈腐味\n\n**面色**：观察眼周外侧透出的颜色（非人种肤色）\n\n**声音**：不管音量大小，关注声音的\"质感\"：\n- 木：指责/命令的质感\n- 火：笑/缺乏笑的质感\n- 土：歌唱/寻求同情的质感\n- 金：哭泣/哀伤的质感\n- 水：呻吟/低吟的质感\n\n**情绪**：\n- 木失衡：过度愤怒或完全无法愤怒\n- 火失衡：过度兴奋或毫无喜悦\n- 土失衡：过度担忧/寻求或完全封闭\n- 金失衡：过度悲伤或完全无感\n- 水失衡：过度恐惧或麻木\n\n### 脉诊\n\n遵循《难经》脉法，与TCM脉位有差异。用于：\n- 判断CF的虚实（决定补泻）\n- 检测各种阻滞\n- 监测治疗效果\n\n## 五、治疗流程\n\n### 首次治疗\n\n1. **内七龙（Internal Dragons）**——清除附体\n   - 穴位：鸠尾CV15 + 天枢ST25(双) + 伏兔ST32(双) + 解溪ST41(双)\n   - 从上到下、从右到左进针，泻法，留针5min观察红晕\n   - 如有红晕，等红晕退尽再出针；无红晕则即出\n\n2. **AE清除**——清除邪气\n   - 穴位：肺俞BL13 + 厥阴俞BL14 + 心俞BL15 + 肝俞BL18 + 脾俞BL20 + 肾俞BL23（双侧）\n   - 浅刺（刚入皮即可），留针5min观察红晕\n   - 有红晕=有AE，等红晕退尽出针，不压针孔\n   - 心俞最后单独测试\n\n3. **扶助主管穴**——扶持CF\n   - 取CF对应的原穴（如木行取丘墟+太冲）\n   - 每穴先麦粒灸3壮，再进针补法，不留针\n\n### 后续治疗\n\n1. **通阻滞**——脉诊判断有无阻滞，有则疏通\n   - 常见阻滞：瘢痕、任督、夫妻不和、各经出入阻滞\n2. **扶助主管穴**——同首次第3步\n\n### 治疗频率\n\n- 初期每周1次\n- 好转后→2周1次→1月1次→更长\n- 用穴极少，刺激极轻\n\n## 六、五行针灸 vs TCM针灸\n\n| 维度 | 五行针灸 | TCM针灸 |\n|------|---------|---------|\n| 诊断核心 | 护持一行（CF） | 辨证型（寒热虚实） |\n| 取穴 | 极少（原穴为主） | 较多（辨证配穴） |\n| 治疗目标 | 扶持CF=治本 | 对症+对因 |\n| 身心关系 | 身心同治，调神为重 | 身体为主 |\n| 诊断手段 | 气味/面色/声音/情绪 | 望闻问切+舌脉 |\n| 灸法 | 麦粒灸3壮/穴 | 悬灸/温针灸等 |\n| 治疗频率 | 每周1次起 | 每周2-3次 |\n| 理论来源 | 《内经》《难经》+口传 | 《内经》+后世发展 |\n\n## 七、临床适应症\n\n- 焦虑症、抑郁症、失眠\n- 皮肤病\n- 亚健康状态\n- 慢性疼痛、月经不调\n- 胃肠道功能紊乱\n- 恶性肿瘤/脑卒中患者情绪改善\n- **特别擅长身心疾病**\n\n## 八、与公主陛下抗衰中心的结合点\n\n1. **情绪-衰老轴**：五行针灸调神，直接对应PPT中\"七情皆可催老\"的逻辑\n2. **女性患者**：木行（怒伤肝→卵巢早衰）、水行（恐伤肾→生殖衰退）患者常见\n3. **身心同治**：抗衰不仅是身体层面的，五行针灸的调神可以作为\"外治调养\"的一种\n4. **少穴轻刺激**：适合恐惧针灸的女性来访者\n5. **每周1次**：与抗衰管理套餐节奏匹配\n\n## 参考文献\n\n- 华思礼《Classical Five Element Acupuncture》系列\n- 诺娜·弗兰格林《五行针灸指南》中国中医药出版社2014\n- 《五行针灸治疗模式》中国中医药出版社2017\n- Jacobs TL et al. Intensive meditation training, immune cell telomerase activity, and psychological mediators. Psychoneuroendocrinology. 2011\n- Gumenick NR. Five-Element Acupuncture: Blocks to Healing, Causative Factors, and Diagnostic Correspondences. Med Acupunct. 2015\n- ChiCTR2200061878 五行针灸治疗慢性原发性头痛临床试验方案\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-29", "name": "五行针灸八课课件笔记", "desc": "八课完整笔记", "content": "# 五行针灸八课课件笔记\n\n> 来源：五行针灸学会授权课程·基础二阶（实操）·开心工作室\n> 讲师：于超\n\n---\n\n# 第一课：五行针灸诊疗框架和基本操作\n\n## 课程概述\n\n### 课程体系\n\n| 课程级别 | | 课程名称 |\n|---------|---|---------|\n| 基础 | 一阶 | 五行针灸基础理论课程 |\n| 基础 | 二阶 | 五行针灸基础实操课程 |\n| 基础 | 可选 | 五行针灸基础临床带教课程 |\n| 中级 | | 五行针灸提高班 |\n| 高级 | | 五行针灸高级临床带教班 |\n\n### 学习目标\n- **线上目标**：掌握五行针灸的治疗框架、诊断、治疗等操作，具备五行针灸治疗所需的单项技能操作能力\n- **线下目标**：具备五行针灸治疗能力\n\n> ⚠️ 参加线下课前，不开展治疗活动\n\n### 学习方法\n1. 记笔记\n2. 相互学习\n3. 记录问题\n\n---\n\n## 诊疗框架\n\n### 形、气、神三位一体\n\n```\n      饮食/作息        人际关系/家庭关系/生活压力/工作压力/突发事件/疾病\n          ↓                    ↓\n       【气】              【神】\n      能量              心神、精神、头脑、思维、神魂魄意志\n         ↓                    ↓\n    【形】躯体化表现    【神】面对的态度/处理方式\n    物质、肉体\n```\n\n### 五行针灸的入手点\n\n> 从调神入手：神役气、气役形 → 治人\n\n### 经典依据\n\n> 凡刺之真，必先治神。——《素问·宝命全形论》\n>\n> 凡刺之法，先必本于神。——《灵枢·本神》\n>\n> 小针之要，易陈而难入，粗守形，上守神。——《灵枢·九针十二原篇》\n>\n> 用针之要，无忘其神。——《灵枢·官能》\n>\n> 用针之道，下以疗病，上以养神。其养神者，长生久视，此大圣之大意。——《黄帝内经太素》\n>\n> 若夫法天则地，随应而动，和之者若响，随之者若影，道无鬼神，独来独往。——《素问·宝命全形论》\n>\n> 用针之要，在于知调阴与阳。调阴与阳，精气乃光，合形与气，使神内藏。——《素问·根节》\n\n### 诊室看诊状态\n\n> 闭户塞牖，系之病者，数问其情，以从其意，得神者昌，失神者亡。——《素问·移精变气论》\n\n### 实操四会\n\n| 形而上（心法） | 形而下（技法） |\n|---------------|---------------|\n| 感受五行 | 检查 |\n| 与人相处 | 治疗 |\n\n> 利人利己、圣人行之、愚者佩之\n\n---\n\n## 生理、病理和诊疗框架\n\n### 生命与病理\n\n```\n            【有】━━━━━━━━━━━━━━━━━━━【无】\n                ↓\n    【形】                    【气】              【神】\n皮肉筋骨脉、经络、      神魂魄意志\n五脏六腑、七情……\n```\n\n### 各个层面的阻滞\n\n1. 经络左右平衡\n2. 经络内部不通\n3. 经络衔接不通\n4. **夫妻不和·阴阳失衡**\n5. **邪气·五脏受邪**（AE）\n6. **内障·神形隔离**\n\n> 经脉者，所以行血气而营阴阳、濡筋骨，利关节者也。——《灵枢·本藏》\n\n### 诊疗框架\n\n```\n                    诊断五行              通阻滞              扶持主导一行\n                 声音、颜色、         出入阻滞、           御精神、\n    【形】←──  气味、情志       夫妻不和、AE、      收魂魄、和喜怒\n                                  内七龙针法              ↓\n                                                      扶持主导一行\n                 诊断五行 ←──────── 通阻滞 ←──────── 扶持主导一行\n```\n\n---\n\n## 基础课必须掌握的穴位定位\n\n### 不同层面的阻滞\n- **五脏受邪**：AE\n\n### 扶持主导一行\n- 部分神性穴\n- **主管穴：原穴**\n\n### 学习资源\n1. 实操手册\n2. 盖老师穴位定位视频（www.wuxingzhenjiuxuehui.cn）\n3. \"大家中医\"APP\n\n### 与通行定位不同的穴位\n1. 见实操手册上的穴位清单\n2. 胃经在腹部的穴位在前正中线旁开3寸（比通行+1寸）\n3. 肾经在腹部的穴位在前正中线旁开1.5寸的位置（比通行+1寸）\n\n---\n\n## 基本操作技法\n\n### 艾灸\n\n有两种调节穴位能量流动的基本方法：\n1. 用极细的针刺入穴位\n2. 艾灸，可以温暖穴位\n\n**灸法**：将麦粒大小的艾柱置于穴位上，点燃后艾柱缓慢燃烧。艾绒的热量和植物特性为穴位提供效力。\n\n- 艾灸的壮数在手册中用△表示\n- △后面紧跟数字，标注两个数字时，例如△3-7，代表根据需求程度施以的最小和最大壮数\n\n**禁灸穴位**：\n- △X代表禁灸\n- △X Pi代表孕期禁灸，即从怀孕第i个月开始禁灸\n\n**麦粒灸应用场景**：\n- 神性穴\n- 主管穴\n- 禁灸穴位除外\n\n### 针刺时针灸师的状态\n\n> 凡刺之真，必先治神，五脏已定，九候已备，后乃存针，众脉不见，众凶弗闻，外内相得，无以形先，可玩往来，乃施于人。人有虚实，五虚勿近，五实勿远，至其当发，间不容瞚。手动若务，针耀而匀。静意视义，观适之变，是谓冥冥，莫知其形。见其乌乌，见其稷稷，从见其飞，不知其谁。伏如横弩，起如发机。——《素问·宝命全形论》\n\n### 针刺深度和禁针\n\n- 在书中，针刺用符号⊥表示\n- 某些穴位使用有禁忌\n  - 大写字母X代表禁用\n  - 大写字母XP i代表，此穴位从怀孕第i个月开始禁针\n  - XP后面会标注一个数字，例如XP4表示从怀孕第四个月起禁针\n\n---\n\n# 第二课：内障的内涵、诊断和治疗\n\n## 课程提纲\n1. 内障的定义和内涵\n2. 内障的诊断和治疗\n\n---\n\n## 内障的定义、原因、内涵\n\n### 定义\n\n> 形与神俱，以尽终其天年。——《素问·上古天真论》\n\n**内障**：长期或突发压力导致人的\"神\"陷入自我保护状态，与周围失去联系，陷入一片空白之中。\n\n### 可能的原因\n- 长期精神压力\n- 突发精神创伤\n\n### 内涵\n\n```\n  身体 ←──────── 内障 ────────→ 神\n（自我保护机制）\n```\n\n---\n\n## 内障的诊断\n\n### 唯一诊断标准\n\n> 卧位检查，以己之神会彼之神，却视之无物（空洞感）\n\n### 诊断方法\n\n1. 专注于病人与你对视的那只眼，用心凝视病人的眼，与病人的神取得联系\n2. **没有内障**：病人感到不安、眨眼、微微躲开视线、有内容\n3. **有内障**：不会有任何反应，你感到自己面对一片空白，或如临深渊（空洞感）\n\n### 诊断线索\n\n1. 眼神跟随不顺利、突然瞪眼等（水）、不与人眼神对视（水）\n2. 奇怪的表现或行为异常（与现实情境不匹配的表现、身体不经意刻板动作或思维障碍）\n   - 极端病例：病人自己会说被其他力量左右\n3. 不能真正接近这个人，当我们试图接近时，会有一种空洞感（在情感上没有办法建立一个真实的互动、或莫名不安感）\n4. 病人自己感觉自己似乎无法与周围正常链接，似乎不能肯定周围究竟是怎么回事\n\n---\n\n## 内障治疗取穴：鸠尾、天枢、伏兔、解溪\n\n### 穴位定位\n\n#### 鸠尾穴（XIII15）\n- **位置**：任脉-前正中线上\n- **定位优先级**：\n  1. 剑突顶点下方凹陷处（注：剑突是两肋骨交接处凹陷即中庭穴往下的软骨，按压可动）\n  2. 摸不到剑突者，脐上7寸（注：肚脐到中庭穴的距离是8寸，取7/8处）\n- **针刺**：⊥3-5\n\n#### 天枢穴（XI25）\n- **位置**：腹部，正中线旁开3寸平脐中线，腹直肌外缘\n- **注**：天枢穴的通行定位是旁开2寸\n- **针刺**：⊥5\n\n#### 伏兔穴（XI32）\n- **位置**：大腿前面，股前区\n- **针刺**：⊥5\n\n#### 解溪穴（XI41）\n- **位置**：足背踝横纹中央凹陷处，拇长伸肌腱与趾长伸肌腱之间\n- **针刺**：⊥5\n\n---\n\n## 内障治疗：内七龙针法\n\n### 进针\n- 直刺\n- 每一针得气，强烈泻法（逆时针）\n- 从上到下，从右到左\n- 留针（最长20分钟）\n\n### 出针\n- 强烈补法（顺时针）\n- 每一针得气\n- 从上到下，从左到右\n\n---\n\n## 针后注意事项\n\n1. 了解内障产生的原因\n2. 重新判断主导一行，给予深刻而密切的治疗\n3. 重新做AE\n\n---\n\n# 第三课：AE（邪气）的内涵、诊断和治疗\n\n## 课程提纲\n1. 出入阻滞的诊断（脉、症）\n2. 出入阻滞的治疗\n\n---\n\n## AE（Aggressive Energy）定义和内涵\n\n### 定义\n\n**邪气**的出现是由于长期精神压力或精神创伤作用于五行中的一行，削弱其防御能力的结果。邪气通过相克路线进行破坏性循环。\n\n> 志意和则精神专直，魂魄不散，悔怒不起，五脏不受邪矣。——《灵枢·本藏》\n\n---\n\n## AE的诊断\n\n### 诊断标准\n\n治疗后出现红晕\n\n---\n\n## AE——治疗取穴\n\n### 四个标志点\n\n1. **大椎**：0\n2. **肩胛内缘**：3\n3. **髂骨上缘**：16\n4. **腰最细处**：14\n\n### AE治疗取穴\n\n| 穴位 | 定位 |\n|-----|-----|\n| 肺俞 | 第3胸椎棘突下 |\n| 心包俞 | 第4胸椎棘突下 |\n| 心俞 | 第5胸椎棘突下 |\n| 肝俞 | 第9胸椎棘突下 |\n| 脾俞 | 第11胸椎棘突下 |\n| 肾俞 | 第14胸椎棘突下 |\n\n> 督脉旁开尺寸：1/1.5/2/2.5寸\n\n---\n\n## AE——治疗操作\n\n### 体位\n- 放松坐位，掌心朝上放于大腿上，或侧卧位\n\n### 针刺\n- 浅刺绝皮\n- 对照针\n\n### 手法\n- 以手探汤\n\n### 起针\n- 轻按针孔附近皮肤，直接起针、不闭针孔\n\n### 指征\n- 红晕（过敏）\n- 体感\n- 皮温\n- 汗\n\n---\n\n## AE回顾\n\n| 内涵 | 诊断 | 治疗 | 何时 |\n|-----|-----|-----|-----|\n| 五脏受邪 | 治疗后的红晕 | 五脏俞+厥阴俞（心包俞）3/4/5 9/11/14 浅刺绝皮，以手探汤 | 第一次治疗 内障后 重大打击后 治疗没有起效 |\n\n---\n\n## 何时AE\n\n### 开展AE的条件\n\n1. **任何人的第一次五行针灸治疗**\n2. **祛除内障后**\n3. 主导一行长期（3个月）没有得到足够的扶持\n4. **突然的新的打击或持续的压力**\n5. 胸部、上背部疼痛\n6. 背俞区周围，尤其在肺俞、心包俞和心俞区肌肉紧张。或以上区域皮肤出现红斑\n7. 背俞穴进针处有白色凹陷，针尖好像被皮肤吸入，针孔周围随即出现红斑\n8. **情绪不稳、易哭**\n9. **治疗没有起效，怀疑取穴不准**\n\n---\n\n## AE注意事项\n\n### 预防晕针\n- 询问有无晕针史、是否吃饭\n\n### 防止引邪入深\n- 治疗结束注意保暖防风\n\n### 洗澡\n- 两小时后可洗澡\n\n### ⚠️ 治疗前后24小时不饮酒\n\n---\n\n# 第四课：夫妻不和的内涵、诊断和治疗\n\n## 课程提纲\n1. 脉诊\n2. 夫妻不和的定义和内涵\n3. 夫妻不和的诊断和治疗\n\n---\n\n## 脉诊——脉位\n\n### 定位出自《难经》\n\n### 脉位对应脏腑\n\n| 五脏六腑 | 功能 |\n|---------|-----|\n| 肺 | 相傅之官 |\n| 大肠 | 传道之官 |\n| 胃 | 仓廪之官 |\n| 脾 | 谏议之官 |\n| 心 | 君主之官 |\n| 小肠 | 受盛之官 |\n| 膀胱 | 州都之官 |\n| 肾 | 作强之官 |\n| 心包 | 臣使之官 |\n| 三焦 | 决渎之官 |\n| 胆 | 中正之官 |\n| 肝 | 将军之官 |\n\n### 左右手脉位\n\n**左手**：\n- 寸：浮取→小肠，沉取→心\n- 关：浮取→胆，沉取→肝\n- 尺：浮取→膀胱，沉取→肾\n\n**右手**：\n- 寸：沉取→肺，浮取→大肠\n- 关：沉取→脾，浮取→胃\n- 尺：沉取→心包，浮取→三焦\n\n### 脉诊要点\n1. 使用指尖而非指腹\n2. 双手侯脉\n3. 每步治疗后均须号脉\n\n---\n\n## 脉诊提示\n\n### 能提示\n- 身心整体虚实情况\n- 十二脏腑间相对气血虚实状况\n- **夫妻不和脉**\n- **十四经络间阻滞**\n\n### 不能提示\n- 主导一行（治疗前后）\n\n> ⚠️ 每一步治疗前后均须号脉\n\n---\n\n## 夫妻不和——内涵\n\n### 定义\n\n**夫妻不和**：阴阳失衡\n\n> 阴平阳秘，精神乃治；阴阳离决，精气乃绝。——《素问·生气通天论》\n\n### 原因\n- 某种创伤、打击\n- 人与人的冲突、不愉快（心难以主宰局面）\n- 气血的阴阳失衡\n\n---\n\n## 夫妻不和——诊断\n\n### 症状\n- 无望、绝望、放弃、无眼神光\n- 隐匿\n\n> \"我坚持不下去了\"、\"我想放弃\"、\"我看不出活着还有什么意义\"\n\n### 脉象\n- 左脉明显小于右脉\n- 尤其是心、小肠脉甚弱（挣扎生存）\n- 右手三部脉出人意料的有力，使病人给我们绝望、无可奈何之感\n\n---\n\n## 夫妻不和——取穴\n\n### 穴位\n\n| 序号 | 穴位 | 说明 |\n|-----|-----|-----|\n| 1 | 至阴 | 金→水，腑 |\n| 2 | 复溜 | 金→水，脏 |\n| 3 | 太溪 | 土→水 |\n| 4 | 中封 | 金→木 |\n| 5 | 腕骨 | 火 |\n| 6 | 神门 | 火 |\n\n### 五行生克关系\n\n```\n      木 → 火 → 土 → 金 → 水 → 木\n            ↑                   ↓\n            └─────── ← ───────┘\n```\n\n---\n\n## 夫妻不和回顾\n\n| 内涵 | 诊断 | 治疗 | 何时 |\n|-----|-----|-----|-----|\n| 阴阳失衡 | 脉症相符 | 至阴、复溜、太溪、中封、腕骨、神门 | 新手：第三次开始 严重病人：发现即治疗 |\n\n---\n\n# 第五课：经络阻滞\n\n## 课程提纲\n1. 出入阻滞的诊断（脉、症）\n2. 出入阻滞的治疗\n\n---\n\n## 十二正经分类\n\n### 阳经\n\n| 六经 | 手 | 足 |\n|-----|----|----|\n| 太阳 | 小肠经 | 膀胱经 |\n| 少阳 | 三焦经 | 胆经 |\n| 阳明 | 大肠经 | 胃经 |\n\n### 阴经\n\n| 六经 | 手 | 足 |\n|-----|----|----|\n| 太阴 | 肺经 | 脾经 |\n| 厥阴 | 心包经 | 肝经 |\n| 少阴 | 心经 | 肾经 |\n\n---\n\n## 出入阻滞的诊断\n\n### 循行方向上的诊断\n\n```\n肺经 → 大肠经 → 胃经 → 脾经 → 心经 → 小肠经\n                                              ↓\n                肾经 ← 膀胱经 ← 肝经 ← 胆经 ← ┘\n```\n\n### 出入阻滞\n\n刺上经出口穴 + 下经入口穴\n\n### 分裂脉\n- 刺络穴\n\n---\n\n## 出入阻滞汇总\n\n| 阻滞 | 取穴 |\n|-----|-----|\n| 小肠膀胱 | 听宫、晴明 |\n| 三焦胆 | 耳和髎、瞳子髎 |\n| 大肠胃 | 迎香、承泣 |\n| 肝肺 | 期门、中府 |\n| 脾心 | 大包、极泉 |\n| 肾心包 | 步廊、天池/天泉 |\n| 任督 | 会阴、长强、承浆、龈交 |\n\n---\n\n## 出入阻滞的诊断——症状\n\n### 肝肺阻滞\n\n**身体症状**：胸部（乳房）紧痛、胃肠不适、干咳等\n\n**心理症状**：压抑的愤怒、生闷气、无希望、生机、下一步。放不下，走不出等\n\n**取穴**：期门、中府\n\n---\n\n### 脾心阻滞\n\n**身体症状**：消化系统（腹胀、便溏、纳差或易饿）、胸腔乳房、淋巴结问题等\n\n**心理症状**：爱不出或不入、与母亲关系、钻牛角尖等\n\n**取穴**：大包、极泉\n\n---\n\n### 肾心包阻滞\n\n**身体症状**：心悸、胸闷、乳腺、妇科囊肿、肾经区水肿、泌尿生殖等\n\n**心理症状**：不承认恐惧、过度恐惧；难建立亲密关系完全开放或设防等\n\n**取穴**：步廊、天池（天泉）\n\n---\n\n### 阴经阻滞\n\n**脏结**：肝、脾、肾、肺、心包 + \"心\"结\n\n---\n\n### 小肠膀胱阻滞（太阳不开）\n\n**身体症状**：外感、头颈肩背疼痛、头面部（头、咽、耳、眼）、泌尿系等\n\n**心理症状**：不愿听、看或听不清、看不清；不能筛选、分类、选择、表达不清等\n\n**取穴**：听宫（张口）、睛明（鼻子方向，⊥3，眼泪）\n\n> 观察：经气进入水的一行，身体会轻松，因为小肠分清泌浊的压力放松，且耳部到眼部的压力放松；温和的照顾到病人可能出现的情绪\n\n---\n\n### 大肠胃阻滞（阳明不合）\n\n**身体症状**：眼耳鼻症状、花粉过敏症、眼袋、便秘或腹泻等\n\n**心理症状**：放不下、长期悲哀难解、缺少灵感等\n\n**取穴**：迎香、承泣\n\n> 观察：放下往事；温和的照顾到病人可能出现的情绪\n\n---\n\n### 三焦胆阻滞（少阳枢机不利）\n\n**身体症状**：偏头痛、肩痛、耳、口苦、咽干、目眩、寒热往来或手足冷等\n\n**心理症状**：思维不灵活、缺乏视野等\n\n**取穴**：耳和髎、瞳子髎\n\n---\n\n### 如何判断症状所属经络\n\n1. **经络辨证**\n   - 经络所过，主治所及\n   - 经络功能\n2. 经络所属五行\n3. 六经辨证\n\n---\n\n## 任督不通\n\n### 原因\n- 生产、妇科手术、童年手术、摔跤……\n\n### 诊断\n\n**身体**：难以恢复的疲劳、全身多器官功能逐渐衰退、严重肥胖、不孕不育、流产、多系统症状、慢性多关节疼痛等\n\n**心**：心里的无力、无助感\n\n**脉**：六部脉俱沉弱无力、或弦紧（脉症不符）\n\n### 取穴\n- 会阴、长强、承浆、龈交\n\n### 针后\n- 脉、人\n\n---\n\n## 练习：以下症状可能是哪些阻滞\n\n1. 受凉出现打喷嚏、流鼻涕、怕冷 → 小肠膀胱阻滞\n2. 侧面位置头痛 → 三焦胆阻滞\n3. 过敏性鼻炎正在发作 → 大肠胃阻滞\n4. 吃坏肚子了，正在拉肚子 → 大肠胃阻滞\n5. 吃多了，大便不通 → 大肠胃阻滞\n6. 有难以放下的情绪 → 肝肺阻滞\n7. 有一件事情想也想不通，放也放不下，钻牛角尖 → 脾心阻滞\n8. 心悸胸痛 → 肾心包阻滞\n\n---\n\n## 检查——汇总\n\n| 分类 | 目的 | 阻滞层次 | 检查手段 |\n|-----|-----|---------|---------|\n| 核心检查 | 内障 | 神 | 眼睛 |\n| 核心检查 | 邪气 | 五脏 | 治疗与检查合并 |\n| 核心检查 | 夫妻不和（阴阳不和） | 阴阳 | 脉 + 症 |\n| 核心检查 | 14经络出入阻滞 | 经络 | 脉 + 症 |\n| 核心检查 | | | 把脉 |\n| 辅助检查 | 三焦平衡 | 三焦 | 以手触碰三焦皮肤温度 |\n| 辅助检查 | 左右平衡 | 左右 | 中央动脉 |\n| 辅助检查 | 左右平衡 | 左右 | 赤羽氏测试 |\n| 辅助检查 | 脏腑气血平衡 | 气血 | 扪诊募穴 |\n| 辅助检查 | 经络内部阻滞 | 经络 | 瘢痕 + 症状 |\n\n---\n\n## 本讲要点\n\n1. **背会出入阻滞的名称**（必须掌握）\n2. **每对阻滞对应的脉象**（应该掌握）\n3. 每个阻滞对应的症状（完全不要求）\n4. 背会治疗出入阻滞的穴位（可选）\n5. 找到穴位的位置（不要求）\n\n---\n\n# 第六课：神性穴扶持主导一行\n\n## 课程提纲\n1. 神性穴在治疗中的地位\n2. 如何选择神性穴\n3. 初期治疗常用的神性穴\n\n---\n\n## 治疗框架\n\n```\n通阻滞（清扫道场）\n├── 1. 内障 → 内七龙针法 / 浅刺绝皮\n├── 2. AE → 补法\n├── 3. 夫妻不和 → 补法\n└── 4. 出入阻滞（辅助）→ 补法\n\n扶持主导一行（神性穴/背俞穴+主管穴）\n├── 神性穴（辅助）\n├── 背俞穴（有条件）\n└── 主管穴\n    ├── 1. 原穴\n    ├── 2. 母穴（有条件）\n    └── 时令穴\n```\n\n---\n\n## 神性穴\n\n### 定义\n- 连通人与天地的穴位\n- 对神有强大的扶助力量\n- 相对主管穴属辅助作用\n\n### 选穴原则\n- **一次只选择一个**（选穴第一原则：极简原则）\n- 给病人需要的\n\n> 至其当发，间不容瞚。——《素问·宝命全形论》\n\n---\n\n## 常用神性穴（初期各行可用）\n\n| 穴位名称 | 针刺深度 | 艾灸壮数 | 位置 |\n|---------|---------|---------|-----|\n| 神阙 | ×（禁灸） | 3-30 | 脐中央 |\n| 巨阙 | 6 | 7-15 | 脐中上6寸 |\n| 灵墟 | 3 | 5 | 第3肋间隙，前正中线旁开2寸，与玉堂相平 |\n| 魄户 | 5 | 7-15 | 正中线旁开4寸，T3棘突下（3、4肋间） |\n| 膏肓 | 3 | 7-50 | 正中线旁开4寸，T4棘突下（4、5肋间） |\n| 神堂 | 3 | 5 | 正中线旁开4寸，T5棘突下（5、6肋间） |\n\n> ⚠️ 通常放在第二次及之后使用\n\n---\n\n## 神性穴——初期——各行通用\n\n### 神阙\n- **位置**：脐中\n- **功效**：用于治疗任何阶段、五行均可使用、神气很弱神不安时可用\n- **操作**：只灸\n\n### 巨阙\n- **位置**：脐中上6寸\n- **功效**：作用稍胜神阙、治疗各个时期都可应用，中后期用可作为神阙跟进治疗、五行均可应用，对火尤为重要\n\n---\n\n## 神性穴——初期——土和金\n\n| 属性 | 穴位 |\n|-----|-----|\n| 土 | 地机 |\n| 土 | 滑肉门 |\n| 金 | 经渠 |\n\n### 地机\n- **位置**：小腿内侧，内踝尖上9寸，胫骨内侧缘\n- **操作**：翻动，挖掘\n- **功效**：用于板滞的土，助其松动\n\n### 滑肉门\n- **位置**：脐上1寸，正中旁开3寸\n- **功效**：润土，助水谷腐熟、用于松散，沙粒之土\n\n### 经渠\n- **位置**：在前臂掌面桡侧，太渊上1寸，桡动脉搏动处\n- **功效**：助金清除垃圾、使肺得以吸纳清气\n\n---\n\n## 神性穴——中后期\n\n### 神封、神藏\n- **神封**：第四肋间，正中旁开2寸\n- **神藏**：第二肋间，正中旁开2寸\n- **功效**：神的仓库，被封藏的地方、助神与外界沟通\n\n---\n\n## 扶神穴——中后期——木行用\n\n### 期门\n- **位置**：当乳头直下，中脘与建里中点的水平线上\n- **功效**：木之门户、使木枝与天气相接，不知枯萎、赋予期望、希望\n\n---\n\n## 扶神穴——中后期——相火用\n\n### 劳宫\n- **位置**：在手掌心，当第3、4掌骨之间，近侧掌横纹上\n- **功效**：慰藉劳顿\n\n---\n\n## 扶神穴——中后期——君火用\n\n### 极泉\n- **位置**：在腋窝顶点，腋动脉搏动处\n- **功效**：万物之源泉、用于内心深感与世隔绝，无法与周围的人沟通\n\n---\n\n## 扶神穴——中后期——水行用\n\n### 俞府\n- **位置**：锁骨下缘，正中旁开2寸\n- **功效**：藏神之府\n\n---\n\n## 神性穴扶持主导一行——回顾\n\n### 心法\n1. \"至其当发，间不容瞚\"，给病人需要的\n2. 不要夸大神性穴的作用，不要太纠结穴位的选择\n\n### 术\n1. 神性穴属于治疗中扶持主导一行的组成部分\n2. 初期常用的神性穴\n\n---\n\n# 第七课：主管穴扶持主导一行\n\n## 课程提纲\n1. 主管穴在治疗中的地位\n2. 主管穴包括哪些\n3. 如何选择主管穴\n\n---\n\n## 主管穴在治疗中的地位\n\n1. 主管穴是扶持主导一行的核心基础穴位\n2. 主管穴直接作用于十二官\n3. 治疗的最后一步：一旦把理解之心、温暖之情全部注入给主导一行，仅主管穴足以\n\n---\n\n## 主管穴包括哪些\n\n1. **原穴**（最重要）\n2. 经气转化（母穴、祖母、曾祖母）\n3. **时令穴**\n4. 络穴\n5. 五输穴\n\n---\n\n## 原穴——针刺调神，原穴为要\n\n> 黄帝曰：气独行五脏，不荣六腑，何也？岐伯答曰：气之不得无行也，如水之流，如日月之行不休，故阴脉荣其脏，阳脉荣其腑，如环之无端，莫知其纪，终而复始。其流溢之气，内溉脏腑，外濡腠理。\n>\n> 刺法论篇第七十二（遗篇）\n>\n> 归根曰静，静曰复命，复命曰常，知常曰明，不知常，妄作凶。——《道德经》\n\n### 功效\n- 最直接最深入的对五行起作用\n- 能直接了解护持一行对治疗有何反应\n- 主管穴中最重要的一组\n\n---\n\n## 原穴\n\n| 五行 | 经络 | 原穴 |\n|-----|-----|-----|\n| 木 | 胆经、肝经 | 丘墟、太冲 |\n| 君火 | 小肠经、心经 | 腕骨、神门 |\n| 相火 | 三焦经、心包经 | 阳池、大陵 |\n| 土 | 胃经、脾经 | 冲阳、太白 |\n| 金 | 大肠经、肺经 | 合谷、太渊 |\n| 水 | 膀胱经、肾经 | 京骨、太溪 |\n\n---\n\n## 经气转化（母穴、祖母）\n\n### 穴位配伍\n\n| 五行属性 | 经络 | 穴位 | 穴位类型 |\n|---------|-----|-----|---------|\n| 木 | 胆经、肝经 | 中封、光明 | 金穴、络穴 |\n| 君火 | 小肠经、心经 | 后溪、少冲 | 木穴 |\n| 相火 | 三焦经、心包经 | 中渚、中冲 | 木穴 |\n| 土 | 胃经、脾经 | 解溪、大都 | 火穴 |\n| 金 | 大肠经、肺经 | 曲池、太渊 | 土穴 |\n| 水 | 膀胱经、肾经 | 至阴、复溜 | 金穴 |\n\n---\n\n## 时令穴\n\n### 何时为时令\n\n1. **长夏分主四季中每季后18天**\n   > 脾者土也，治中央，常以四时长四藏，各十八日寄治，不得独主于时也。——《素问·太阴阳明论》\n\n2. **农历六月**\n   > 所谓长夏者，六月也。土生于火，长在夏中，既长而旺。故云长夏。——王冰补注《素问》\n\n### 时令穴的功能\n\n1. 清除本脏腑垃圾\n2. 揭示气血功能真实状况\n3. 主管穴这个层次上给病人最强有力的治疗\n\n---\n\n## 时令穴\n\n| 五行 | 经络 | 穴位 |\n|-----|-----|-----|\n| 木 | 胆经、肝经 | 足临泣、大敦 |\n| 君火 | 小肠经、心经 | 阳谷、少府 |\n| 相火 | 三焦经、心包经 | 支沟、劳宫 |\n| 土 | 胃经、脾经 | 足三里、太白 |\n| 金 | 大肠经、肺经 | 商阳、经渠 |\n| 水 | 膀胱经、肾经 | 足通谷、阴谷 |\n\n---\n\n## 络穴\n\n### 功效\n- 络穴有如表里经之间的\"内部接口\"\n- 用于纠正表里两经之间的气血不平（诊断：分裂脉）\n- 针刺弱侧络穴\n\n> 分裂脉较为少见，其中一官遭受很大压力时可能出现\n\n---\n\n## 常用选穴位清单\n\n### 颜色对应五行\n- 绿色：木\n- 红色：火\n- 黄色：土\n- 灰色：金\n- 蓝色：水\n\n### 五输穴五行配属\n- **阳井金，阴井木**\n\n> 此处数字表示从胸1向下数的数\n\n---\n\n## 如何选择主管穴\n\n| 主管穴 | 何时使用 |\n|-------|---------|\n| 原穴 | AE后、夫妻不和后、内障未清除后、任何时候 |\n| 母穴/祖母 | 母（对木是祖母）一行对应的气血不弱于本行（脉诊） |\n| 时令穴 | 一年之季节、一日之时辰 |\n| 络穴 | 分裂脉 |\n\n---\n\n# 第八课：治疗原则和前六次治疗方案\n\n## 课程提纲\n1. 选穴原则和规律\n2. 治疗规律和治疗周期\n3. 治疗方案示例\n4. 儿童治疗\n5. 针刺安全\n\n---\n\n## 选穴原则\n\n### 核心原则\n\n> 五行针灸乃术简效宏之法\n> 万物之始，大道至简，衍化至繁\n\n**用最简单的治疗**\n\n---\n\n## 选穴规律\n\n### ① 用最简单的治疗\n\n### ② 治疗的构成\n\n**清扫道场（清除阻滞）**\n- 内障（如果有）\n- AE（第一次、清内障后、主导一行长期没有得到扶持、其他可能有邪气的场景）\n- 夫妻不和（如果有）\n- 任督阻滞\n- 12正经出入阻滞（每次最多两个）\n\n**扶持主导一行**\n- 神性穴（给病人需要的）\n- 主管穴（将生命交给主导一行），在较大的治疗后，尽量选择原穴作为主管穴\n\n---\n\n## 待选穴位分组（按穴位类型划分）\n\n### 专项治疗\n- 内七龙、AE、夫妻不和、出入阻滞\n\n### 主管穴\n1. **原穴**\n2. 经气转化（母穴、祖母、曾祖母）\n3. **时令穴**\n4. 络穴\n5. 五输穴\n\n### 背俞穴、神性穴\n\n### 天窗穴、募穴\n\n> ⚠️ 注：1-6个月的五行针灸新手，仅仅使用以上两组**红色**的穴位，即能安全而有效的治疗病人，安全尤其重要。6-12个月，掌握常用的黑色穴位。\n\n---\n\n## 会选穴——进阶次第\n\n| 学习次第 | 穴位分类 |\n|---------|---------|\n| **首先掌握 1-6月的新手** | 针对各层次阻滞的穴位：内障、AE、夫妻不和、出入阻滞 **主管穴**：此为五行针灸最核心的扶持主导一行的穴位，包括原穴、时令穴、母穴、络穴、五腧穴，这些穴位只在主导一行对应经络上 **背俞穴**：与主导一行之二官直接对话的穴位，确定主导一行后使用 |\n| **逐步提高** | **神性穴**：给予病人额外的扶持，仔细考虑病人是否需要，并非固定程序 **络穴**：纠正左右气血失衡（赤羽氏测试可发现）、纠正表里经气血失衡（分裂脉） 推中央动脉 疏通经络内部的治疗（瘢痕阻滞） **天窗穴**：效力强大，不可轻易使用，治疗之初不可轻易使用 **募穴**：扪诊募穴压痛 |\n\n---\n\n## 治疗规律\n\n1. **广义治疗**：从预约开始，治疗已经展开，包括身体动作、眼神、言语、环境、身体接触等\n2. **每次治疗的构成**：清理阻滞（清扫道场）、扶持主导一行（扶神）\n3. **每个治疗步骤之后，都要号脉**（用五行针灸的脉诊方法！）、记录脉象\n4. **不留针**（治疗内障和AE除外）\n5. **永远用补法**（内障和AE除外）\n6. **清理阻滞只针不灸、扶持主导一行先灸后针**（禁灸除外）\n\n---\n\n## 治疗周期\n\n| 阶段 | 间隔 |\n|-----|-----|\n| ① 初期 | 一周一次 |\n| ② 中期 | 间隔2-4周 |\n| ③ 后期 | 间隔4-6周 |\n| ④ 保健 | 6-12周、换季、1年 |\n\n### 注释\n- **注1**：理解什么是初期、中期、后期；逐步具备判断初期、中期后期的能力\n- **注2**：严重失衡病人可能需要增加治疗频率\n- **注3**：诺娜老师建议五行针灸治疗师至少6周做一次治疗\n\n---\n\n## 治疗方案示例\n\n### 第一次治疗\n\n1. **检查并清除阻滞**\n   ① 内障检查和治疗（如果有）\n   ② 祛邪（AE）\n\n2. **扶持主导一行**：原穴\n\n---\n\n### 第二次治疗（一周后）\n\n1. **检查并清除阻滞**\n   ① 夫妻不和诊断和治疗\n   ② 出入阻滞诊断和治疗\n\n2. **扶持主导一行**\n   ① 初期神性穴（若必要）\n   ② 主管穴：原穴、时令穴或母穴\n\n> **注1**：若纠正夫妻不和，则直接以原穴结束\n>\n> **注2**：若清除任督阻滞，则一般不再清除其他出入阻滞\n>\n> **注3**：若有多个出入阻滞和其他较小的阻滞，则一般只清除2个\n\n---\n\n### 第三次治疗（一周后）\n\n1. **检查并清除阻滞**：同前\n2. **扶持主导一行**：同前\n\n> 注1-3：同前\n\n---\n\n### 第四次治疗（一周后）\n\n1. **检查并清除阻滞**：同前\n2. **扶持主导一行**\n   ① 背俞穴\n   ② 主管穴：原穴或母穴\n\n> 注1-3：同前\n\n---\n\n### 第五次、第六次治疗\n\n同前，逐步增加神性穴\n\n---\n\n## 关于选穴的忠告\n\n### 诺娜老师的忠告\n\n1. 学会以最简单的治疗开始五行针灸治疗太重要——不鼓励新手总想自动加入神性穴\n\n2. 别养成很快改变主导一行的习惯，至少治疗四次，如果进展不大，再改变诊断。因为你永远也无法确信这一型是否得到足够治疗而见效\n\n---\n\n## 课后作业\n\n### 案例描述\n男性，约3周剧烈头疼一次，持续3年。头疼部位为后脑勺，每次疼痛持续24小时，什么都做不了，只能用止痛片控制。\n\n### 治疗记录\n\n| 次数 | 诊断/治疗 | 脉象 |\n|-----|---------|-----|\n| 1 | 内障检查 → 无 / AE → 有 | -1/-1 / -1/-1 |\n| 2 | 夫妻不和 → 无 / 出入阻滞 → 无 | -1/-1 / -1/-1 |\n| 3 | 肝肺阻滞 | -1.5/-1.5 / -1/-1 |\n| 4 | 同前 | -1/-1 / -1/-1 |\n| 5 | 无阻滞 | -1/-1 / -1/-1 |\n| 6 | | 0.5/0.5 / 0/0 |\n\n---\n\n## 儿童治疗\n\n### 核心原则\n\n1. **儿童的问题一定与家庭有关**\n   - 孩子的问题一定从父母入手\n   - 学龄前的孩子从治疗父母开始\n   - 入学的孩子，可能由于同学关系、师生关系的压力导致失衡，可以直接治疗孩子\n\n2. **操作要点**\n   - 不用花时间哄孩子，针掉了再补，整个过程家长抱稳孩子（孩子的AE通常很多）\n   - 穴位一定要少，主管穴只针左侧，用最少的灸或者不灸\n   - 最多每两周一次，一般3-4周一次即可\n   - **孩子的治疗效果会非常快**\n\n---\n\n## 针刺安全——深度\n\n### 通用原则\n1. 孕期禁用的穴位\n2. 高血压患者只针不灸\n3. 可能伤及脏器的部分不要深刺\n\n### 需注意针刺深度的部位\n\n| 部位 | 穴位 |\n|-----|-----|\n| 眼部 | 睛明、承泣 |\n| 胸部 | 神藏、灵墟、神封、步廊、天池 |\n| 胁肋 | 大包、章门、京门 |\n| 后背 | 魄户、神堂、膏肓 |\n| 上腹部 | 鸠尾（肝脾肿大者慎针或禁针） |\n| 下腹部 | 孕妇 |\n| 项部 | 哑门、风府、风池 |\n| 颈部 | 天突、人迎 |\n\n---\n\n## 针刺安全——晕针\n\n### 晕针\n虽然很少，但依然有AE晕针的情况\n\n### 预防\n\n**视其色、睹其应，看到晕针先兆**\n\nA. 提前预防\nB. 观察病人\n\n### 处理\n\n#### Nora方案\n- 沉着、冷静的等\n\n#### 教科书方案\n\n1. 停止针刺\n2. 抽出全部针\n3. 让病人平躺\n4. 检查生命体征\n5. 给病人喝温水/糖水\n6. 严重时叫急救\n\n---\n\n# 附录：各课核心穴位速查表\n\n## 内障治疗——内七龙针法\n\n| 穴位 | 代码 | 定位 | 针刺 |\n|-----|-----|-----|-----|\n| 鸠尾 | XIII15 | 脐上7寸/剑突下 | ⊥3-5 |\n| 天枢 | XI25 | 脐旁3寸 | ⊥5 |\n| 伏兔 | XI32 | 大腿前 | ⊥5 |\n| 解溪 | XI41 | 踝横纹中央 | ⊥5 |\n\n## AE治疗——五脏俞\n\n| 穴位 | 胸椎 |\n|-----|-----|\n| 肺俞 | T3 |\n| 心包俞 | T4 |\n| 心俞 | T5 |\n| 肝俞 | T9 |\n| 脾俞 | T11 |\n| 肾俞 | L2（14） |\n\n## 夫妻不和治疗穴位\n\n| 穴位 | 五行关系 |\n|-----|---------|\n| 至阴 | 金→水（膀胱） |\n| 复溜 | 金→水（肾） |\n| 太溪 | 土→水 |\n| 中封 | 金→木 |\n| 腕骨 | 火（小肠） |\n| 神门 | 火（心） |\n\n## 出入阻滞取穴\n\n| 阻滞 | 穴位 |\n|-----|-----|\n| 肝肺 | 期门、中府 |\n| 脾心 | 大包、极泉 |\n| 肾心包 | 步廊、天池 |\n| 小肠膀胱 | 听宫、睛明 |\n| 大肠胃 | 迎香、承泣 |\n| 三焦胆 | 耳和髎、瞳子髎 |\n| 任督 | 会阴、长强、承浆、龈交 |\n\n## 神性穴\n\n| 穴位 | 阶段 | 壮数 | 位置 |\n|-----|-----|-----|-----|\n| 神阙 | 通用 | 3-30 | 脐中 |\n| 巨阙 | 通用 | 7-15 | 脐上6寸 |\n| 灵墟 | 通用 | 5 | T3旁开2寸 |\n| 魄户 | 通用 | 7-15 | T3旁开4寸 |\n| 膏肓 | 通用 | 7-50 | T4旁开4寸 |\n| 神堂 | 通用 | 5 | T5旁开4寸 |\n| 地机 | 土 | - | 内踝上9寸 |\n| 滑肉门 | 土 | - | 脐上1寸旁开3寸 |\n| 经渠 | 金 | - | 太渊上1寸 |\n| 期门 | 木 | - | 乳头直下 |\n| 劳宫 | 相火 | - | 掌心3-4掌骨间 |\n| 极泉 | 君火 | - | 腋窝顶点 |\n| 俞府 | 水 | - | 锁骨下缘旁开2寸 |\n\n## 原穴\n\n| 五行 | 阳经原穴 | 阴经原穴 |\n|-----|---------|---------|\n| 木 | 丘墟 | 太冲 |\n| 君火 | 腕骨 | 神门 |\n| 相火 | 阳池 | 大陵 |\n| 土 | 冲阳 | 太白 |\n| 金 | 合谷 | 太渊 |\n| 水 | 京骨 | 太溪 |\n\n---\n\n> 笔记整理完毕。\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-29", "name": "五行针灸课本笔记", "desc": "教材级详细笔记", "content": "# 五行针灸实操课学习手册\n\n> 来源：有家五行针灸工作室\n> 版本：2023年8月 山东青岛\n> 编者：杨露晨\n\n---\n\n## 使用说明\n\n1. 本手册在原版基础上，经有家五行针灸工作室修订，供杨露晨老师山东青岛五行针灸基础课（2023年8月）内部使用，请勿私自传播。\n\n2. 五行针灸的学习需要较长的时间和反复的练习，仅靠7天的基础课是远远不够的。本手册囊括了基础课（实操部分）需要掌握的绝大部分知识点、易错点，供学员反复记忆、查阅。未涉及经气转化、穴位神性等初学者不易掌握的内容，和外七龙、三焦、募穴、中央动脉、赤羽氏试验等较少使用的内容，请自行阅读《五行针灸指南（增补修订本）》进行学习。\n\n3. 手册中所涉及穴位的定位及针灸方法，均出自华思礼教授所著《Classical Five Element Acupuncture Vol I Meridians and Points（第4版）》（传统五行针灸 卷1：经络和腧穴）。\n   - \"⊥\"代表进针深度为几分\n   - \"▲\"代表艾灸壮数\n   - \"X\"代表禁止使用\n   - \"XP\"代表怀孕的第某个月份起禁用\n\n4. 为方便使用，手册的大部分章节采用了问答形式，以帮助学员更有针对性地学习掌握。\n\n5. 手册中列举的部分治疗顺序、注意事项为对初学者的要求，已随文进行标注、说明，经验丰富的治疗师可根据实际情况灵活使用。\n\n6. 手册大量参考了华思礼教授所著《Traditional Acupuncture Vol II Traditional Diagnosis》（传统针灸 卷2:传统诊断）、诺娜老师所著《五行针灸指南（增补修订本）》等著作。\n\n---\n\n## 目录\n\n- 第一节·五行针灸诊疗基本步骤.............................第4页\n- 第二节·脉诊................................................第6页\n- 第三节·针灸方法..........................................第8页\n- 第四节·内障/附体..........................................第10页\n- 第五节·邪气/AE............................................第13页\n- 第六节·主管穴............................................第16页\n  - 一、原穴定位..........................................第17页\n  - 二、其他主管穴定位....................................第20页\n- 第七节·夫妻不和..........................................第32页\n- 第八节·出入阻滞、瘢痕阻滞...............................第34页\n  - 一、出入阻滞..........................................第35页\n  - 二、任督阻滞..........................................第39页\n  - 三、瘢痕阻滞..........................................第40页\n- 第九节·更多穴位的选择....................................第41页\n- 第十节·天窗穴...........................................第42页\n- 附录....................................................第45页\n  - 附录1 十四经循行图....................................第45页\n  - 附录2 诺娜老师治疗方案取穴举例.......................第59页\n\n---\n\n## 表目录\n\n| 表格 | 名称 | 页码 |\n| ---- | ---- | ---- |\n| 表格1 | 十二官脉诊定位 | 6 |\n| 表格2 | 脉象记录举例 | 7 |\n| 表格3 | 五行针灸针法比较 | 8 |\n| 表格4 | 内七龙穴位定位 | 11 |\n| 表格5 | 清除AE所用背俞穴定位 | 14 |\n| 表格6 | 木原穴定位 | 17 |\n| 表格7 | 相火原穴定位 | 17 |\n| 表格8 | 君火原穴定位 | 18 |\n| 表格9 | 土原穴定位 | 18 |\n| 表格10 | 金原穴定位 | 19 |\n| 表格11 | 水原穴定位 | 19 |\n| 表格12 | 木其他主管穴定位 | 20 |\n| 表格13 | 相火其他主管穴定位 | 22 |\n| 表格14 | 君火其他主管穴定位 | 24 |\n| 表格15 | 土其他主管穴定位 | 26 |\n| 表格16 | 金其他主管穴定位 | 28 |\n| 表格17 | 水其他主管穴定位 | 30 |\n| 表格18 | 夫妻不和所用穴位定位 | 32 |\n| 表格19 | 出入阻滞穴位定位 | 36 |\n| 表格20 | 任督阻滞穴位定位 | 39 |\n| 表格21 | 天窗穴穴位定位 | 42 |\n\n---\n\n## 第一节·五行针灸诊疗基本步骤\n\n### 1. 诊疗流程\n\n#### 单次诊疗\n- **诊断**\n  - 传统诊断：看，听，闻，询问，感受（to see, to hear, to smell, to ask, to feel）\n  - 辅助诊断（查体）：内障、脉诊、血压、三焦、募穴、中央动脉、赤羽氏试验\n\n- **治疗**\n  - 清除阻滞：内障、AE、夫妻不和、出入阻滞等\n  - 扶持主导一行：主管穴、神性穴位、天窗穴\n\n#### 长期诊疗\n- **初期**：包含初次治疗、后续几次治疗，此阶段为确认五行阶段\n- **中后期**：深入扶持五行阶段\n\n---\n\n### 2. 治疗操作流程\n\n#### 1) 初期\n```\n是否初次治疗？\n├── 是 → 检查内障\n│         ├── 有内障 → 内七龙 → 原穴结束\n│         └── 无内障 → AE → 原穴结束\n│\n└── 否 → 检查阻滞\n          ├── 有阻滞 → 清除阻滞 → 神性穴位* → 主管穴结束\n          └── 无阻滞 → 神性穴位* → 主管穴结束\n```\n\n**注意事项**：\n1. 可以不选神性穴位，直接主管穴结束\n2. 只选择初期可以使用的神性穴位\n\n#### 2) 中后期\n```\n是否需要更改主导一行？\n├── 更改 → 是否需要重做AE？\n│          ├── 需要 → AE → 原穴结束\n│          └── 不需要 → 原穴结束\n│\n└── 不更改 → 检查阻滞\n            ├── 有阻滞 → 清除阻滞 → 神性穴位* → 主管穴结束\n            └── 无阻滞 → 神性穴位* → 主管穴结束\n```\n\n---\n\n### 3. 需要以原穴结束治疗的情况\n\n1. **发现内障**：发现内障→内七龙→AE→原穴结束\n2. **各种原因重做AE**：各种原因重做AE→原穴结束\n   > 建议初学者直接以原穴结束，不加入过多治疗\n3. **发现夫妻不和**：发现夫妻不和→清除夫妻不和→原穴结束\n4. **发现任督不通**：发现任督不通→清除任督不通→原穴结束\n\n---\n\n### 4. 与阻滞相关的特殊情况\n\n1. **不确定有无阻滞**：先做主管穴，再判断\n   - 判断结果为\"无\"：结束治疗\n   - 判断结果为\"有\"：清除阻滞→左侧主管穴结束*（只针不灸）\n\n2. **做完主管穴发现新的阻滞**：清除阻滞→左侧主管穴结束*（只针不灸）\n\n3. **怀疑有几对阻滞**：先清除最明显的阻滞，再判断\n   > **注意事项**：\n   > 1. 单次治疗最多清除2-3个阻滞\n   > 2. 若仍感觉有阻滞，直接主管穴结束，等待下次治疗时再观察\n\n---\n\n## 第二节·脉诊\n\n> \"握着病人的手可能是我们与病人第一次真正的、持续的身体接触，相比语言，我们的双手能更好地帮我们传达某些信息。\" ——华思礼教授\n\n### 1. 什么时候需要诊脉\n- 开始治疗时\n- 每一步治疗做完后\n\n### 2. 如何诊脉\n\n#### 1) 脉诊要点\n- 问候每一官，聆听每一官之所需\n- 医者之神直接与脉象交流，勿加入思维分析\n\n#### 2) 十二官定位\n\n**表格1 十二官脉诊定位**\n\n| |左手| |右手| |\n| ---- | ---- | ---- | ---- |\n| |浮取|沉取|浮取|沉取|\n|寸|小肠|心|大肠|肺|\n|关|胆|肝|胃|脾|\n|尺|膀胱|肾|三焦|心包|\n\n#### 3) 脉象记录\n- 太过：`+`\n- 平脉：`√`\n- 不及：`-`\n\n**说明**：因临床上几乎没有完全平衡之人，所以脉很少是平脉，且诊到气虚的情况远多于气实，因此脉象多记录为负数。\n\n**表格2 脉象记录举例**\n\n|左| |右| |\n| ---- | ---- | ---- |\n|浮|沉|沉|浮|\n|-1|-1|-3/4|-3/4|\n|-1|-1|-1|-1|\n|-2|-2|-2|-2|\n\n### 3. 脉象可以告诉我们什么\n- **阻滞信息**：夫妻不和、出入阻滞是否存在，是否清除\n- **十二官信息**：十二官相对的强弱\n\n### 4. 脉象不可以告诉我们什么\n- 哪一行是主导一行\n\n### 5. 常见错误\n- **基础错误**\n  - 脉诊姿势和手法错误\n  - 诊脉定位错误\n    - 手指不在桡动脉上\n    - 太过靠前或靠后\n  - 记错十二官位置\n  - 治疗前后忘记诊脉\n- 非必要情况下与患者讨论脉象\n- 治疗时流露出对脉象的担心，增加患者心理负担\n- 诊脉时间过长，进入思维\n- 过度甚至单纯依赖脉象诊断阻滞\n- 解读脉象时加入其他流派思维\n\n---\n\n## 第三节·针灸方法\n\n> \"在五行针灸中，无论是进针还是诊脉，我们都会用到双手……我们的手可以传递保护、爱或尊敬，可以平息怒火，也可以消弭恐惧，而这也正是治疗的目的所在——恢复五志之平衡。\" ——诺娜老师\n\n### 1. 如何确定艾灸的壮数\n- 参考华思礼教授所著《Classical Five Element Acupuncture Vol I Meridians and Points（第4版）》\n- 一般取最少壮数。少数穴位可酌情增加艾灸壮数\n\n### 2. 什么情况下禁用灸法\n- 面部穴位\n- 禁灸的穴位\n- 高血压患者，或收缩压与舒张压相差大于40mmHg\n- 为相火病人进行第一次治疗时，不熟练的治疗师勿灸\n- 其他不宜艾灸的情况\n\n### 3. 什么情况下只灸不针\n- 神阙穴隔盐灸\n\n### 4. 五行针灸中都会用到哪些针法\n\n**表格3 五行针灸针法比较**\n\n|治疗内容|大部分穴位|内七龙|AE|阻滞|\n| ---- | ---- | ---- | ---- | ---- |\n|针法|补法|泻法+补法|泻法|补法|\n|是否艾灸|是（除禁灸穴位）|否|否|否|\n|针刺顺序|先左侧后右侧<br>先阳经后阴经|先右侧后左侧<br>从上至下|先左侧后右侧<br>从上至下|先左侧后右侧|\n|进针方向|顺经络循行方向|垂直皮肤刺入|垂直皮肤浅刺|先出口穴后入口穴<br>垂直皮肤刺入|\n|是否要求得气|是|是|否|是|\n|是否留针|否|是，行针时逆时针旋转|是|是|\n|出针时是否旋转|是，顺时针旋转|是，顺时针旋转|否|是，顺时针旋转|\n|出针后是否按压针孔|是|补法出针时按压针孔|否|是|\n\n### 5. 针刺不得气怎么办？\n- 出针，重新确定穴位位置，重新刺入\n- 避免针尖在皮肤内反复刺探\n\n### 6. 常见错误\n- **基础错误**\n  - 艾灸、针刺手法不熟练\n  - 具体操作顺序、方法错误\n- 一开始便使用较大的壮数进行艾灸\n- 不能掌握重要部位的针刺深度，造成气胸等伤害\n- 只顾埋头操作，未在针刺时观察患者表情\n\n---\n\n## 第四节·内障/附体\n\n> \"要阐述一套全面的表现和症状，让我能明确地诊断'附体'，即使不是不可能，也是困难的。要想在这个领域得出明确的结论，即使是最优秀的治疗师也必须在一定程度上经历尝试和犯错。\" ——华思礼教授\n\n### 1. 为何将\"附体\"(Possession)改为\"内障\"(Internal Barrier)\n\"附体\"一词带有神秘色彩和超自然意味，容易让人误以为附体是由\"外力\"占据所导致。但\"附体\"没有任何\"玄\"的意味！严重时，病人可能的确感到自己似乎被某种力量控制，不过我们最好把它看成是人失去自我控制，而不是一种外力的强加。\n\n### 2. 什么是内障\n存在于病人的\"神\"(spirit)之前的一层内在屏障。它是构成病人的天然保护机制的一部分，保护他/她免受更深的精神伤害。\n\n### 3. 为什么会出现内障\n内障的出现，一定是病人已经长期经受持续或极端的打击，它如此严重以至超出一个人的正常承受能力，于是，他们受到损伤的\"神\"躲到屏障之后以求保护自己免受进一步痛苦。\n\n### 4. 内障的存在对病人的影响\n- 病人的身心神(body, mind, spirit)不再是一个整体\n- 病人的神无法与外界沟通\n\n**程度分级**：\n- 内障轻微之时：病人的身体(body)和意识(mind)尚能正常运行，病人仅有一些奇怪的表现或者轻微的行为异常，只有最敏锐的观察者才能发现内障的存在\n- 当情况恶化时：身体与意识也会受到损伤，直至彻底崩溃，精神和行为明显异常\n\n### 5. 内障的存在对治疗的影响\n如果内障未得到清除，后续治疗将无法起效。\n\n### 6. 如何确定内障的存在\n唯一确定内障是否存在的方法是注视病人双眼，试图以己之神会彼之神。当内障存在时，治疗师感到无法与病人之神取得联系。\n\n> 有内障，病人不会有任何反应，深感自己面对一片空白，或有如临深渊之感。\n\n### 7. 何时进行内障检查\n- 首次治疗时\n- 治疗的任何阶段，怀疑有内障时\n\n### 8. 内七龙穴位如何定位\n\n**表格4 内七龙穴位定位**\n\n|穴位名称及编号|类别|内容详情|\n| ---- | ---- | ---- |\n|鸠尾 XIII 15|定位|前正中线上，肚脐上7寸|\n|鸠尾 XIII 15|取穴要点|● 找剑突而不是找7寸<br>● 沿双侧肋弓下缘向上向内，找到剑突<br>● 标记剑突下缘<br>● 在剑突下缘约0.5寸附近寻找凹陷|\n|天枢 XI 25|定位|脐正中旁开3寸，腹直肌外缘|\n|天枢 XI 25|取穴要点|● 沿髂前上棘内侧缘做前正中线平行线，确定前正中线旁开4寸位置<br>● 4等分，确定旁开3寸位置<br>● 嘱患者做低头动作，使腹直肌紧张，进一步确定穴位在腹直肌外缘|\n|伏兔 XI 32|定位|大腿前面，膝关节屈曲横纹向上7寸，股外侧肌和股直肌之间|\n|伏兔 XI 32|取穴要点|● 骨度分寸：<br>  • 股骨大转子下缘到腘横纹共13寸<br>  • 腹股沟与大腿内侧连接处基本与股骨大转子下缘平齐<br>  • 腘横纹要屈膝找<br>● 取穴要点：<br>  • 胃经在股直肌与股外侧肌之间<br>  • 伏兔在大腿前侧面，而非侧面|\n|解溪 XI 41|定位|在足背与小腿交界处的横纹中央凹陷处，拇长伸肌腱与趾长伸肌腱之间|\n|解溪 XI 41|取穴要点|● 如何确定足背横纹：内外踝下缘连线<br>● 用力勾足大趾，可使拇长伸肌腱暴露<br>● 解溪基本在足背正中|\n\n### 9. 如何进行内七龙操作\n\n1. 标记穴位\n2. 按照**从上至下，从右至左**的顺序直刺进针，要求每一针均**得气**\n3. 按进针顺序对每个穴位行泻法（逆时针旋转180°）\n4. 留针（如穴位定位正确，操作得当，留针几分钟便可清除内障）\n5. 若留针5分钟后内障未清除，按**进针顺序**对每个穴位施以**补法**，适当延长留针时间\n6. 留针期间，不时检查患者眼神，看内障是否清除\n7. 如已清除，依次出针，进入下一步AE的治疗\n8. 如未清除，依次出针，**不做AE**，以原穴结束，嘱咐病人下次再来，下次治疗重复内七龙的治疗，直至清除\n\n### 10. 清除内障后做什么操作\n- 立刻清除AE，然后原穴结束\n- 不做其他治疗\n- 若单次未清除内障，**1周后**再次重复内七龙操作\n\n### 11. 常见错误\n- 基础错误\n  - 内七龙穴位定位错误\n  - 操作步骤、进针顺序错误\n- 过度治疗\n- 未能诊断出内障\n- 未给治疗内障留有足够时间\n\n---\n\n## 第五节·邪气/AE\n\n> **治疗师们永远不应忘记，在这个完美的医疗体系中，最薄弱的一环是治疗师自己。** ——华思礼教授\n\n> **不做AE就做后面治疗，会使病气传得更快。**\n\n### 注意：AE不是中医中的\"风寒暑湿燥火\"\n\n### 1. 什么是邪气/AE\n邪气/AE（Aggressive Energy），是人体中的一种浊气，对人体具有破坏性\n\n### 2. AE是如何产生的\n当五行中的一行持续处于压力或创伤（各种形式）之下，其防御能力将遭到削弱，此时，这一行的能量不再是人健康时的生生之气，而变成一种破坏力与我们自身为敌。AE一旦出现，受损这一行为了保护自身，亦为了保护其子，将AE通过相克的循环传给其孙，AE在体内依次传递，直至五行全部失守。\n\n**特点**：AE只见于属阴之官（五脏加上心包），六腑因其中空之性，能自行将AE祛除于外。\n\n### 3. 什么时候需要清除AE\n\n#### 1) 第一次治疗\n**切记！** 为了保证整个治疗有效，必须先清除AE。除了有内障的病人，每个病人的第一步治疗都是清除AE。\n\n> 若不清除AE便开始除内障外的其他治疗，将可能导致AE在不同官、不同行之间传递，从而加速疾病的进展\n\n#### 2) 等同于第一次治疗的情况：\n- 清除内障后（内障会被\"AE\"掩盖）\n- 中断治疗较长时间后重新开始治疗\n\n#### 3) 如果病情无改善或加重，治疗师需再次检查有无AE，确保AE已清除干净\n\n#### 4) 发现有AE存在的迹象\n- 患者表现出明显的情绪不稳\n- 患者容易突然哭泣\n- 胸部和上背部的疼痛\n- 背俞穴周围，尤其是肺俞、心包俞、心俞区域的紧张\n- 背俞穴区域出现红斑\n\n### 4. 如何清除AE\n\n#### 背俞穴定位\n\n**表格5 清除AE所用背俞穴定位**\n\n|穴位|定位|\n| ---- | ---- |\n|肺俞Ⅲ13|第3胸椎棘突下，旁开1.5寸|\n|心包俞Ⅲ14|第4胸椎棘突下，旁开1.5寸|\n|心俞Ⅲ15|第5胸椎棘突下，旁开1.5寸|\n|肝俞Ⅲ18|第9胸椎棘突下，旁开1.5寸|\n|脾俞Ⅲ20|第11胸椎棘突下，旁开1.5寸|\n|肾俞Ⅲ23|第2腰椎棘突下，旁开1.5寸|\n\n> 注：骨度分寸与传统针灸不同，后正中线至肩胛骨内侧缘为4寸（传统为3寸）\n> 通常在腰最凹的地方\n\n#### 操作方法\n\n1. **体位要求**：嘱患者舒服地坐在床边，双腿自然下垂，勿盘坐，双手手心向上自然放于膝上，露出整个腰背部皮肤\n\n2. **穴位标记**：用笔在背后标记所有穴位\n\n3. **进针要求**：按照从左至右、从上至下的顺序依次进针\n   - 针尖垂直皮肤进针\n   - 针尖浅刺入皮肤即可，切勿过深\n   - 松手后针灸针挂在皮肤上，与躯干呈45°夹角为宜\n\n4. **留针观察（5-10分钟）**：\n   - **有AE的表现**：背俞穴进针处有白色凹陷，针尖好似被皮肤吸入，针孔周围随即出现圆形红晕（有红晕才有AE）\n   - **对照针**：在上背部非腧穴处皮肤按照相同方法刺入对照针，对比观察有无皮肤刺激反应\n   - **某组背俞穴仅一侧出现红晕**：调整另一侧进针位置\n   - **等待后仍无红晕出现**：考虑定位是否准确，可出针后再次定位、针刺。如确定定位准确而无红晕出现，表示此穴无AE\n\n5. **出针时机与方法**：等待至AE出尽，方可出针（此为泄法，无需按针孔）\n   - 红晕消失代表AE出尽：所有部位全部消失通常需要20分钟至2小时不等\n   - 针孔周围有淡淡红晕，不随时间消褪：可能是针尖刺激皮肤导致，可以出针\n   - 等待过程中针灸针掉落：如红晕尚未消失，需要补刺，若红晕已消失，无需处理\n   - 出针方法：依进针顺序轻轻取出针灸针，不按压针孔\n\n6. **后续治疗**：以原穴结束，不做其他治疗\n\n7. **特殊情况**：\n   - （时间不够，无法等待至红晕消失）：正常出针，以原穴结束，下次治疗仍重复清除AE步骤\n   - （全程无红晕出现）：反复确认穴位定位正确的情况下，等待数分钟后，正常出针\n\n---\n\n## 第六节·主管穴\n\n> \"一旦我们把理解之心、温暖之情全部倾注给护持一行，仅主管穴已足矣。\"\n\n### 1. 主管穴有什么特点\n- 与每一官有直接联系\n- 使用起来最为安全\n- 形成每次治疗的牢固基础\n- 分布于手指至肘之间，或足趾至膝之间\n- 包括原穴、母穴、时令穴、络穴、五输穴、子穴\n  > 注：子穴不常用，通常用神性穴、AE去泄，不用子穴泄\n\n### 2. 如何使用主管穴\n\n#### 1) 原穴：主管穴中最重要的一组腧穴，与脏腑直接相关\n- **必须以原穴结束的情况**：大治疗应以原穴结束\n  - 第一次治疗，AE后以原穴结束\n  - 较大治疗（如夫妻不和、任督阻滞）后以原穴结束\n  - 内七龙后，AE后以原穴结束\n- 其余任何一次治疗都可以使用原穴\n\n#### 2) 母穴：根据五行相生关系，能补充子行经气之穴\n- 脉诊发现患者主导一行之母的两官能量较为充沛，可以选择使用母穴\n- 注意：只用原穴治病也是可以的\n- 注意：本行病人，在一开始治疗时，不要用母穴（母穴基本都能量不够）\n\n#### 3) 五输穴：每条经脉均有五个与五行相对应之穴\n- 五输穴为它所属脏腑分别注入五行的特质\n> 在学习到后期再尝试使用\n- 需要为其所属一官注入某一行能量特质时，可以选择某组五输穴\n\n#### 4) 时令穴：在与五行对应之季节，以及一日对应之时辰中，五输穴成为时令穴\n> 此乃病人能获得的最强有力的治疗之一\n- 在主导一行所在的季节或时辰治疗，可以选择使用时令穴\n- 时辰穴一般只能给水、火两行病人扎\n\n#### 5) 络穴：沟通成对的阴阳二官之间的能量\n- 单独使用络穴（仅针补，不灸）的情况：\n  - 出入阻滞\n  - 经气转化\n\n---\n\n### 二、原穴定位\n\n#### 表格6 木原穴定位\n\n|官|原穴|定位/取穴要点|针灸法|\n| ---- | ---- | ---- | ---- |\n|胆|丘墟 VII 40|外踝前下方，当趾长伸肌腱的外侧凹陷处<br>● 体位：平躺，双脚自然放松<br>● 在外踝前下方的凹陷中|⊥ 5<br>▲ 3-7 |\n|肝|太冲 VIII 3|在足背侧，当第1、2跖骨的夹角处<br>两种方法：<br>● 在太白水平<br>● 在1、2跖骨夹角根部|⊥ 3<br>▲ 3-7 |\n\n#### 表格7 相火原穴定位\n\n> 相火原穴，需3年以上经验才能灸\n\n|官|原穴|定位/取穴要点|针灸法|\n| ---- | ---- | ---- | ---- |\n|三焦|阳池 VI 4|在腕背横纹中，桡骨、尺骨和月状骨之间<br>● 沿第四掌骨向上推至腕背横纹，找到凹陷|⊥ 3<br>▲ X<br>XP 3 |\n| 横纹外侧端与肱骨外侧髁之间|⊥ 5-8<br>▲ 5-10 |\n|母穴 土穴|太渊 IX 9|在腕横纹上，桡骨和舟骨之间，桡动脉搏动处|⊥ 2<br>▲ 3 |\n|时令穴 金穴 3-7时|商阳 X 1|在食指桡侧指甲角|⊥ 1<br>▲ 3 |\n|时令穴 金穴 3-7时|经渠 IX 8|在前臂前表面，太渊上1寸，桡动脉搏动处|⊥ 2-3<br>▲ X |\n|络穴|偏历 X 6|当曲肘时，在前臂后面桡侧，拇长伸肌与拇长外展肌之间，手腕上3寸|⊥ 3<br>▲ 5-7 |\n|络穴|列缺 IX 7|在前臂前面，太渊上2寸，桡动脉的外侧|⊥ 2-3<br>▲ 3-5<br>XP 6 |\n|木穴|三间 X 3|在手背面，紧靠第二掌骨头的近端桡侧|⊥ 3<br>▲ 3 |\n|木穴|少商 IX 11|拇指桡侧指甲角|⊥ 1<br>▲ X<br>XP 7 |\n|火穴|阳溪 X 5|在手腕桡侧，桡骨茎突与舟骨基底部之间，拇长伸肌腱和拇短伸肌腱之间，\"鼻烟壶\"内|⊥ 3<br>▲ 5 |\n|火穴|鱼际 IX 10|在大鱼际隆起的中心¹|⊥ 3-5<br>▲ X |\n|水穴 子穴|二间 X 2|在食指桡侧面，近端指骨基底部的远端|⊥ 3<br>▲ 3<br>XP 9 |\n|水穴 子穴|尺泽 IX 5|在肘横纹上，肱二头肌长头肌腱外约1寸|⊥ 3-5<br>▲ 3-5 |\n\n> ¹ 与传统定位不同\n\n---\n\n#### 表格17 水其他主管穴定位\n\n|主管穴|穴位|定位|针灸法|\n| ---- | ---- | ---- | ---- |\n|母穴 金穴|至阴 Ⅲ67|小趾外侧趾甲角|⊥ 2<br>▲ 3 |\n|母穴 金穴|复溜 Ⅳ7|小腿内侧，太溪直上2寸¹|⊥ 4<br>▲ 3-7<br>XP 8 |\n|时令穴 水穴 15-19时|足通谷 Ⅲ66|足外侧缘，小趾近节趾骨基底部的远端，赤白肉际上|⊥ 2<br>▲ 3-5 |\n|时令穴 水穴 15-19时|阴谷 Ⅳ10|在腘横纹上，半膜肌和半腱肌肌腱之间，轻微屈膝时取穴|⊥ 4<br>▲ 3 |\n|络穴|飞扬 Ⅲ58|小腿后外侧表面，腓肠肌和比目鱼肌之间，外踝尖水平上8寸²|⊥ 5<br>▲ 3-7 |\n|络穴|大钟 Ⅳ4|约当内踝尖与跟腱之间的凹陷处|⊥ 3<br>▲ 3-7<br>XP 3 |\n|木穴 子穴|束骨 Ⅲ65|足外侧缘，第五跖骨头的近端，赤白肉际上|⊥ 3<br>▲ 3-5 |\n|木穴 子穴|涌泉 Ⅳ1|足掌面，第2、3跖骨之间，当脚趾弯曲时足心的折痕上|⊥ 5<br>▲ 3-7<br>XP 8 |\n|火穴|昆仑 Ⅲ60|外踝尖与跟腱之间，在腓动脉上|⊥ 3-5<br>▲ 3-7 |\n|火穴|然谷 Ⅳ2|足内侧面，舟骨结节的下方|⊥ 5<br>▲ 3-5<br>XP 8 |\n|土穴|委中 Ⅲ54|腿后面，腘横纹中点|⊥ 5<br>▲ X |\n|土穴|太溪 Ⅳ3|约当内踝尖与跟腱之间的凹陷处上一寸³|⊥ 3<br>▲ 3-5 |\n\n> ¹ 与传统定位不同\n\n---\n\n### 四、十二经循行概要\n\n#### 土\n- **阳明 ⇌ 太阴（足）**\n- 胃（阳）-足阳明胃经：原穴冲阳，循行头→脚，始于承泣，止于厉兑（足中指）\n- 脾（阴）-足太阴脾经：原穴太白，循行脚→胸，始于隐白（足大拇指），止于大包（腋下）\n\n#### 金\n- **阳明 ⇌ 太阴（手）**\n- 大肠（阳）-手阳明大肠经：原穴合谷，循行手→头，始于商阳（手食指），止于迎香\n- 肺（阴）-手太阴肺经：原穴太渊，循行胸→手，始于中府，止于少商（手大拇指）\n\n#### 水\n- **太阳 ⇌ 少阴（足）**\n- 膀胱（阳）-足太阳膀胱经：原穴京骨，循行头→脚，始于睛明，止于至阴（足小指）\n- 肾（阴）-足少阴肾经：原穴太溪，循行脚→胸，始于涌泉，止于俞府（胸）\n\n#### 木\n- **少阳 ⇌ 厥阴（足）**\n- 胆（阳）-足少阳胆经：原穴丘墟，循行头→脚，始于瞳子髎，终于窍阴（第4趾外侧）\n- 肝（阴）-足厥阴肝经：原穴太冲，循行脚→头，始于大敦（大指外侧），止于期门\n\n#### 相火\n- **少阳 ⇌ 厥阴（手）**\n- 三焦（阳）-手少阳三焦经：原穴阳池，循行手→头，始于关冲（手4指），止于丝竹空\n- 心包（阴）-手厥阴心包经：原穴大陵，循行胸→手，始于天池，止于中冲（中指）\n\n#### 君火\n- **太阳 ⇌ 少阴（手）**\n- 小肠（阳）-手太阳小肠经：原穴腕骨，循行手→头，始于少泽（小指），止于听宫（头）\n- 心（阴）-手少阴心经：原穴神门，循行胸→手，始于极泉，止于少冲（小指桡侧）\n\n---\n\n## 第七节·夫妻不和\n\n> **需及时处理**\n\n> \"作为治疗师，如果我们带着足够的警觉去看、听、感受和询问，患者将自己带领我们发现他们的夫妻不和，并告诉我们原因。\" ——华思礼教授\n\n### 病人表现\n- 绝望\n- 无可奈何\n- 活不下去\n- 找不到活着的理由\n\n### 1. 什么是夫妻不和\n夫妻法则认为，通常情况下，左手（夫侧）脉力应略强于右手（妻侧）脉力，当妻侧脉力反而强于夫侧脉力时，这种情况在五行针灸中被称为\"夫妻不和\"。\n\n### 2. 夫妻不和意味着什么\n每个人的内在皆有\"夫（阳）\"、\"妻（阴）\"两面。无论男女，由于其\"夫\"侧脉为心（君主之官）脉之所在，均应略强于\"妻\"侧脉，表示君当其位。反之，则心失主宰，生命危矣。\n\n**一旦诊断确定，\"夫妻不和\"必须立即予以治疗。如不予治疗，将危及生命。**\n\n### 3. 夫妻不和是怎样造成的\n\"夫妻不和\"由某种创伤、打击造成，尤其来源于人与人的冲突、不愉快（此时心难以主宰局面），使各官承受相当压力。可突然出现\n\n### 4. 如何诊断夫妻不和\n结合脉象与患者表现进行综合诊断：\n- **左脉弱于右脉**，尤其心和小肠之脉严重不足（表明它们正挣扎求生存）\n- **患者给人一种绝望、无可奈何、想要放弃之感**\n\n### 5. 如何治疗夫妻不和\n通过经气转化将妻侧脏腑之经气转给夫侧脏腑\n\n#### 穴位定位\n\n**表格18 夫妻不和所用穴位定位**\n\n|序号|穴位|定位|进针深度|\n| ---- | ---- | ---- | ---- |\n|1|至阴 Ⅲ67|在足小趾末节外侧，距趾甲角0.1寸|（垂直皮肤）|\n|2|然谷 Ⅳ2|足内侧面，舟骨结节的下方|（垂直皮肤）|\n|3|中封 Ⅷ4|在足背横纹上，胫骨前肌腱和拇长伸肌之间|（垂直皮肤）|\n|4|中渚 Ⅵ3|手背上，第四掌骨头的尺侧近端|（垂直皮肤）|\n|5|前谷 Ⅱ2|手指尺侧缘，在小指近节指骨基底部的远端|（垂直皮肤）|\n|6|腕骨 Ⅱ4|手掌尺侧缘，当第五掌骨基底与三角骨之间的凹陷处|（垂直皮肤）|\n\n#### 五行调理思路\n- 把金转给水\n- 把土转向水\n- 金→木\n- 补心和小肠\n\n#### 操作步骤\n1. 不灸，补法进针，得气后补法出针\n2. 按编号顺序依次进针\n3. 再次诊脉\n4. 以原穴结束\n\n### 6. 纠正夫妻不和后做什么操作\n- 以原穴结束\n> 不建议初学者在同一次治疗中再做其他治疗\n\n### 7. 常见错误\n- 基础错误\n  - 穴位定位、操作错误\n- 脉诊不熟练\n- 夫妻不和判断错误\n\n---\n\n## 第八节·出入阻滞、瘢痕阻滞\n\n> \"身、心、神的能量流动是不可分割的，因此，如果身体表面的能量流动被阻挡，那么心和神就不可能不受到影响。\" ——华思礼教授\n\n### 1. 什么是出入阻滞、瘢痕阻滞？\n- **出入阻滞**：能量在人体浅表层面，按照特定次序在十二经之间流注。如果前后两经交接处受到阻挡，能量将聚集在前一经，无法正常流动至下一经，这种情况称为出入阻滞。\n- **任督阻滞**：在十二经循环之外，另有任督二脉的循环，这两脉之间发生的阻滞，称为任督阻滞，英文表述为\"CV/GV Block\"。\n- **瘢痕阻滞**：体表因手术、外伤等原因形成的瘢痕，可能阻断经过该位置的经脉中的能量流动，称为瘢痕阻滞。\n\n### 2. 能量在十二经之间如何流注？\n**流注次序**：心→小肠→膀胱→肾→心包→三焦→胆→肝→肺→大肠→胃→脾→心\n\n**流注方向**：\n- 手三阴经，从胸走手：肺，心包，心\n- 手三阳经，从手走头：大肠，三焦，小肠\n- 足三阳经，从头走足：胃，胆，膀胱\n- 足三阴经，从足走腹：肝，脾，肾\n- 任督二脉：前后正中线上，从下向上\n\n---\n\n### 一、出入阻滞\n\n#### 1. 如何诊断出入阻滞？\n需要综合判断：\n- **脉象**：前一经所主之脉：强；后一经所主之脉：弱\n- **身体表现**：两经交接处的局部症状；两经循行处的症状；两经所属之官的生理功能受到影响\n- **心神表现**：两经所属之官的心、神功能受到影响\n\n#### 2. 为什么经过数次治疗后，反倒会出现明显出入阻滞？\n代表内在能量增强，深层次的问题浮现到了表面。是疾病由里出表的征兆\n\n#### 3. 都有哪些出入阻滞？\n共有六对出入阻滞：\n\n| 编号 | 名称 | 简写 |\n| ---- | ---- | ---- |\n| 1 | 小肠/膀胱阻滞 | II/III |\n| 2 | 大肠/胃阻滞 | X/XI |\n| 3 | 三焦/胆阻滞 | VI/VII |\n| 4 | 肝/肺阻滞 | VIII/IX |\n| 5 | 脾/心阻滞 | XII/I |\n| 6 | 肾/心包阻滞 | IV/V |\n\n> 同一行的两经之间若发生经气不平衡的表现，参考络穴进行处理\n\n#### 4. 如何治疗出入阻滞？\n\n**表格19 出入阻滞穴位定位**\n\n##### 小肠/膀胱阻滞（常见）\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|小肠/膀胱阻滞|听宫 Ⅱ19|在面部，耳屏前，下颌骨髁状突的后方，张口时凹陷处|2-3|\n|小肠/膀胱阻滞|睛明 Ⅲ1|目内眦内上方1分|3|\n\n> 小肠—选择；膀胱—用眼\n> 拔完针多按，可以减少减轻出血（头面部）\n\n##### 大肠/胃阻滞（常见）\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|大肠/胃阻滞|迎香 Ⅹ20|距鼻翼外缘1分处（面对）|1-3|\n|大肠/胃阻滞|承泣 Ⅺ1|在眼眶下缘，瞳孔直下（承，接受）|1-3|\n\n> 大肠—排浊\n\n##### 三焦/胆阻滞\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|三焦/胆阻滞|耳和髎 Ⅵ22|在耳前发鬓内，平对耳根上沿|3-7|\n|三焦/胆阻滞|瞳子髎 Ⅶ1|在面部，目外眦旁，当眶外侧缘处|3|\n\n##### 肝/肺阻滞\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|肝/肺阻滞|期门 Ⅷ14|胸廓下缘，当乳头直下，中脘与建里中点的水平线上|4|\n|肝/肺阻滞|中府 IX 1|平第一肋间隙，云门下1.6寸（直刺）|3-5|\n\n> 取穴：先找中脘、建里（两穴相差1寸），两穴中间，平移至肋下（肋缘）相交的位置\n\n##### 脾/心阻滞\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|脾/心阻滞|大包 Ⅻ22|腋中线上，第六肋间隙|3|\n|脾/心阻滞|极泉 Ⅰ1|腋窝顶点，腋动脉搏动处（指向手指尖）|5|\n\n##### 肾/心包阻滞\n|阻滞|穴位|取穴|进针深度|\n| ---- | ---- | ---- | ---- |\n|肾/心包阻滞|步廊 Ⅳ22|在胸部，当第五肋间隙，前正中线旁开2寸|3|\n|肾/心包阻滞|男：天池 V 1|乳头中点外1寸|3|\n|肾/心包阻滞|女：天泉 V 2|在臂内侧，肘横纹上7寸，肱二头肌的长短头之间|5|\n\n**治疗方法（不灸）**：\n1. 按照**先左后右**的顺序，依次补前一经出口穴，得气后补法出针\n2. 按照**先左后右**的顺序，依次补后一经入口穴，得气后补法出针\n3. 再次诊脉，判断阻滞是否解除\n4. 主管穴结束\n\n> 除外特殊穴位：睛明朝鼻尖方向进针，迎香朝鼻中隔方向进针\n\n#### 5. 有哪些特殊情况？\n\n##### 1) 头面部、躯干部穴位进针需格外注意\n- 眼周穴位不可过多提插、捻转，出针后多按压，防止出血\n- 躯干部穴位需注意进针深度，防止气胸\n\n##### 2) 再次脉诊发现阻滞未清除\n- 先考虑穴位定位是否准确，针刺是否得气\n- 再考虑阻滞是否确实存在\n- 可主管穴后再次诊脉查看\n\n##### 3) 主管穴后发现新的阻滞\n- 如阻滞明显，认为必须清除，可清除阻滞后再次针刺左侧主管穴（不灸），结束治疗\n\n#### 6. 常见错误\n- **基础错误**\n  - 穴位定位、操作错误\n  - 脉诊不熟练\n- **阻滞判断错误**\n  - 只关注脉象，不关注身、心、神的功能失常表现\n- 单次治疗多个（3个及以上）阻滞\n- 内七龙、AE、夫妻不和、任督阻滞治疗后再清除出入阻滞\n\n---\n\n### 二、任督阻滞\n\n> 任督是12经脉之海\n\n**特点**：\n1. 是出入阻滞中最严重的一种\n2. 常见于童年手术后，剖腹产术后\n3. 伴有严重、及其的疲倦，或伴有全身各器官功能退化\n\n#### 1. 如何诊断任督阻滞？\n需要综合判断：\n- **脉象**：十二官脉皆极度虚弱\n- **症状**：\n  - 严重的虚弱、疲乏（气血肾虚）\n  - 任督二脉循行部位的症状\n\n#### 2. 如何清除任督阻滞？\n\n**表格20 任督阻滞穴位定位**\n\n| | |穴位|定位|针刺深度|\n| ---- | ---- | ---- | ---- | ---- |\n| 任脉 CV | 入口穴 | 会阴 XIII 1 | 在会阴处，男性当阴囊根部于肛门连线的中点，女性当大阴唇后联合与肛门连线的中点 | 10 |\n| 任脉 CV | 出口穴 | 承浆 XIII 24 | 在面部，当颏唇沟的正中凹陷处 | 1-3 |\n| 督脉 GV | 入口穴 | 长强 XIV 1 | 在尾骨端下，当尾骨端与肛门连线的中点处 | 3 |\n| 督脉 GV | 出口穴 | 龈交 XIV 28 | 在上唇内，唇系带与上齿龈相交接处的下方 | 2 |\n\n**操作步骤**：\n1. 按照会阴→长强→承浆→龈交的顺序依次进针\n2. **会阴、长强**：\n   - 嘱患者脱去内裤，可脱至膝关节，侧卧位，下方腿伸直，上方腿屈曲\n   - 会阴直刺，长强斜刺\n3. 以原穴结束\n\n#### 3. 注意事项\n由于会阴、长强穴位位置特殊，应让患者能够选择同性治疗师进行操作。若治疗师与患者性别不同，治疗时应有与患者相同性别的第三人在场。\n\n#### 4. 常见错误\n- 基础错误\n  - 穴位定位、操作错误\n- 之前未做AE直接纠正任督阻滞\n- 任督阻滞与内障、AE或夫妻不和出现在同一次治疗中\n- 未使用原穴，以其他主管穴结束\n\n---\n\n### 三、瘢痕阻滞\n\n#### 1. 什么时候需要清除瘢痕阻滞？\n- 瘢痕位置在经络循行路线上，且对经气运行产生了影响\n- 有瘢痕未必有瘢痕阻滞\n\n#### 2. 如何清除瘢痕阻滞？\n- 以瘢痕为界，按流注方向将经络分上下游，先刺上游紧邻穴位，后刺下游紧邻穴位\n- 顺经络流注方向进针，得气后补法出针\n\n---\n\n## 第九节·更多穴位的选择\n\n> \"我们必须永远记住，穴位是五行的仆从，而非主人。\" ——诺娜老师\n\n### 1. 五行针灸中如何分类穴位\n\n#### 第一类：穴位组合\n- 主管穴\n- 治疗阻滞的穴位：内七龙、AE、夫妻不和、出入阻滞、任督阻滞\n\n#### 第二类：神性穴位\n\n##### 第一组：初期即可加入，只用于某一行\n- **背俞穴**\n- 最初期即可考虑使用\n- 土：地机、滑肉门\n  > 地机（脾经）：比土行人土壤板结，一滩烂泥\n  > 滑肉门（胃经）：比土行人极度缺乏营养，不断索取的土行人\n- 金：经渠\n\n##### 第二组：初期即可加入，可用于任何一行\n- **神阙**（腹部）\n- **巨阙**\n- **灵墟**（适合内障去做）\n  > 躲在屏障后的神就如襁褓中的婴儿，（得气时）灵墟扎时一定要有，脚都热起来，精神饱满了的感觉\n- **魄户**（膀胱经之脏）\n  > 从该穴旁边的俞穴属性来判（金→肺俞）\n- **膏肓**（心包俞）\n  > 相火→心俞\n- **神堂**\n  > 君火→心俞\n\n##### 第三组：治疗中后期加入，可用于任何一行\n- 任督二脉上穴位\n- 膀胱经第二侧线上穴位\n- 肾经胸部穴位：神藏、俞府\n- 极泉\n\n##### 第四组：治疗中后期加入，只用于某一行\n\n---\n\n## 第十节·天窗穴\n\n> \"人类无法承受太多的现实。\" ——托马斯·斯特恩斯·艾略特\n\n### 1. 天窗穴有什么作用\n- 使人与身外世界相通，开阔人之视野\n- 帮助病人发现新角度看待自身问题，并以此为入口，学会更客观看待事物\n- 让病人学会恰当关闭和开启心灵之窗\n\n**补充说明**：当人失去平衡陷入自我天地、失去对周遭环境的认识时，治疗中帮助其重新建立与外界的联系十分重要，能助其跨越自我圈子，走出困境。\n\n### 2. 为什么要慎用天窗穴\n人如果长期身处黑暗，而一下子给他太多光明，会很不明智。\"人无法承受太多现实。\"\n\n### 3. 何时使用天窗穴\n- 天窗穴效力非常强大，不可轻易使用，治疗之初也不宜使用\n- 使用天窗穴前需先培补病人正气，使其能承受新的光线\n- 并且要肯定这些穴位带来的对真实生活的认识，让病人不至太痛苦\n\n### 4. 如何使用天窗穴\n\n**表格21 天窗穴穴位定位**\n\n|五行|穴位|定位|针刺深度|\n| ---- | ---- | ---- | ---- |\n|君火|天窗 Ⅱ16|在颈外侧部，胸锁乳突肌的后缘，扶突后，与喉结相平|3|\n|君火|天容 Ⅱ17|在颈外侧部，当下颌角的后方，胸锁乳突肌的前缘凹陷中（下颌角稍下方）|3|\n|相火|天牖 Ⅵ16|在颈侧部，当乳突后下方直下，平下颌角，胸锁乳突肌的后缘|3-5|\n|/|男：天池 V 1|乳头中点外一寸|3|\n|/|女：天泉 V 2|在臂内侧，当腋前纹头下2寸，肱二头肌的长、短头之间|5|\n|土|人迎 Ⅸ9|在颈部喉结旁，当胸锁乳突肌的前缘，颈总动脉搏动处|1-3|\n|金|扶突 Ⅹ18|在颈外侧部，喉结旁，当胸锁乳突肌的前后缘之间，与人迎相平|4|\n|金|天府 Ⅸ3|在臂内侧，肱二头肌桡侧缘，腋前纹头下3寸|4-6|\n|水|天柱 Ⅲ10|在项部，大筋（斜方肌）外缘之后发际凹陷中，约当后发际正中旁开1.3寸，与哑门相平|3-5|\n|任脉|天突 ⅩⅢ22|颈部，前正中线上，璇玑（原天突穴处）上1.6寸，环状软骨下方|3|\n\n#### 使用方法\n1. **定位天窗穴**：各行人使用对应的天窗穴\n   - 木行无天窗穴，目窗可以作为天窗穴使用\n\n2. **进针操作**：\n   - 按先左后右的顺序直刺两侧天窗穴\n   - 得气后补法出针，不灸\n   - 君火的两个天窗穴同在小肠经，按照经络流注次序进针（先双侧天窗，后双侧天容）\n   - 相火和金的阴阳两官都有天窗穴，按照先阳后阴的次序进针\n     - 相火：先双侧天牖，后双侧天池/天泉\n     - 金：先双侧扶突，后双侧天府\n\n3. 重复脉诊\n4. 主管穴结束\n\n---\n\n## 附录\n\n### 附录1 十四经循行图\n\n（详见课本图片第45-58页）\n\n包括：\n- Ⅰ 心经\n- Ⅱ 小肠经\n- Ⅲ 膀胱经\n- Ⅳ 肾经\n- Ⅴ 心包经\n- Ⅵ 三焦经\n- Ⅶ 胆经\n- Ⅷ 肝经\n- Ⅸ 肺经\n- Ⅹ 大肠经\n- Ⅺ 胃经\n- Ⅻ 脾经\n- ⅩⅢ 任脉\n- ⅩⅣ 督脉\n\n---\n\n### 附录2 诺娜老师治疗方案取穴举例\n\n---\n\n#### 木\n\n##### 前6次治疗方案\n\n1. **第一次治疗**：\n   1) 内七龙（如果有内障）\n   2) AE\n   3) 原穴：丘墟、太冲，▲3，针补\n\n2. **第二次治疗**：\n   - 在春季，时令穴：足临泣、大敦，▲3，针补\n   - 不在春季，经气转化：中封、光明，▲3，针补（金到木）\n     - 中封（经气转化）\n     - 光明（络）\n     - 肝（经）\n     - 胆（经）\n   > 注：母穴用其它代替，因为水不一定足（给不了孩子）\n   > 金得艮才行；平衡了，不需要用主管穴了\n   - 第二次治疗木也可以用：阳陵泉+太冲（土提供支撑和养分给木）\n\n3. **第三次治疗**：\n   1) 神阙：▲3，隔盐灸（高血压患者用巨阙，只针不灸）\n      > 阳白（经气转化）；丰隆（络）\n   2) 原穴\n\n4. **第四次治疗**：\n   1) 背俞穴：胆俞、肝俞，▲7，针补（应该先阳后阴）\n   2) 原穴或经气转化\n\n5. **第五次治疗**：\n   1) 期门，▲5，针补\n   2) 原穴或经气转化\n\n6. **第六次治疗**：\n   1) 膏肓，▲7，针补\n   2) 原穴或经气转化\n\n##### 长期治疗取穴举例\n\n|年份|取穴内容|\n| ---- | ---- |\n|2000年|肝/肺阻滞，肝俞，胆俞，丘墟，太冲<br>大敦，足临泣（春季）<br>光明，中封<br>肝俞，胆俞，中封|\n|2001年|三焦/胆阻滞，丘墟，太冲<br>阳陵泉，中封<br>大敦，足临泣（春季）<br>目窗，丘墟，太冲<br>京门，中封<br>膏...|\n\n---\n\n#### 相火\n\n> 注：中冲定位，和传统针灸不一样\n> 治相火，等于巩固外围\n\n##### 前4次按相火治疗\n\n1. **第一次治疗**：\n   1) 内七龙（如果有内障）\n   2) AE\n   3) 原穴：阳池、大陵，**只针不灸**（3年以上治疗师才灸）\n\n2. **第二次治疗**：\n   母穴：中渚、中冲，▲3，针补\n\n3. **第三次治疗**：\n   1) 膏肓，▲7，针补\n   2) 原穴或母穴\n\n4. **第四次治疗**（可能确定相火）：\n   1) 背俞穴：三焦俞、心包俞，▲7，针补\n   2) 原穴或母穴\n\n5. **第五次治疗**：\n   时令穴（在火的时间或季节）：支沟▲5，针补；劳宫▲3，针补\n\n6. **第六次治疗**：\n   1) 郄门，▲5，针补\n   2) 原穴或母穴\n\n##### 长期治疗取穴举例\n> 本例患者已连续治疗十五年\n\n1. **2000年**\n   - 魄户，阳池，大陵\n   - 小肠/膀胱阻滞，中渚，中冲\n   - 膏肓，阳池，大陵\n   - 重新检查AE(没有)，夫妻不和，阳池，大陵\n   - 巨阙，曲泽，太溪\n   - 神堂，会宗，郄门\n   - 心包俞，三焦俞，支沟，劳宫（夏季）\n   - 中渚，中冲\n   - 三焦/胆阻滞\n   - 消泺，阳池，大陵\n\n2. **2001年**\n   - 大肠/胃阻滞，鸠尾，中渚，中冲\n   - 肾/心包阻滞，郄门，会宗\n   - 膏肓，天井，大陵\n   - 大肠/胃阻滞，曲泽，太溪\n   - 外关，内关\n   - 三焦俞，心包俞，支沟，劳宫（夏季）\n   - 俞府，中渚，中冲\n   - 天牖，天泉，中渚，中冲\n   - 膏肓，阳池，大陵\n\n---\n\n#### 君火\n\n> 注：中冲定位，和传统针灸不一样\n\n##### 前6次治疗方案\n\n1. **第一次治疗**：\n   1) 原穴：腕骨、神门，▲3，针补\n\n2. **第二次治疗**：\n   母穴：后溪、少冲，▲3，针补\n\n3. **第三次治疗**：\n   1) 神堂，▲5，针补\n   2) 原穴或母穴\n\n4. **第四次治疗**：\n   1) 背俞穴：小肠俞、心俞，▲7，针补\n   2) 原穴或母穴\n\n5. **第五次治疗**：\n   时令穴（在火的时间或季节）：阳谷、少府，▲3，针补\n\n6. **第六次治疗**：\n   1) 支正，▲3，针补\n   2) 络穴：通里，▲3，针补\n\n##### 长期治疗取穴举例\n> 本例患者已连续治疗十五年\n\n|序号|取穴方案|\n| ---- | ---- |\n|1|内七龙，AE(没有)，夫妻不和，阳池，大陵|\n|2|膏肓，中渚，中冲|\n|3|神阙，天井，大陵|\n|4|膏肓（11壮），中渚，中冲|\n|5|中渚，中冲|\n|6|（转为治疗君火）腕骨，神门|\n|7|脾/心阻滞，后溪，少冲|\n|8|少府，阳谷（时令穴）|\n|9|支正，后溪，少冲|\n|10|背腧...|\n\n---\n\n#### 土\n\n##### 前6次治疗方案\n\n1. **第一次治疗**\n   1) 内七龙（如果有内障）\n   2) AE\n   3) 原穴：冲阳、太白，▲3，针补\n\n2. **第二次治疗**\n   母穴：解溪、大都，▲3，针补\n\n3. **第三次治疗**\n   1) 神阙，▲3，隔盐灸\n   2) 原穴或母穴\n\n4. **第四次治疗**\n   1) 背俞穴：胃俞、脾俞，▲7，针补\n   2) 原穴或母穴\n\n5. **第五次治疗**\n   时令穴（在土的时间或季节）：足三里▲7，针补；太白▲3，针补\n\n6. **第六次治疗**\n   1) 滑肉门，▲5，针补\n   2) 原穴或母穴\n\n##### 长期治疗取穴举例\n> 本例患者已连续治疗六年\n\n**2000年**：\n- 中脘，解溪，大都\n- 人迎，解溪，大都\n- 小肠/膀胱阻滞，周荣，冲阳，太白\n- 膏肓，三阴交，冲阳\n- 天枢，大横，解溪，大都\n- 小肠/膀胱阻滞，下巨虚，公孙\n- 气海，解溪，大都\n- 脾俞，胃俞，解溪，大都\n- 足三里，太白（长夏）\n- 胃仓，隐白\n- 肝/肺阻滞，隐白\n\n**2001年**：\n- 小肠/膀胱阻滞，冲阳，太白\n- 丰隆，公孙\n- 肾/心包阻滞，头维，冲阳，太白\n- 脾/心阻滞，大肠/胃阻滞，足三里，太白\n- 再通大肠/胃阻滞，巨阙，解溪，大都\n- 不容，解溪，大都\n- 肾/心包，三阴交，冲阳\n- 人迎，解溪，大都\n- 腰阳关，足三里，太白\n- 小肠/膀胱阻滞，天枢，大横，冲阳，太白\n- 丰隆，公孙\n- 小肠/膀胱阻滞，地仓，冲阳，太白\n\n---\n\n#### 金\n\n##### 前6次治疗取穴\n\n1. **第一次治疗**\n   1) 内七龙（如果有内障）\n   2) AE\n   3) 原穴：合谷、太渊，▲3，针补\n\n2. **第二次治疗**\n   母穴：曲池、太渊，▲3，针补\n\n3. **第三次治疗**\n   1) 魄户，▲7，针补\n   2) 原穴或母穴\n\n4. **第四次治疗**\n   1) 背俞穴：大肠俞、肺俞，▲7，针补\n   2) 原穴或母穴\n\n5. **第五次治疗**\n   1) 经渠，**只针不灸** → 神性、主管\n   2) 络穴：偏历，▲5，针补 → 大肠络穴\n\n6. **第六次治疗**\n   1) 鱼际，**只针不灸** → 神性、主管\n   2) 合谷，▲5，针补，也可用偏历+鱼际\n\n##### 长期治疗取穴举例\n> 本例患者已连续治疗八年\n\n**2000年**：\n- 筋缩，合谷，太渊\n- 魄户，鱼际，偏历\n- 中府，合谷，太渊\n- 扶突，天府，曲池，太渊\n- 云门，温溜，鱼际\n- 肝/肺阻滞，大肠俞，肺俞，曲池，太渊\n- 腰阳关，合谷，太渊\n- 重新检查AE，心包和心少量，商阳，经渠（秋季）\n- 扶突，天府，鱼际，阳溪\n\n**2001年**：\n- 大肠俞，肺俞，曲池，太渊\n- 肝/肺阻滞，神藏，曲池，太渊\n- 身柱，肝/肺阻滞，经渠，偏历\n- 肩髃，商阳，经渠（秋季）\n- 大肠俞，肺俞，合谷，太渊\n\n**2002年**：\n- 魄户，曲池，太渊\n- 巨阙，鱼际，合谷\n- 大肠俞，肺俞，曲池，太渊\n\n---\n\n#### 水\n\n##### 前6次治疗方案\n\n1. **第一次治疗**\n   1) 内七龙（如果有内障）\n   2) AE\n   3) 原穴：京骨、太溪，▲3，针补\n\n2. **第二次治疗**\n   母穴：至阴、复溜，▲3，针补\n\n3. **第三次治疗**\n   1) 膏肓，▲7，针补\n   2) 原穴或母穴\n\n4. **第四次治疗**\n   1) 背俞穴：膀胱俞、肾俞，▲7，针补\n   2) 原穴或母穴\n\n5. **第五次治疗**\n   时令穴（在水的时间或季节）：足通谷、阴谷，▲3，针补\n\n6. **第六次治疗**\n   > 注：肚脐旁开1.5寸，肾经上的肓俞\n   1) 肓俞，▲7，针补\n   2) 原穴或母穴\n\n##### 长期治疗取穴举例\n> 本例患者已连续治疗两年半\n\n|2001年|2002年|\n| ---- | ---- |\n|膀胱俞，肾俞，京骨，太溪|俞府，昆仑，然谷|\n|昆仑，然谷|足通谷，阴谷（时令穴）|\n|神藏，京骨，太溪|身柱，至阴，复溜|\n|委中，大钟|委中，大钟|\n|肓俞，京骨，太溪|俞府，至阴，复溜|\n|至阴，复溜|肾俞，膀胱俞，京骨，太溪|\n|足通谷，阴谷（时令穴）|巨阙，昆仑，然谷|\n||天柱，至阴，复溜|\n\n---\n\n## 符号说明\n\n|符号|含义|\n| ---- | ---- |\n|⊥|进针深度为几分|\n|▲|艾灸壮数|\n|X|禁止使用|\n|XP|怀孕的第某个月份起禁用|\n\n---\n\n*整理自《五行针灸实操课学习手册》2023年8月山东青岛版*\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-29", "name": "美容针灸与黄帝内针", "desc": "面部穴位+同气相求", "content": "# 20260529-周五·针灸+中医外治法\n\n> 本周重点：美容针灸 · 黄帝内针 · 艾灸火龙灸 · 灌肠 · 耳鼻喉口腔\n\n---\n\n## 一、美容针灸——面部年轻化密码\n\n### 1.1 核心理论（中医+现代）\n\n| 层面 | 中医理论 | 现代机制 |\n|------|---------|---------|\n| **气血** | \"十二经脉三百六十五络，其血气皆上于面而走空窍\" | 促进成纤维细胞I型胶原↑30%，弹性蛋白交联重构 |\n| **脏腑** | 脾虚→松弛/法令纹；肝郁→色斑/暗沉；肾虚→早衰/干皱 | 调节神经-体液网络，改善局部微循环 |\n| **经络** | 疏通经络、行气活血 | 扩张毛细血管，面部血流↑35% |\n\n**抗衰机理**：浅刺达真皮/SMAS层 → 激活成纤维细胞 → 胶原增生重组 → 紧致抗皱\n\n### 1.2 面部核心穴位\"地图\"\n\n#### 内轮廓（局部紧致）\n| 穴位 | 定位 | 功效 |\n|------|------|------|\n| 首面/鱼腰 | 额部/眉中 | 改善额纹、眼周细纹 |\n| 瞳子髎 | 眼外角 | 提眼角、改善鱼尾纹 |\n| 颧髎 | 颧骨下缘 | 改善法令纹、提升颊肌 |\n| 地仓 | 口角旁开 | 改善唇周细纹 |\n| 承浆 | 下唇下方 | 紧致下颌轮廓 |\n\n#### 外轮廓（整体提升）\n| 穴位 | 功效 |\n|------|------|\n| 神庭/头临泣/头维/曲鬓 | 提升上部肌肉、眼角 |\n| 听宫/牵正/颊车 | 改善咬肌、上提唇角 |\n| 大迎/廉泉 | 收紧下颌轮廓 |\n\n#### 眼周专项\n- **四白**（眶下孔）：促进眶周循环 → 淡化黑眼圈/眼袋\n- **攒竹**（眉头）：刺激眼轮匝肌收缩 → 改善鱼尾纹\n\n### 1.3 远端配穴（全身调节）\n\n| 穴位 | 归属 | 功效 |\n|------|------|------|\n| **合谷** | 手阳明大肠经 | \"面口合谷收\"，调节头面部气血 |\n| **足三里** | 足阳明胃经 | 健脾益气，提升整体皮肤代谢 |\n| **三阴交** | 足太阴脾经 | 调补肝脾肾，改善内分泌失调皮肤问题 |\n| **血海** | 足太阴脾经 | 配合颧髎 → 调节酪氨酸酶活性，抑制黑色素 |\n| **曲池** | 手阳明大肠经 | 配合内庭 → 降低皮脂腺分泌，上调抗炎因子 |\n\n### 1.4 分部取穴原则\n\n| 问题 | 归属经脉 | 局部穴位 | 远端穴位 |\n|------|---------|---------|---------|\n| 额头纹 | 胃经+胆经 | 阳白、头维 | 足三里 |\n| 鱼尾纹 | 三焦经+胆经 | 丝竹空、瞳子髎 | 阳陵泉 |\n| 眉间纹 | 督脉+膀胱经 | 印堂、攒竹 | 昆仑 |\n| 法令纹 | 大肠经+胃经 | 迎香、巨髎 | 足三里 |\n\n### 1.5 适应症\n\n✅ **面部皱纹**：额纹/鱼尾纹/眉间纹/法令纹/颈纹  \n✅ **面部松弛**：眼睑松垂/苹果肌下移/下颌线模糊  \n✅ **肤质问题**：面色暗沉/黄褐斑/痤疮/色素沉着  \n✅ **轮廓问题**：眼袋浮肿/面部虚胖/气血不足憔悴  \n\n### 1.6 操作规范\n\n1. **辨证配穴**（非固定模板！）\n   - 皱纹类型（动态纹/静态纹）\n   - 松弛程度（轻/中/重度）\n   - 伴随问题（痤疮/黄褐斑）\n   - 体质辨识（气虚/血瘀/湿热）\n\n2. **针具选择**：直径0.10-0.12mm（比头发丝更细），一次性使用\n\n3. **留针时间**：15-30分钟\n\n4. **疗程**：每周1-2次，10-12次为1疗程\n\n### 1.7 与公主陛下五步法整合\n\n| 五步法阶段 | 美容针灸侧重 | 配穴建议 |\n|-----------|-------------|---------|\n| 第一步（开路先锋） | 疏肝理气→面色暗沉 | 合谷、太冲、三阴交 |\n| 第二步（中场补给） | 补气血→面色萎黄 | 足三里、血海、气海 |\n| 第三步（攻坚克难） | 活血化瘀→顽固色斑 | 血海、膈俞、耳穴（肝/脾/肾） |\n| 第四步（清补兼施） | 边清边补→整体改善 | 面部局部穴+远端调本 |\n| 第五步（长治久安） | 固本培元→延缓衰老 | 肾俞、关元、三阴交 |\n\n---\n\n## 二、黄帝内针——阴阳倒换求同气\n\n### 2.1 四大总则\n\n| 法则 | 含义 | 示例 |\n|------|------|------|\n| **上病下治** | 病在身体上部 → 针刺下部穴位 | 头痛→针足部穴位 |\n| **下病上治** | 病在下部 → 针刺上部穴位 | 腰痛→针手部穴位 |\n| **左病右治** | 病在左侧 → 针刺右侧穴位 | 左肩痛→针右肩或右手 |\n| **右病左治** | 病在右侧 → 针刺左侧穴位 | 右踝扭伤→针左踝或左手 |\n| **同气相求** | 经络同气+三焦同气 | 患处对侧同名经同焦部 |\n| **阴阳倒换求** | 下焦问题→上焦倒换 | 肩关节(下焦)→腕关节(上焦)治 |\n\n> ⚠️ 核心口诀：\"从阴引阳，从阳引阴，以右治左，以左治右\"\n\n### 2.2 六对同名经同气\n\n| 手足阳明 | 手足少阳 | 手足太阳 | 手足太阴 | 手足少阴 | 手足厥阴 |\n|---------|---------|---------|---------|---------|---------|\n| 胃经↔大肠经 | 胆经↔三焦经 | 膀胱经↔小肠经 | 脾经↔肺经 | 肾经↔心经 | 肝经↔心包经 |\n\n### 2.3 三焦同气定位\n\n#### 躯干三焦\n| 三焦 | 范围 | 代表穴位 |\n|------|------|---------|\n| **上焦** | 鸠尾穴以上（心、肺） | 膻中、肺俞、心俞 |\n| **中焦** | 鸠尾→神阙（脾胃、肝胆） | 中脘、肝俞、脾俞 |\n| **下焦** | 神阙以下（肾、胞宫） | 关元、肾俞、命门 |\n\n#### 四肢三焦\n| 三焦 | 上肢 | 下肢 |\n|------|------|------|\n| **上焦** | 腕关节（内关/外关→指端） | 踝关节（三阴交/悬钟→趾端） |\n| **中焦** | 肘关节 | 膝关节 |\n| **下焦** | 肩关节 | 髋关节 |\n\n### 2.4 临床应用流程\n\n```\n① 识症 → 确定症状部位\n② 辨经 → 确定归属哪条经络\n③ 三焦定位 → 确定属于上/中/下焦\n④ 左病右治 → 在对侧同名经络的同焦部位寻找阿是穴\n⑤ 阴阳倒换 → 下焦问题可倒换到上焦\n```\n\n### 2.5 妇科应用（痛经/月经过多）\n\n| 症状 | 识症 | 辨经 | 取穴（同侧或对侧） |\n|------|------|------|------------------|\n| 痛经（少腹痛） | 下焦 | 任脉/肝经/脾经 | 内关（厥阴）/三阴交（太阴）/太冲（厥阴） |\n| 月经不调 | 下焦 | 脾经/肝经 | 血海、三阴交、公孙 |\n| 围绝经期潮热 | 上焦 | 心经/心包经 | 内关、神门 |\n\n### 2.6 临床研究证据\n\n据《黄帝内针治疗原发性痛经疗效观察》（万方数据，2025）：\n- 总有效率**92.0%** vs 布洛芬对照组82.0%\n- 治疗后VAS评分、CMSS评分均显著下降\n- 结论：可快速有效缓解症状\n\n---\n\n## 三、艾灸与火龙灸——温通调补\n\n### 3.1 火龙灸来源与优势\n\n**来源**：改良自\"长蛇灸\"和\"督脉灸\"，点燃艾绒后外形如\"火龙\"而得名\n\n| 对比 | 传统长蛇灸/督灸 | 火龙灸 |\n|------|---------------|--------|\n| 治疗部位 | 仅背部督脉 | 覆盖全身经脉（督脉+任脉+胃经+脾经） |\n| 发泡程度 | 多发泡灸 | 改良为非发泡或轻发泡 |\n| 治疗范围 | 强直性脊柱炎、类风湿 | 更广泛（妇科/脾胃/肺系/疼痛） |\n| 患者接受度 | 低（难以耐受水泡） | 高 |\n\n### 3.2 火龙灸四大功效\n\n1. **温**：温阳散寒，驱散寒湿\n2. **通**：通经活络，疏通气血\n3. **调**：调和阴阳，平衡脏腑\n4. **补**：补益气血，固本培元\n\n### 3.3 适应症\n\n| 类别 | 具体病症 |\n|------|---------|\n| **妇科** | 宫寒不孕、痛经、月经不调、慢性盆腔炎（寒湿型） |\n| **亚健康** | 畏寒肢冷、手脚冰凉、易感冒、疲劳综合征 |\n| **疼痛** | 强直性脊柱炎、类风湿、腰肌劳损、颈椎病 |\n| **脾胃** | 胃寒、腹痛腹泻、消化不良 |\n| **呼吸** | 慢性支气管炎（阳虚咳喘）、过敏性鼻炎 |\n| **男科** | 前列腺炎（肾阳虚型） |\n| **减肥** | 脾虚湿阻/脾肾阳虚型肥胖 |\n\n### 3.4 操作流程（山西省地方标准DB 14T 2733—2023）\n\n```\n┌─────────────────────────────────────────────────────────┐\n│  施术前评估 → 操作前准备                                │\n│       ↓                                                  │\n│  铺药粉（辨证配方）→ 铺桑皮纸 → 铺姜蓉/蒜泥            │\n│       ↓                                                  │\n│  铺艾绒 → 喷洒95%酒精 → 点燃                           │\n│       ↓                                                  │\n│  燃烧30-40秒 → 湿毛巾灭火                               │\n│       ↓                                                  │\n│  反复施灸5次（每次点火间隔温度：                        │\n│    四肢≥39℃、颈肩腰背≥42℃、腹部≥45℃）              │\n│       ↓                                                  │\n│  点穴按压 → 操作后处理                                 │\n└─────────────────────────────────────────────────────────┘\n```\n\n### 3.5 温度控制标准\n\n| 部位 | 体表温度上限 |\n|------|------------|\n| 四肢 | ≤42℃ |\n| 颈肩腰背 | ≤46℃ |\n| 腹部 | ≤48℃ |\n\n### 3.6 疗程设计\n\n| 病情 | 频率 | 疗程 |\n|------|------|------|\n| 急性病 | 每周2-3次 | 4-6次 |\n| 慢性病/调理 | 每周1次 | 6-10次（休息1-2周后可续） |\n| 三伏天（冬病夏治） | 每7-10天1次 | 6次 |\n\n**单次时长**：30-45分钟\n\n### 3.7 禁忌症\n\n❌ 阴虚火旺体质者  \n❌ 严重慢性病患者  \n❌ 孕妇  \n❌ 经期女性（经量过多者）  \n❌ 艾叶/生姜等过敏者  \n❌ 皮肤破损、局部感染、脓肿、溃烂  \n\n### 3.8 注意事项\n\n- 施灸后4小时内避免接触冷水、冷风\n- 6小时内禁食生冷食物\n- 可适量饮用温开水帮助阳气收敛\n- 若出现小水疱，保持干燥自愈\n- 大水疱需医生指导处理，防止感染\n\n### 3.9 辨证配方\n\n| 证型 | 药粉配方 |\n|------|---------|\n| 宫寒为主 | 温经散寒药（艾叶、肉桂、吴茱萸等） |\n| 阳虚为主 | 偏补阳药（附子、干姜、巴戟天等） |\n| 气滞血瘀 | 活血化瘀药（红花、当归、川芎等） |\n\n---\n\n## 四、中药保留灌肠——直肠给药的智慧\n\n### 4.1 核心理念\n\n**\"药不走弯路，直达子宫与盆腔\"**\n\n- 直肠黏膜吸收 → 弥散至盆腔间隙 → 子宫/输卵管/卵巢\n- 避开肝脏首过效应 → 提高生物利用度\n- 起效快、浓度高、针对性强\n\n### 4.2 妇科适应症\n\n| 疾病类型 | 具体病症 |\n|---------|---------|\n| **盆腔炎症** | 慢性盆腔炎、盆腔淤血综合征、盆腔积液 |\n| **输卵管问题** | 输卵管炎、输卵管不畅/粘连 |\n| **子宫内膜** | 子宫内膜异位症、子宫腺肌症 |\n| **宫腔操作后** | 人流术后、诊刮术后、节育器取出术后、宫腔粘连术后 |\n| **痛经** | 顽固性痛经（寒凝血瘀型） |\n| **不孕症** | 宫寒不孕、备孕困难（配合艾灸更佳） |\n\n### 4.3 常用灌肠药物分类\n\n| 功效 | 代表药物 |\n|------|---------|\n| 清热解毒 | 黄柏、败酱草、金银花、白花蛇舌草 |\n| 活血化瘀 | 红藤、大血藤、丹皮、赤芍、丹参、当归、川芎 |\n| 软坚散结 | 莪术、三棱、浙贝母 |\n| 行气止痛 | 川楝子、九香虫、延胡索 |\n\n### 4.4 经典灌肠方示例\n\n**妇科灌肠基础方**（厦门市中医院）：\n```\n大黄 5-15g | 丹皮 10-30g | 红花 5-15g | 败酱草 10-40g\n地丁 5-20g | 莪术 5-20g | 泽兰 5-20g | 三棱 5-20g\n川楝子 5-20g | 浙贝 5-20g\n```\n\n**程绮雯案例灌肠方**（来自公主陛下临床）：\n- 原方14味 + 增强方17味（详见 ./抗衰门诊/程绮雯案例总结.md）\n\n### 4.5 操作规范\n\n| 步骤 | 要点 |\n|------|------|\n| **体位** | 左侧卧位，臀部抬高>10cm |\n| **插管深度** | 10-15cm（肛管） |\n| **药液温度** | 38-40℃（过高损伤黏膜，过低引起便意） |\n| **药液体积** | 50-200ml（浓缩型50-100ml，普通型100-200ml） |\n| **灌注速度** | 缓慢注入 |\n| **保留时间** | ≥30分钟（最佳≥40分钟至1小时） |\n| **最佳时机** | 睡前注入，保留至次晨 |\n\n### 4.6 疗程设计\n\n| 参数 | 建议 |\n|------|------|\n| 起始时间 | 月经干净后2-3天 |\n| 每日次数 | 1次 |\n| 连续天数 | 10天（急性）/ 14天（慢性） |\n| 疗程数 | 至少连续3个疗程 |\n| 经期 | **停用** |\n\n### 4.7 禁忌症\n\n❌ 孕妇  \n❌ 月经量过多/崩漏（经期禁用）  \n❌ 肠道溃疡、出血  \n❌ 肛周严重破损  \n❌ 急性高热、严重体虚  \n\n### 4.8 灌肠+艾灸：内外同治最佳CP\n\n| 外治法 | 功效 | 配合优势 |\n|--------|------|---------|\n| **灌肠** | 清、通、散（清除炎症/湿热/瘀堵） | 一内一外 |\n| **艾灸** | 温、补、通（温宫散寒/扶阳固本） | 一攻一补 |\n\n---\n\n## 五、耳鼻喉口腔科常见病外治法\n\n### 5.1 耳部疾病\n\n#### 常见病种\n- 耳鸣（神经性耳鸣）\n- 突发性耳聋（恢复期）\n- 分泌性中耳炎（耳闭）\n- 耳胀（急性卡他性中耳炎早期）\n\n#### 核心穴位\n| 穴位 | 定位 | 功效 |\n|------|------|------|\n| **听宫** | 手太阳小肠经，耳屏前，下颌骨髁突后缘 | 治疗各种耳疾核心要穴 |\n| **听会** | 足少阳胆经，耳屏间切迹前 | 清泻肝胆、通窍聪耳 |\n| **翳风** | 手少阳三焦经，乳突前下方 | 聪耳通窍、散风清热 |\n| **耳门** | 手少阳三焦经，耳屏上切迹前 | 开窍聪耳、通经活络 |\n\n#### 配穴原则\n| 证型 | 配穴 |\n|------|------|\n| 外邪侵袭 | 外关、合谷、曲池、大椎 |\n| 肝火上扰 | 太冲、丘墟、中渚 |\n| 痰火郁结 | 丰隆、大椎 |\n| 气滞血瘀 | 膈俞、血海 |\n| 肾精亏损 | 肾俞、关元 |\n| 气血亏虚 | 足三里、气海、脾俞 |\n\n#### 临床证据\n据2020年Journal of Integrative Medicine系统评价（15项RCT，1352例）：\n- 针灸+糖皮质激素总有效率**88.7%** vs 单用激素**72.3%**\n- 联合组听力平均多恢复8.6分贝\n\n### 5.2 鼻部疾病\n\n#### 常见病种\n- 鼻窒（慢性鼻炎）\n- 鼻渊（慢性鼻窦炎）\n- 鼻鼽（过敏性鼻炎）\n- 嗅觉减退\n\n#### 核心穴位\n| 穴位 | 定位 | 功效 |\n|------|------|------|\n| **迎香** | 手阳明大肠经，鼻翼旁开0.5寸 | 通鼻窍、散风清热 |\n| **印堂** | 督脉，两眉连线中点 | 醒脑通鼻、宁神止痛 |\n| **上星** | 督脉，前发际正中上1寸 | 清热通鼻、宣通鼻窍 |\n| **攒竹** | 足太阳膀胱经，眉头凹陷 | 清热明目、通鼻窍 |\n| **合谷** | 手阳明大肠经 | \"面口合谷收\" |\n\n#### 外治法配合\n- **中药雾化喷鼻**：金银花、黄芩、苍耳子煎剂\n- **穴位敷贴**：吴茱萸粉调醋敷涌泉（过敏性鼻炎）\n- **雷火灸**：迎香、肺俞、大椎\n\n### 5.3 咽喉疾病\n\n#### 常见病种\n- 喉痹（慢性咽炎）\n- 梅核气（咽异感症）\n- 喉喑（慢性喉炎）\n\n#### 核心穴位\n| 穴位 | 归属 | 功效 |\n|------|------|------|\n| **廉泉** | 任脉，喉结上方 | 清热利咽、通窍开音 |\n| **天突** | 任脉，胸骨上窝 | 理气化痰、利咽开音 |\n| **人迎** | 足阳明胃经，喉结旁开1.5寸 | 清肺利咽、调理气血 |\n| **列缺** | 手太阴肺经 | 宣肺解表、利咽止痛 |\n| **照海** | 足少阴肾经 | 滋阴利咽、通调二便 |\n\n#### 特色外治法\n- **扁桃体啄治法**：不切除扁桃体，保留免疫功能\n- **中药雾化喷喉**：直接作用于咽喉黏膜\n- **耳穴贴压**：咽喉、肺、肾、神门\n\n### 5.4 口腔科常见病\n\n#### 口疮（复发性阿弗他溃疡）\n\n**辨证分型与治法**：\n\n| 证型 | 证候特点 | 内服 | 外治 |\n|------|---------|------|------|\n| 胃火上炎 | 溃疡黄苔、红肿疼痛、口臭便秘 | 清胃散合导赤散 | 冰硼散涂敷/复方黄柏液含漱 |\n| 阴虚火旺 | 溃疡淡红、反复发作、腰膝酸软 | 知柏地黄丸 | 养阴生肌散 |\n| 脾肾阳虚 | 溃疡白淡、隐痛绵绵、形寒肢冷 | 附子理中丸 | 吴茱萸粉调醋敷涌泉 |\n\n**外治法速查**：\n- **含漱法**：复方黄芩液、淡盐水\n- **吹药法**：冰硼散（实证）、柳花散（虚证）\n- **针灸**：合谷、足三里、太溪（脾肾阳虚悬灸）\n- **穴位敷贴**：附子+细辛+吴茱萸敷涌泉\n\n#### 牙痛\n\n**快速止痛外治法**：\n\n| 方法 | 操作 | 要点 |\n|------|------|------|\n| **按摩** | 按压肩井穴30秒 | 力度以能耐受为度 |\n| **含漱** | 马齿苋汁/五倍子煎汁 | 每日数次 |\n| **夹药** | 细辛夹生地含于牙痛处 | 咬紧3-5分钟 |\n| **纳鼻** | 白芷+冰片研末置鼻前庭 | 1-3分钟起效 |\n| **外搽** | 花椒+冰片+荜茇浓汁 | 棉球浸透咬于患处 |\n\n---\n\n## 六、外治法与五步法整合速查\n\n### 6.1 归元AI知识体系关联\n\n| 五步法 | 核心问题 | 推荐外治法 | 穴位/部位 |\n|--------|---------|-----------|----------|\n| **第一步·开路** | 气滞血瘀、肝郁 | 针灸（合谷/太冲/三阴交）、耳穴 | 疏肝解郁 |\n| **第二步·补给** | 气血不足、脾虚 | 艾灸（足三里/关元/气海）、火龙灸 | 温补气血 |\n| **第三步·攻坚** | 瘀血阻滞、痰凝 | 刺络拔罐、穴位注射 | 活血化瘀 |\n| **第四步·清补** | 虚实夹杂 | 艾灸+灌肠组合 | 边清边补 |\n| **第五步·长治** | 固本培元 | 美容针灸、节气灸 | 延缓衰老 |\n\n### 6.2 症状→外治法快速匹配\n\n| 症状 | 首选外治法 | 次选 |\n|------|----------|------|\n| 面色暗沉/黄褐斑 | 美容针灸 | 耳穴（肝/脾/肾） |\n| 痛经（寒凝血瘀） | 火龙灸+灌肠 | 黄帝内针（三阴交/太冲） |\n| 慢性盆腔炎 | 灌肠+艾灸 | 中药塌渍 |\n| 围绝经期潮热/失眠 | 黄帝内针（内关/神门） | 五行针灸（清心包/肝经） |\n| 过敏性鼻炎 | 艾灸（迎香/肺俞） | 穴位敷贴（涌泉） |\n| 口腔溃疡 | 针灸+外敷 | 含漱法 |\n| 肩颈疼痛 | 黄帝内针 | 刺络拔罐 |\n| 产后/术后体虚 | 火龙灸 | 艾箱灸（关元/足三里） |\n\n---\n\n## 七、参考文献\n\n1. 《黄帝内针讲义》- 喜马拉雅声音专辑\n2. 《黄帝内针总论》- 原创力文档\n3. 《火龙药灸操作规程》DB 14T 2733—2023 - 山西省地方标准\n4. 《黄帝内针治疗原发性痛经疗效观察》- 万方数据2025\n5. 《针灸治疗耳鸣突发性耳聋循证指南2026》- OriEast\n6. 《中医耳鼻喉科针灸通窍技术操作规范》- 2026年标准文档\n7. 《中医口腔科诊疗规范》- 原创力文档2026\n8. 《中药保留灌肠》- 云南省中医医院\n9. 《面部针灸美容穴位奥秘与操作全解析》- 河南省中医院2025\n10. 《针灸美容抗衰》- 期刊网2025\n\n---\n\n**📅 学习日期**：2026-05-29（周五）  \n**📁 来源**：归元AI知识体系/中医学习/针灸/ + 外治法/\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-30", "name": "五行针灸各阻滞表现", "desc": "五行阻滞鉴别", "content": "# 五行针灸各阻滞表现\n\n## 小肠→膀胱阻滞\n\n### 心理原因\n1. 不忍听、不忍看\n2. 用脑过度\n3. 不能\"筛选\"、分类、整理\n4. 表达不清、口吃、结巴等\n\n### 诊断\n#### 症状表现\n1. 外感、头痛、项强、眼部、耳及咽部不适等\n2. 肩背、腰腿痛等\n\n一般以症状为主，脉象为辅。\n\n---\n\n## 肾→心包阻滞\n\n### 心理原因\n1. 不承认恐惧\n2. 难以与人建立亲密关系；心中完全开放或设防\n\n### 诊断\n#### 症状表现\n1. 心悸、胸闷等\n2. 乳腺问题\n3. 泌尿生殖系问题\n\n---\n\n## 三焦→胆阻滞\n\n### 心理原因\n1. 思维不灵活\n2. 缺乏视野、眼光\n\n### 诊断\n#### 症状表现\n1. 偏头疼、肩痛、耳不适、手脚冷等\n2. 寒热往来、口苦、目眩等\n\n---\n\n## 肝→肺阻滞\n\n### 心理原因\n1. 压抑愤怒\n2. 生闷气\n3. 绝望感\n4. 创造力难以发挥\n\n### 诊断\n#### 症状表现\n1. 咳嗽等呼吸道问题\n2. 乳房、胸腔等问题\n3. 肠胃问题\n\n---\n\n## 大肠→胃阻滞\n\n### 心理原因\n1. 放不下，不能释怀\n2. 长期悲哀难解\n3. 缺少灵感\n\n### 诊断\n#### 症状表现\n1. 眼耳鼻的症状\n2. 过敏性鼻炎等\n3. 便秘或腹泻\n\n---\n\n## 脾→心阻滞\n\n### 症状表现\n- 腹部、消化道问题\n- 胸腔、乳房不适\n- 淋巴结问题\n- 饮食失常、纳差或易饿\n\n### 心理症状\n- 难以接受他人对自己的照顾\n- 对人的关心、照顾无处可施\n- 跟母亲的关系出现问题\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-30", "name": "五行针灸天窗穴与神性穴", "desc": "特定穴详解", "content": "# 五行针灸天窗穴与神性穴\n\n## 天窗穴\n\n### 使用原则\n天窗穴并非每个患者都需要使用。主要用于帮助患者开阔视野、照亮人生道路，通常用于患者经历人生转变或需要更多光明指引时。\n\n### 针灸方式\n- **只针不灸**\n- 针刺时需根据患者五行属性选择相应的天窗穴\n- 针刺后以护持一行的主管穴（如原穴、五输穴、络穴等）结束治疗\n\n### 穴位举例\n\n| 经脉 | 天窗穴 |\n|------|--------|\n| 小肠经 | 天窗、天容 |\n| 膀胱经 | 天柱 |\n| 心包经 | 天池（男）、天泉（女） |\n| 三焦经 | 天牖 |\n| 肺经 | 天府 |\n| 大肠经 | 扶突 |\n| 胃经 | 人迎 |\n| 任脉 | 天突 |\n| 督脉 | 风府 |\n\n---\n\n## 神性穴\n\n### 使用原则\n神性穴的选择主要基于其名字所暗示的特殊功能（如灵墟、魄户、劳宫等）。这些穴位通常用于加强与患者内在\"神\"的沟通。\n\n### 针灸方式\n- **只针不灸**，直接针刺即可\n- 需根据患者的具体情况和五行属性选择合适的穴位\n\n### 常用神性穴\n- 灵墟\n- 魄户\n- 劳宫\n\n---\n\n## 总结\n\n天窗穴和神性穴通常**只针不灸**。针刺这些穴位时，需根据患者的具体情况和五行属性进行选择，并在针刺后以护持一行的主管穴结束治疗。\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-30", "name": "五行针灸心包与三焦", "desc": "经络深入", "content": "# 五行针灸·心包与三焦\n\n## 心包（Heart Protector）\n\n### 核心定位\n所有主要脏腑皆为臣子，服务于心这位君主。心包的职责便是守护心——君主身边的首席保镖、御前侍卫统领。想接近君主得先过心包这一关。\n\n有了这层保护，君主才能真正：\n- 公平、公正、开明\n- 乐于给予和接受爱\n- 伸张正义，设定边界\n- 建立秩序，解决争端\n- 无畏地回应所有人的需求\n\n若缺少内在保护，君主会对支持者偏袒、对反对者不公，失去公正性，滋生政治腐败、信任与透明度缺失。\n\n### 身体层面\n心包是包裹心脏的双层囊状结构，外层为纤维组织，两层之间腔隙含浆液，保护心脏与大血管免受外部冲击或创伤，避免感染，同时起滑润作用，确保心脏正常搏动。\n\n### 心智层面\n- **健康时**：热情、好奇、率性、活泼、欢乐、温暖、风趣\n- **失衡时**：\n  - 极端表现：狂躁、行为不当、过度兴奋；或抑郁、冷漠、严肃沉闷\n  - 无法完全接受新观点，害怕自由表达自己的观点、想法和感受\n  - 羞怯、谨言慎行、回避，无法真正融入和交流\n  - 变得孤立、胆怯，感觉与群体格格不入\n\n### 神的层面\n- **失衡时**：\n  - 爱与喜悦消失，悲伤与恐惧涌来\n  - 与贯穿万事万物的灵性失去连接，内心混乱\n  - 无法爱自己、无法爱他人、无法接受他人的爱\n  - 感受缺乏保护，脆弱，易受伤心碎\n  - 或另一个极端：封闭自我，过度防卫，将所有人拒之门外\n\n### 正常工作的心包\n阻挡并保护我们免受伤害，同时允许那些值得信赖、充满爱心、风趣幽默且能激发内在之火的人走进内心。人际交往是人的基本需求，如植物离不开阳光。我们也需要私人空间，本能地知道自己需要什么——该让谁进入，该把谁挡在外面。\n\n### 循环/性之官\n心包也被称为循环/性之官（Circulation/Sex），负责：\n- 动脉和静脉的血液循环\n- 体内外的性分泌\n\n循环不畅 → 体内过冷或过热 → 脏腑无法健康运作。血液作为传递温暖的介质，将温暖带到身心神的各个角落。\n\n**火对应夏季**——自然最蓬勃的绽放、成熟的力量。火最极致的表达形式之一就是**爱**。\n\n失衡时可能出现：性欲过盛或性冷淡的极端。为了全然喜悦地向他人敞开，心包所提供的循环与保护必须足够强大。\n\n### 诊断要点\n火的致病一行要么是君火，要么是相火。无论哪个受影响最大，都会呈现四要素：\n1. 焦味\n2. 红或红不多\n3. 笑太过或笑不及\n4. 喜太过或喜不及\n\n心包与三焦属于**相火**。大部分致病一行为火的患者，主要是相火失衡。两官中，主要失衡更常见为**心包**。\n\n**若不确定该治疗君火还是相火 → 选择相火**。若3-4次治疗后无明显变化，考虑转治君火。\n\n治疗相火时，**每次都同时治疗心包与三焦**。\n\n### 心包经穴位\n\n#### 天泉 PC2（Heavenly Spring）\n泉水——源源不断从地下涌出的水体，纯净充满活力，不断涌动具有疗愈力。\n\n功能：从取之不尽的能量储备中带来一股洁净暖流，让心包能清晰分辨哪些可以进入、哪些该远离，确保心的安全。\n\n适用：即便遇到合适的人，也无法建立深层信任与亲密关系的患者。天泉之水帮助冲刷掉恐惧、愧疚、胆怯、冷漠以及所有阻碍温暖、喜悦与爱自然流动的障碍。\n\n孩童和动物本能地知道该接纳谁、该拒谁门外。我们内心都有这种反应机制，但常因过去的人际创伤失去这份本能。当障碍被清除，我们便能知晓谁是安全的、何时该敞开心扉。\n\n#### 劳宫 PC8（Palace of Weariness）\n名字带\"宫\"，此处是君主的居所。古代为君主建造行宫，远离日常琐碎，无需时刻保持警惕，可以休养、重振活力、重拾灵感。\n\n火失衡的患者可能因疾病、关系困难、过劳、持续压力或创伤而心力交瘁，彻底失去信心。大自然在内在提供了这样一处宫殿供休息、恢复、重获新生。恰当使用此穴，能以爱与希望重燃心神。\n\n---\n\n## 三焦（The Three Heater Official）\n\n### 核心定位\n三焦属于火这一行，负责维持并调节身心神的供暖系统，以其功能命名。人体躯干被划分为三个燃烧空间：\n\n| 区域 | 触诊位置 | 包含脏腑 |\n|------|---------|---------|\n| 上焦 | 横膈膜以上 | 心、肺、心包 |\n| 中焦 | 脐以上、胸廓以下 | 脾胃、肝胆 |\n| 下焦 | 脐以下、耻骨以上 | 小肠、大肠、膀胱、肾 |\n\n**三焦失衡会导致任何脏腑失调。**\n\n### 身体层面\n脏腑只有在适宜温度下才能正常工作。三焦失衡 → 过热或过冷 → 使原本健康的一官失衡。同样，三焦中任何一焦里的任何一官失衡，也会影响三焦本身的平衡。\n\n### 三焦触诊——检查热平衡\n用掌心感受三个区域的温度。触诊前所有区域须在空气中均等暴露数分钟。\n\n- 女性患者：触诊上焦时手掌需垂直，触诊中下焦时手掌可横放\n- 记录方式：-3为最凉，+3为最热；或文字描述（暖、热、凉、冷、冻）；正常用\"=\"或\"正常\"\n\n**解读**：若诊断指标指向火以外的一行，倾向于将治疗重心放在该行。若无法确定致病一行，先选定一个，持续治疗3-4次后再考虑换行。\n\n新患者前几次治疗建议简单一些，专注于致病一行，观察对温度问题的影响，而非急于在患处局部取穴。\n\n### 心智层面\n火的礼物——尤其是三焦赋予心智的：求知欲、专注力、恰当传递和接收信息的能力、保持兴趣的持久力。\n\n**失衡时**：\n- 极端：狂躁、持续过度兴奋；或迟钝、呆滞、精神萎靡、易厌倦、易分心\n- 对一切索然无味，或没来由地过度兴奋\n\n### 神的层面\n火赋予我们开放、友爱、善于沟通和富有同情心的能力。三焦让我们感知该将多少内在温暖与激情带入世界，使互动恰到好处。\n\n**适应与调和**是理解三焦职责的关键。\n\n平衡状态下：敏锐感知内心真实而充满爱的冲动，本能知道该表达多少爱、温暖与激情，何时全心投入，何时有所保留。三焦使关系的顺畅往来成为可能，让我们与他人及周遭世界达到完美同步。\n\n失衡时：热情似火后很快冷淡疏离；无法传递温暖；夸大其词或被夸大的话术所忽悠。\n\n### 三焦经穴位\n\n#### 关冲 SJ1（Rushing the Frontier Gate）\n边疆——我们与外部世界之间的边界。古代城市筑城墙设城门，我们内心也有类似城墙。\n\n功能：快速调整，使大门凭直觉开合自如。\n- 紧闭心扉 → 错过温暖，因恐惧躲避本可以滋养我们的人 → 封闭、羞怯、冷漠、孤立\n- 心门一直敞开 → 不加分辨地进入关系，与会伤害我们的人纠缠\n\n#### 翳风 SJ17（Wind Screen）\n屏风——既能让光线进入又提供遮荫，让空气流通又抵御强风，让温暖透入又隔绝灼伤。\n\n适用：还未准备好直面外界或特定情境，但需要一个过滤器增加安全感的患者。\"风\"可指代突如其来的变化。害怕冲突、面对面会见、或任何令其恐惧/措手不及的挑战时，翳风能减轻冲击。\n\n---\n\n## 临床案例：相火失衡患者\n\n**主诉**：贝尔氏麻痹，影响右侧，右耳感觉堵塞、迟钝，却对声音异常敏感（外界和自己），倍感压力、悲伤。\n\n**致病一行**：相火，失衡在心包。同时治疗心包和三焦。\n\n**诊断**：神层面失衡，笑不及，情志为喜不及，脉象普遍-2（非常弱）。\n\n### 治疗方案\n1. **神藏穴** — 灸5壮，针刺补法。神在但耗竭，神藏是储神的浩瀚宝库\n2. **翳风穴** — 双侧针刺（穴位与神性穴结合）\n3. **瘈脉穴** — 双侧针刺。三焦为每一官输送所需的温暖，瘈脉是致病一行经脉上的局部穴位\n4. **耳和髎** — 双侧针刺。\"髎\"指骨隙，寓意骨骼的力量是最深处最坚固的支持；\"和\"指调和，三焦的精髓。帮助在内心深处坚定稳固地适应一切\n5. **中渚 + 中冲**结束 — 各灸3壮再针刺。相火的母穴。脉象显示木有余而相火不足，通过这些穴位将木的经气转到火以补不足\n\n### 治疗漏斗原则\n清除阻滞 → 处理心智与神层面更广的需求（可用肾经胸部穴、膀胱经、任督穴，或致病一行神性穴）→ 以CF一行主管穴结束。整个治疗像一个漏斗，逐步聚焦收尾。\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-30", "name": "五行针灸课堂手写笔记", "desc": "课堂实录", "content": "# 五行针灸课堂手写笔记\n\n> 来源：手写课堂笔记，16页扫描\n> 特点：包含大量个人临床心得和诊断感悟，比课件更鲜活\n\n---\n\n## 一、基础框架\n\n### 五行对应体系\n\n| | 木 | 火 | 土 | 金 | 水 |\n|---|---|---|---|---|---|\n| 方位 | 东 | 南 | 中 | 西 | 北 |\n| 季节 | 春 | 夏 | 长夏 | 秋 | 冬 |\n| 生肖 | 鸡 | 羊 | 牛 | 马 | 猪 |\n| 五味 | 酸 | 苦 | 甘 | 辛 | 咸 |\n| 颜色 | 黄绿 | 赤 | 黄 | 白 | 黑/蓝 |\n| 声音 | 呼 | 笑 | 歌 | 哭/泣 | 呻 |\n| 情志 | 怒 | 喜 | 思 | 悲 | 恐 |\n| 魂魄 | 魂 | 神 | 意 | 魄 | 志 |\n\n### 诊断四要素的稳定性\n1. **颜色**：不稳定\n2. **声音**：比较稳定\n3. **口味**：不稳定，会变\n4. **情志**：**最稳定**（最核心的诊断依据）\n\n### 核心逻辑\n- 五行针灸做什么？通过五行传递天地启动的自我修复能力，启动病人自愈力\n- 核心方法：找到碍一行 + 针灸扶持这一行\n- 最终目的：**引神归**\n- 治疗不仅针对症状，还涵盖情绪、认知、思维\n\n> 放下思维，进入感官。\n\n---\n\n## 二、经络与操作要点\n\n### 循行补泻\n- 以十二正经循行方向为补\n- 阳经循行方向向上，阴经循行方向向下\n- **例外**：肾经荥穴→太溪穴要由上向下为补\n\n### 经络循行特点\n- 所有阳经都到头（\"头不怕冷，因阳经都到头\"）\n- 所有阴经都到胸\n\n### 十二经络接续\n口诀：肺大胃脾心小肠，膀肾包焦胆肝巡\n\n### 奇经八脉\n- 任、督二脉循行均往上（从会阴）\n\n### 原穴操作\n- **原穴扎针顺序：先扎阳穴后扎阴穴**\n- 木行人示例：先扎右丘墟（胆经）→ 再扎右太冲（肝经），标注\"能量转化\"\n\n### 五输穴\n- 五输穴都在肘膝以下，**很安全**\n\n---\n\n## 三、治疗流程与决策\n\n### 治疗原则\n- **极简原则**：主得一舒\n- 主客穴可治，就不予夫妻不和治疗\n- 诊断夫妻不和，才行夫妻不和治疗\n\n### 脉诊处理步骤\n1. 脉好 → √\n2. 脉没过来 → 原穴 → 脉好\n3. 脉没过来 → 原穴 → 脉没过来 → 下周再来 → 脉过来了\n4. 脉没过来 → 考虑主客一行诊断正确否。有的主客一行正确但太弱，那就下周再来。清除阳毒、AE、夫妻不和治疗、原穴（都可）。有穴位就做了，无穴位交给主一行\n\n### 分期\n- **初期（前6周）**：6次治疗\n- **中期（6-10周或10-15周）**\n- **后期（15周以后）**\n- 分期取决于病人经络程度、气化环境及内在因素\n\n### 第二次治疗注意事项\n- 有头晕不适就停下不做\n- 以7天为准，不要超时久或用穴过多，不要多种穴位\n- 没有酸麻时注意\n- 清除出入阻滞时，先清除化解阻滞，1周后就不再清除小阻滞了\n- 12经上游疏通了，其他就自动恢复\n- 若有5、6个阻滞，只慢慢清除2个\n\n### 初次治疗\n- 初次治疗也做同样治疗（但一般只是检查，不做治疗）\n- 督脉使用前提：主寻行比较痛不适的状态，才用背俞穴\n\n---\n\n## 四、各类阻滞\n\n### 阻滞分类\n1. **同一系统络呈阻滞**（疤痕阻滞）：手术疤痕\n2. **同一行里两经络间阻滞**（分岔脉）：初期一般不处理，交给它1-3个。若要处理：取弱势经络上的络穴\n3. **出入阻滞**：两行之间阻滞，七种情况（十二正经上六种 + 任督阻滞）\n4. **弱智阻滞**：12脉均弱时考虑，但病≠脉，还要看有无症状，要脉症相符\n\n### 络穴定义\n> 络穴：给同一行另一经络的后门（VIP通道）\n> 例：肺经与大肠经阻滞，大肠经脉弱、肺经脉强，则取大肠经上络穴\n\n### 六对出入阻滞\n\n| 阻滞 | 症状线索 |\n|------|---------|\n| 大肠胃 | 吃不下/拉肚子、吃多/大便不通 |\n| 小肠膀胱 | 打哈欠、流涕、怕冷、上脸板紧 |\n| 脾心 | 腹胀便溏纳差、胸腔乳房、淋巴结 |\n| 肾心包 | 心悸胸闷、乳腺、泌尿生殖 |\n| 三焦胆 | 偏头痛、肩痛、口苦、寒热往来 |\n| 肝肺 | 胸部乳房紧痛、干咳、压抑愤怒 |\n\n### 过敏性鼻炎的三个阻滞\n1. 大肠胃阻滞\n2. 小肠膀胱阻滞\n3. 肺阻滞\n\n### 症状对应速查\n- 上脸板紧 → 膀胱阻滞（治表）\n- 侧面连头痛 → 泄肝胆（核心：揉按）\n- 有一件事想也想不通、放也放不下、额头有痘 → 肺心\n- 心情郁闷 → 胃心包、膻中阻滞\n\n---\n\n## 五、经气转化\n\n### 虚则补其母\n- 例：火生土，火是土的母亲\n- 土行人：把火的力量转给土，扶持脾土的力量\n- 土行人的母穴（即火穴）：**解溪、大都**\n- 在灸法中，土行脾胃经络上的火穴就叫母穴\n- 灸能增厚脾土的墙的厚度，助运人体内和天地间火的力量\n\n### 经气转化原则\n- 五行灸中，水的力量永远是不足的\n- 水曰肾，肾是先天，先天要省着用\n- 当不用原穴做主要穴来调时，可用经气转化\n- 虚则补其母，但求的母穴是水，而水是先天不足，故不动水，而用其祖母穴\n\n### 经气转化案例\n- 肝胆相通：胆经阳气转不过来时，选中转补肝经的力量传导扶持到胆经，取胆经上络穴光明\n- 络穴可沟通表里经：肝属里，胆属表\n- 肺→肝经上的金穴实现对肝经扶持，再到胆经上络穴实现肝胆经力量调动\n\n### 经气转化前提\n- 原穴＞子穴\n- 祖母穴＞子穴\n\n---\n\n## 六、神性穴（心法选穴）\n\n### 主要神性穴\n\n| 穴位 | 定位 | 核心功能 | 特别对应 |\n|------|------|---------|---------|\n| 神阙 | 脐中 | 神弱、类瘫痫、神被埋藏 | 一般用一次就不用了，可用巨阙升级 |\n| 巨阙 | 中庭与中脘分三份上1/3处 | 作用＞神阙，相火募穴 | **对火行人尤为重要** |\n| 魂户 | 肺俞旁开2寸（T3旁开4寸） | 回魂 | **对金行人尤为重要** |\n| 膏肓 | T4棘突下方开4寸，心俞旁开2寸 | 免疫、癌症、放化疗修复，促进细胞修复 | **可反复用**，壮数以7的倍数递增至49；银屑病也用；**对火行人尤为重要** |\n| 神堂 | T5旁开4寸 | 神之居处，治疗下肢危险病症 | **对火行人尤为重要**（平心俞） |\n| 灵墟 | 两乳中部第2对，第三肋间 | 主寻一行扶持，取同名方用灵墟 | **对水行人尤为重要**（在肾经上） |\n\n### 神性穴使用层次\n- 神**阙**（外）：神实比，用→弱就和啦、回\n- 魂**户**（中）：损耗进一步加重，回魂户\n- 神**堂**（上）：\n\n### 巨阙定位要点\n- 有剑突的人，中庭下2寸可能还是歧骨，鸠尾定位不是中庭下1寸而是剑突下1.5寸\n- 定位方法：中庭和中脘分三份，上1/3处为巨阙；或分四份，上1/4处\n\n---\n\n## 七、五行人详解\n\n### 木行人\n\n**代表人物**：撒切尔夫人（旺木）、李香兰、刑志斌（次旺型木）、安妮公主（典型木）\n\n**核心特质**：\n- 简单、直接、创新、挑战、主动、好胜、敢闯、纤细、诡谲、清晰、硬朗\n- 很少思维缠绕，喜欢破而后立\n- 很有冲劲，共情方面如后天缺乏则比较忽略对方感受\n- 求人时直来直去、不管不顾他人人情世故\n- 情绪能量很充沛，有起有停，有冲劲但不会冲动\n\n**诊断要素**：\n- 声/呼：小、挺拔、快速、爆发、短促、很冲\n- 颜色：绿\n- 气味：臊，向外扩散的、向上的\n- 情志：怒，有张力、蓬勃的、喷涌而出的\n- 眼神：出来的、找目标的、有压力\n\n**身体**：偏瘦、精干、身姿挺拔、有力量，年纪大了也显年轻\n**趋势**：向上、向前、推的力\n**脏腑**：肝胆\n\n**失衡**：\n- 太过：特别犟，在外制造很多冲突\n- 不及：干枯的、表象上的木\n\n---\n\n### 火行人\n\n**基础属性**：声笑、色赤、嗅焦、情喜\n\n**相火**（温暖）：\n- 吐词动作多，眉飞色舞，欢快，有活力，亲力亲为型\n- 眼睛有神采、眼神灵动\n- 情志：向外、连接、敏感、热情\n- 初次见面也像多年老朋友，交流流畅，能点燃气氛\n\n**君火**（上扬）：\n- 沉稳、平静、严肃，不苟言笑\n- 感受不到火，一种火要被接近一些，松弛的\n- 有思考的，一顿一顿的\n- 略微有点严肃，思考、言语不太流畅\n\n**火的能量**：爱、活泼、热情、喜悦、主动、开放、激情、付出、积极、自由、关系\n\n**相火失衡**：\n- 太过于热情超过负荷：活动多、超级活跃、急切想做事情\n- 或太过于冷漠，甚至感受不到爱\n- 忽冷忽热\n- 两性关系失常（流浪了一段又一段感情，感觉漂泊不定）\n\n**君火失衡**：\n- 小肠分清泌浊功能受损：吃什么拉什么，总不断地吃\n- 火的能量没法与外界链接\n\n**身体**：体温失常、忽冷忽热、心悸、各种心律异常\n\n> 不论相火还是君火，都从相火开始，做3-4次后再做君火\n\n---\n\n### 金行人\n\n**代表人物**：普京、张艺谋、王菲、俞飞鸿、曼德拉、C罗、奥巴马\n\n**核心特质**：\n- 安稳、距离、空间、评判（价值）、词序\n- 提炼（放下与停留）\n- 对外界敏锐，不喜欢应付复杂人际关系，崇尚简单，能很自然进入自己的世界\n- 天然的悲哀气质，认为\"永远不完美\"\n- 是五行中**最严肃**的一行\n- 常多咨询（思考、价值），安静、严肃、距离感、肢体语言少\n- 追求内涵，求其糟粕吸其精华\n- 用最小的肌肉动觉说话，是观察者\n\n**诊断要素**：\n- 声/泣：声音往下掉\n- 色：白\n- 嗅：腥\n- 情：悲（高傲、冷，**不是悲伤**）\n- 眼神：似乎看到这个世界之外，超然、悲\n\n**失衡的金行人**：\n- 失去取舍的分辨力，或紧紧抓住一切，或放弃一切\n- 纠缠于从过去到现在的事件中走不出来\n- 严重者与世隔绝，生活瘫痪\n- 身体：便秘或腹泻、鼻炎、各种皮肤病\n\n---\n\n### 水行人\n\n**代表人物**：贝克汉姆、鲁豫、姚明、李连杰、憨豆\n\n**诊断要素**：\n- 声/呻：冲，在喉咙根部发音，呜呜呜，有震动，一股一股推动力\n- 色：透明-蓝-黑色\n- 嗅：腐\n- 情：恐，紧缩、收缩的张力，天不怕地不怕又怂\n- 眼神：不像太阳般耀眼，而是在角落，躲在后面的，又挑衅警觉\n\n**核心特质**：\n- 隐匿、智慧、懂、善变、意志、耐力\n- 对安全感的需求超过土\n- 神性化，外在的琢磨，不愿被固定下来\n- 不可动摇地向着某一目标，一般在同行业卓越\n- 一会像木一会像金，**一般可能是水**\n\n**行为特征**：\n1. 行动起来非常快，但平时很安静\n2. 常逃跑、常变化，显得反复无常\n3. 对环境敏感而警觉，很快和感觉安全的同伴在一起\n4. 感受到威胁，很快转移到安全环境\n\n**意象**：\n- 深夜的大海、未知的力量\n- 张力比火大的水——像瀑布、湍急水流，硬硬的、有冲力\n- 这种张力时有时无，一股一股\n- 触感：上上下下、左左右右，不稳定，动来动去\n- 晃动 = 恐惧 = 内在张力的表达\n- \"一潭死水\"毫无生机 vs 平稳安宁的活水\n\n**失衡**：\n- 恐惧太过或全无，过度冒险或保守\n- 言谈不休或顿然失语\n- 不断寻求安全感\n- 极度自私，或摧毁一切\n- 面色恍白到黧黑\n- 水肿、泌尿、生殖、循环等各系统病变\n- 可以伪装成各种样子\n\n> 如何与水行人相处：给**足够的安全感**\n\n---\n\n### 土行人\n\n**代表人物**：赵忠祥（柔软）、毕福剑（柔和而坚定）、姚晨（温和稳定）、章子怡（倾诉、有需求感、易亲近）\n\n**基础属性**：声歌、色黄、嗅甘、情思\n\n**核心感受**：\n- 稳定感、放松感、安稳感、细腻感\n- 温暖的怀抱\n- 躺在草地上\n- 气味：酿甜香、温暖、踏实\n\n**平衡的土行人**：\n- 踏实、稳定、安全、关心、同情、理解、支持\n- 给予、承载、接纳、包容、滋养（被）\n- 一边对外界充满同情理解，也需要被理解同情\n- 一边发现问题一边解决问题\n- 一边收获一边付出\n\n**失衡的土行人**：\n- 进不来（别人的建议——板结的土）\n- 出不去（各种匮乏——索取的土）\n- 进出之间转换障碍（粗糙，滋养节奏被打乱，不断做但没有成果）\n- 衍生：索取、空虚、呆滞、慢、惶恐、过度思虑、过度忙碌、哆嗦、对自己或他人照顾太多或太少、不安全不稳定不踏实\n- 身体：肠胃（食欲减退、厌食或暴饮暴食、边吃边排）、新陈代谢过慢、水肿、失眠、脱发、动力缺乏\n\n**土行人的类型**：\n1. 嗷嗷待哺的\"孩子\"（显性）\n2. 懂事而讨好的\"孩子\"（隐性，悲伤、隐忍）\n3. 经常抱怨的\"母亲\"（操不完的心）\n\n**互动模式**：\n- 土行人会在关系中\"盘算\"：你要对我好，我才对你好\n\n---\n\n## 八、选穴规律速查\n\n| 场景 | 取穴思路 |\n|------|---------|\n| 潜阳、内痒 | 四关（太冲、合谷）、开郁、伏兔、解溪 |\n| AE | 背俞穴（五脏俞 + 阴郄穴） |\n| 寒热不和 | 六对穴位 |\n| 经留阻滞 | 4个穴位 |\n| 12正经出入阻滞（自病多取下） | 扶持导引：神桩穴、谿穴 |\n\n---\n\n## 九、治疗心法\n\n- 刚开始治疗时不象想象的这么轻松，这是比较大的挑战\n- 每个人如何捱过来，每个人趋势病都会有不舒服\n- 四个核心能力：①感受五行 ②与人相处 ③检查 ④治疗\n- 治疗后多找精神\n- **放下思维，进入感官**\n- 日常训练：训练凝神静修\n"}, {"cat": "中医学习", "sub": "针灸", "date": "05-30", "name": "五行针灸辨五行思维导图笔记", "desc": "思维导图", "content": "# 五行针灸之辨五行——思维导图笔记\n\n> 来源：五行针灸之辩五行思维导图 2021/6/9 - v116\n\n---\n\n## 木\n\n### 典型木行人\n李敖、刘晓庆、周立波、川建国\n\n### 二官\n| 脏腑 | 官职 | 功能 | 时辰 |\n|------|------|------|------|\n| 肝 | 将军之官，谋虑出焉 | 主推动气机，主疏泄，怒则气上 | 1:00-3:00 |\n| 胆 | 中正之官，决断出焉 | 主开阖，喜静谧，清净之府 | 23:00-1:00 |\n\n### 基本属性\n- **颜色**：绿\n- **气味**：酸、冲\n- **声音**：呼声，干脆有力\n- **情志**：怒\n- **季节**：春天\n\n### 典型特质\n- 充满朝气、像小孩、简单干脆（李敖）\n- 大哥大、大姐头，仗义豪爽（刘晓庆）\n- 略带将军范、说话冲、自信满满（周立波）\n\n### 核心\n- **能量特质**：前进的、有生命力的、朝气蓬勃的\n- **交流特质**：单向的，我告诉你\n- **最在意的事**：行动、希望、掌控（计划、调理、搞清楚）\n\n### 失衡表现\n- **身体层面**：与\"木\"相关的身体问题\n- **心理层面**：不能计划、谋虑、不能决断、选择、固执；事业、眼界变窄\n- **神的层面**：绝望、没有目标、没有方向\n\n---\n\n## 火\n\n### 典型火行人\n成龙、汤姆克鲁斯、朗朗、莫言、韩寒、刘翔、姜文\n\n### 二官\n| 类型 | 脏腑 | 官职/功能 | 时辰 |\n|------|------|----------|------|\n| 君火 | 心 | 君主之官、神明出焉、主血脉、主神志、阳脏、心主喜、喜则气缓 | 11:00-13:00 |\n| 君火 | 小肠 | 受盛之官、化物出焉、分清泌浊 | 13:00-15:00 |\n| 相火 | 心包 | 臣使之官、喜乐出焉、代心受邪、喜则气缓、炅则气泄 | 19:00-21:00 |\n| 相火 | 三焦 | 决渎之官、水道出焉、通行元气 | 21:00-23:00 |\n\n### 基本属性\n- **颜色**：红\n- **气味**：焦\n- **声音**：自带笑意\n- **情志**：喜\n- **季节**：夏天\n\n### 典型特质（四种类型）\n1. **热情主动版**：热情的、温暖的、很积极地关注你；积极关注对方、在意关系、希望对方开心、希望和谐\n2. **羞涩的敞开版**：说话绕弯子、希望你看到她开心的一面、笑容多；舒张轻松、或有一些小拘谨，大方向仍是在敞开并看到你；在关系中容易受到伤害\n3. **刺头版**：时而真诚、时而挑刺；害怕被伤害、不敢付出爱\n4. **威严版**：乍一看不好接近、接触起来仍是火的温暖；在关系中保持主动权；即便是关心你、让你开心；在关系中强势时威严、弱势时刺头\n\n补充：可能会在关系中不自觉地牺牲自己；跟火在一起会觉得很轻松\n\n### 核心\n- **能量特质**：温暖、舒张扩散、敞开的、连接的、跳跃的\n- **交流特质**：双向的，主动看向你\n- **最在意的事**：关系和谐；被爱被接纳\n\n### 君火与相火的区别\n- **君火**：更威严或刺刺的，反应略加迟疑；说话总要想一下，连续抛出2-3个不搭噶的问题；总要先有一个思考再回答\n- **相火**：表达更为顺畅\n\n### 失衡表现\n- **身体层面**：寒温失常\n- **心理层面**：与人交流障碍：语言障碍，热情太过或不及\n- **神的层面**：哀莫大于心死\n\n---\n\n## 土\n\n### 典型土行人\n章子怡、赵忠祥、克林顿、姚晨\n\n### 二官\n| 脏腑 | 功能 | 时辰 |\n|------|------|------|\n| 胃 | 主受纳和消化 | 7:00-9:00 |\n| 脾 | 主生血和凝血 | 9:00-11:00 |\n\n### 基本属性\n- **颜色**：均匀的黄\n- **气味**：味为甘，气为香；香、面包味、甜味、奶香味；也可能黏腻、油腻、发霉；质地厚重，特质是厚重、粘腻、高密度\n- **声音**：歌，相对柔和，婉转的，有点嗲嗲的感觉；多少有点懒洋洋；如歌，尾音长而柔和\n- **情志**：忧思\n- **季节**：长夏，夏秋之交\n\n### 典型特质（三种类型）\n1. **孩子型**：付出与给予、需要被关注、话多，喜欢分享、同情心、对食物的兴趣\n2. **母亲型**\n3. **安逸富足型**：思虑周全、不自觉想要靠近他、土行人的圈\n\n### 核心\n- **核心特质**：厚重的、沉实的、松弛的、稳定不动、吸引、沉淀\n- **交流特质**：双向的，拉近/吸引\n- **最在意的事**：更安逸、更多、更富足，不想要艰难与沉重\n\n### 失衡表现\n- **身体层面**：消化吸收问题\n- **心理层面**：对自己或他人照顾过多或过少，不踏实，不稳定，过度思虑\n- **神的层面**：失去根基\n\n---\n\n## 金\n\n### 典型金行人\n张艺谋、杨澜、王菲、巩俐\n\n### 二官\n| 脏腑 | 官职/功能 | 时辰 |\n|------|----------|------|\n| 肺 | 相傅之官，治节出焉；主呼吸、通天气、主肃降、主行水；为华盖、为娇脏、悲则气消 | 3:00-5:00 |\n| 大肠 | 传道之官，变化出焉；传导糟粕、吸收津液 | 5:00-7:00 |\n\n### 基本属性\n- **颜色**：白，不是长得白，是泛着一种白光\n- **气味**：辛味，秋天踩在落叶上的味道；铁锈，黄铜的味道；低密度，收束\n- **声音**：哭，悲意，尾音消散\n- **情志**：悲\n- **季节**：秋\n\n### 典型特质\n- 深沉、悲凉\n- 高冷、淡漠\n- 温暖、端庄\n- 自信、高傲\n\n### 核心\n- **核心特质**：收束的、下沉；上漂、空间感、淡\n- **交流特质**：单向的，连接感较少\n- **最在意的事**：被尊重、有价值、有意义\n\n### 失衡表现\n- **身体层面**：肺与大肠的问题；皮肤问题\n- **心理层面**：难以认同自我价值，过度评判；悲哀；放不下\n- **神的层面**：精神上与世隔绝\n\n---\n\n## 水\n\n### 典型水行人\n贝克汉姆、鲁豫、姚明、李连杰、憨豆、朱迪丹奇\n\n### 二官\n| 脏腑 | 官职/功能 | 时辰 |\n|------|----------|------|\n| 膀胱 | 州都之官，津液藏焉，气化则能出矣 | 15:00-17:00 |\n| 肾 | 作强之官，伎巧出焉；主藏精，主纳气，主封藏，主水，藏志 | 17:00-19:00 |\n\n### 基本属性\n- **颜色**：蓝\n- **气味**：低沉、隐而不发、水汽、墨香、水腥\n- **声音**：呻，嗡嗡、震颤、汩汩流水\n- **情志**：恐\n- **季节**：冬\n\n### 典型特质\n- 机警版\n- 机灵、活泼版\n- 热闹搞笑版\n- 冰封、冻住版\n- 瀑布力量版\n\n### 核心\n- **核心特质**：下沉，潜藏；（暗流涌动）伪装\n- **交流特质**：双向的，躲藏的\n- **最在意的事**：安全、流动、自由\n\n### 失衡表现\n- **身体层面**：肾和膀胱的问题\n- **心理层面**：恐惧太过或完全没有恐惧；言谈不休或顿然失语；不断寻求安全感；冒险\n- **神的层面**：对现实失去把握，甚至疯狂，自杀；为保全自我而完全不顾他人\n\n---\n\n## 五行速查对比表\n\n| | 木 | 火 | 土 | 金 | 水 |\n|---|---|---|---|---|---|\n| **情志** | 怒 | 喜 | 忧思 | 悲 | 恐 |\n| **声音** | 呼，干脆有力 | 自带笑意 | 歌，柔和婉转 | 哭，悲意消散 | 呻，嗡嗡震颤 |\n| **颜色** | 绿 | 红 | 黄 | 白（白光） | 蓝 |\n| **气味** | 酸、冲 | 焦 | 甘/香/厚重 | 辛/落叶/铁锈 | 水腥/低沉隐伏 |\n| **季节** | 春 | 夏 | 长夏 | 秋 | 冬 |\n| **核心特质** | 前进、生命力 | 温暖、敞开、连接 | 沉实、吸引、沉淀 | 收束、空间感、淡 | 下沉、潜藏、伪装 |\n| **交流特质** | 单向，我告诉你 | 双向，主动看向你 | 双向，拉近/吸引 | 单向，连接感较少 | 双向，躲藏的 |\n| **最在意** | 行动、希望、掌控 | 关系和谐、被爱接纳 | 安逸、富足 | 尊重、价值、意义 | 安全、流动、自由 |\n| **失衡·身** | 木相关身体问题 | 寒温失常 | 消化吸收问题 | 肺大肠/皮肤问题 | 肾膀胱问题 |\n| **失衡·心** | 不能决断、固执 | 交流障碍、热情太过/不及 | 照顾过多/过少、过度思虑 | 自我价值低、放不下 | 恐惧太过/全无 |\n| **失衡·神** | 绝望、无方向 | 哀莫大于心死 | 失去根基 | 与世隔绝 | 失去把握、疯狂 |\n"}, {"cat": "中医学习", "sub": "针灸", "date": "06-05", "name": "董氏奇穴深度精讲与耳穴抗衰研究", "desc": "董氏奇穴+耳穴", "content": "# 20260605-周五·董氏奇穴深度精讲与耳穴抗衰研究\n\n> 归元AI每日学习笔记 · 周五针灸+外治法专题\n> 学习日期：2026-06-05\n> 重点：董氏奇穴妇科要穴深度精讲 + 耳穴抗衰最新研究\n\n---\n\n## 一、董氏奇穴深度精讲——妇科圣穴组\n\n### 1.1 妇科穴——妇科第一要穴\n\n#### 定位（两种取法）\n\n| 取法 | 定位描述 |\n|------|---------|\n| **董氏正统** | 大拇指第一节外侧（靠食指侧）赤白肉际处，距中央二分半处 |\n| **五穴版本** | 大拇指第一节背侧外侧中央线上平均分布五穴 |\n\n**精准取穴（董氏正统两穴法）**：\n1. 掌心向内，拇指自然伸直\n2. 将拇指第一节指骨尺侧缘（或外侧赤白肉际）平均分为三等分\n3. 取中间两个点，即为妇科穴两穴\n\n#### 解剖结构\n- 浅层：正中神经指掌侧固有神经末梢\n- 深层：拇短屈肌附着点及指骨骨膜\n- 血供：拇指主要动脉分支\n\n#### 针刺操作\n- **角度**：贴骨平刺（必须贴骨才有效果）\n- **深度**：0.2-0.5寸（5-12mm）\n- **手法**：平补平泻\n- **绝招**：倒马针——两穴同时下针，效果翻倍\n\n#### 主治范围\n\n| 类别 | 具体病症 |\n|------|---------|\n| **月经病** | 月经不调（周期紊乱/经量异常）、痛经、经期延长 |\n| **带下病** | 白带过多/异常、阴道炎 |\n| **子宫疾病** | 子宫炎、子宫痛、子宫肌瘤、子宫位置不正（前屈/后屈/左屈/右屈） |\n| **生殖问题** | 久年不孕、输卵管不通 |\n| **产科** | 安胎、产后恶露不尽 |\n| **其他** | 男子阴囊湿冷、偏头痛、头顶痛、胸痛 |\n\n#### 作用机理（全息+经络+脏腑别通）\n\n1. **全息对应**：拇指第一节对应下腹盆腔区，\"病在下者，高取之\"\n2. **经络关系**：\n   - 入肺经（主气）+ 大肠经（主津）\n   - 肺朝百脉，调肺即调全身气血\n3. **脏腑别通**：肺与膀胱通 → 影响肾/胞宫功能\n4. **同名经相通**：肺经与肝经同名经相通 → 疏肝解郁\n5. **太极相应**：拇指肌肉属脾 → 健脾统血\n\n#### 配穴应用\n\n| 病症 | 配穴 |\n|------|------|\n| **痛经** | 妇科穴 + 门金/内庭 |\n| **白带过多** | 妇科穴 + 木妇、火硬、人皇 |\n| **月经不调** | 妇科穴 + 姐妹穴、人皇 |\n| **不孕症** | 妇科穴 + 肾关/下三皇 |\n| **子宫肌瘤/囊肿** | 妇科穴 + 下三皇 + 肾关 |\n| **盆腔炎** | 妇科穴 + 木妇 + 八髎 |\n\n#### 临床研究证据\n- 治疗子宫肌瘤100例：成功率约70%\n- 液性肌瘤+卵巢囊肿：配合温中化瘀药物，一周消除大半\n- 痛经：一次止痛或明显缓解\n- 不孕症（子宫位置不正）：按月经周期施治效果显著\n\n---\n\n### 1.2 还巢穴——妇科圣穴搭档\n\n#### 定位\n- 无名指外侧（尺侧）赤白肉际处\n- 与妇科穴左右交替取穴\n\n#### 主治（与妇科穴几乎相同）\n- 子宫痛、子宫肌瘤、子宫炎\n- 月经不调、赤白带下\n- 输卵管不通、子宫不正\n- 小便频数、阴门发肿\n- 安胎\n\n#### 核心配伍——\"妇科圣穴\"组合\n```\n妇科穴（拇指） + 还巢穴（无名指） = 送子观音穴\n```\n**关键要点**：左右交替取穴，不可两穴同时扎在同一只手！\n- 左手妇科穴 → 右手还巢穴\n- 右手妇科穴 → 左手还巢穴\n\n#### 研究发现\n针刺此两穴可提高免疫力：\n- 血浆IgG、IgM、IgA含量升高\n\n---\n\n### 1.3 灵骨穴+大白穴——万能补益组\n\n#### 定位\n\n| 穴位 | 定位描述 |\n|------|---------|\n| **灵骨穴** | 手背拇指食指叉骨间，第一掌骨与第二掌骨结合处，比合谷穴更靠后更深 |\n| **大白穴** | 手背第二掌骨桡侧中点，三间穴再上一寸 |\n| **简易取法** | 灵骨穴下一寸即为大白穴 |\n\n#### 核心功效\n\n| 穴位 | 穴性 | 主要功效 |\n|------|------|---------|\n| **灵骨穴** | 温阳补气 | \"大补穴位\"，升发阳气、通经活络 |\n| **大白穴** | 清肺理气 | 发汗解表、活血化瘀 |\n\n#### 主治范围\n\n| 类别 | 具体病症 |\n|------|---------|\n| **痛症** | 坐骨神经痛、腰痛、脚痛、肩颈痛、肘痛、网球肘 |\n| **中风后遗症** | 半身不遂、偏瘫、肢体无力/麻木 |\n| **气虚证** | 气虚无力、肺气不足 |\n| **其他** | 耳鸣耳聋、偏头痛、经痛、头昏脑胀、月经不调 |\n\n#### 经典配伍\n- **灵骨+大白**：功同\"补阳还五汤\"+\"真武汤\"\n- 治半身不遂以灵骨为主、大白为辅，特效\n- 治坐骨神经痛不论太阳经或少阳经走向皆极有效\n\n#### 操作要点\n- **取穴原则**：左瘫按右手，右瘫按左手（左右交替）\n- **针刺深度**：必须深针，1-1.5寸\n- **贴骨进针**：效果尤佳\n- **动气针法**：留针期间配合患肢活动\n\n#### 延伸应用\n- 治网球肘：以骨治骨\n- 治脚跟痛：骨治骨 + 全息脚跟点对应\n- 治胸腹胀闷：心脏不适者特效\n- 治听力不足/耳鸣：功同益气聪明汤\n\n---\n\n### 1.4 其他董氏奇穴速查\n\n| 穴位 | 定位 | 主治 |\n|------|------|------|\n| **木妇穴** | 足第二趾中节正中央外开三分 | 赤白带下、月经不调、输卵管不通 |\n| **门金穴** | 足背第二三趾赤白肉际处，直上二寸 | 胃肠炎、腹胀痛、痛经 |\n| **火硬穴** | 足背第一二趾间，行间穴后五分 | 惊悸、眩晕、子宫炎、骨骼胀大 |\n| **火主穴** | 足背第一二趾缝上一寸五分至二寸 | 难产、肝病、胃病、痛经 |\n| **重子穴** | 食指掌骨内侧 | 肩背僵硬、腰背痛 |\n| **重仙穴** | 食指掌骨内侧，重子穴下一寸 | 同重子穴，配合使用 |\n| **肾关穴** | 小腿内侧胫骨后缘 | 肾虚腰膝酸软、尿频、月经不调 |\n| **下三皇** | 胫骨内侧天皇穴（阴陵泉下1寸）至地皇穴沿线 | 泌尿生殖、肾虚 |\n| **上三皇** | 胫骨内侧天皇穴至人皇穴沿线 | 补肾益气 |\n\n---\n\n## 二、耳穴抗衰老最新研究（2025-2026）\n\n### 2.1 耳穴改善更年期综合征研究\n\n#### 耳穴贴压对绝经后女性的多靶点效应\n\n据《The Effects of Auricular Acupressure on Menopausal Symptoms, Stress, and Sleep in Postmenopausal Middle-Aged Women》（Bomi Kim, Hyojung Park，Ewha Womans University，发表于 Journal of Midwifery & Women's Health，2023）：\n\n**研究设计**：随机单盲假对照试验\n- 干预组：王不留行籽贴压耳穴（神门、前庭叶、肾上腺、边缘沟、内分泌）\n- 对照组：贴压非相关耳穴\n- 测量：MRS量表、PSS量表、心率变异性、EEG、PSQI\n\n**显著结果**：\n- 更年期症状评分（MRS）：干预组显著改善（F=22.057, P<.001）\n- 感知压力（PSS）：显著下降（F=22.576, P<.001）\n- 压力指数（HRV）：显著改善（F=14.027, P=.001）\n- 睡眠质量（PSQI）：显著改善（t=-4.050, P<.001）\n- 睡眠效率（体动仪）：显著提高（t=5.996, P<.001）\n\n---\n\n#### 耳穴按压改善绝经后女性性功能\n\n据《European Journal of Integrative Medicine》（2025年5月）：\n\n**研究设计**：随机、假对照、三盲试验，90名绝经后女性\n\n**干预方案**：\n- 王不留行籽耳穴按压，每次间隔4天，共10次\n- 关键耳穴：内分泌、卵巢、肾、神门、交感等\n\n**显著结果**：\n- 性功能指数（FSFI）：干预1个月后平均差异5.12，干预2个月后差异达10.17\n- 性困扰量表（FSDS）：显著降低\n- 无不良事件报告\n\n**结论**：耳穴按压是安全、简单、经济实惠的干预措施\n\n---\n\n#### 耳穴压豆联合失眠认知行为团体治疗\n\n据《赣南医科大学学报》2025年研究：\n\n**研究设计**：60例更年期失眠患者随机分组\n- 联合组：耳穴压豆 + 失眠认知行为团体治疗\n- 行为组：仅失眠认知行为团体治疗\n- 耳穴组：仅耳穴压豆治疗\n\n**测量工具**：ISI量表、SF-36、PSQI\n\n**结果**：\n- 治疗2周后：三组疗效无显著差异\n- 治疗4周、3个月、6个月后：三组疗效有显著差异\n- 联合组疗效最优\n\n**核心耳穴**：神门、皮质下、内分泌、卵巢、肾\n\n---\n\n### 2.2 耳穴抗衰老机制研究\n\n#### 耳穴与神经内分泌调节\n\n| 机制 | 具体效应 |\n|------|---------|\n| **HPA轴调节** | 耳穴刺激可抑制ACTH过度释放，降低皮质醇峰值 |\n| **GnRH调节** | 影响生长激素和皮质醇分泌，改善代谢紊乱 |\n| **神经递质** | 调节5-HT/DA比例至年轻化水平 |\n| **迷走神经** | 耳穴刺激激活迷走神经通路，调节胰岛素敏感性 |\n\n#### 耳穴与氧化应激干预\n\n| 效应 | 研究证据 |\n|------|---------|\n| **降低MDA** | 耳穴皮质下穴针刺可显著降低血浆丙二醛水平 |\n| **提升SOD** | 提升超氧化物歧化酶活性，改善氧化损伤 |\n| **DNA修复** | \"抗衰三穴法\"（心肝肾）使DNA损伤修复能力提升28% |\n| **抗氧化持续** | 纳米材料辅助激光照射抗氧化效果可持续72小时 |\n\n#### 耳穴与代谢综合征\n\n| 靶点 | 效应 |\n|------|------|\n| **脂肪代谢** | 耳穴三焦穴抑制IRS-1磷酸化，改善胰岛素抵抗（降低56%） |\n| **血脂** | 耳穴内分泌穴减少FABP4表达，降低血脂（TC下降28%） |\n| **AMPK通路** | 耳穴激活AMPK，促进线粒体生物合成 |\n\n#### 耳穴与表观遗传\n\n| 机制 | 效应 |\n|------|------|\n| **组蛋白修饰** | 耳穴神门穴磁珠刺激恢复染色质开放状态 |\n| **circRNA** | 耳穴心包穴干预上调hs-circRNA_100728 |\n| **DNMT/HDACs** | 调节DNMT1/HDACs活性，延缓P16基因甲基化 |\n\n---\n\n### 2.3 经皮耳穴迷走神经刺激（taVNS）\n\n#### 作用机制\n\n```\n耳甲区刺激 → 迷走神经耳支 → 孤束核 → \n    ↓\n多靶点投射（臂旁核/中缝背核/蓝斑/下丘脑/杏仁核/海马）\n    ↓\n中枢神经系统调控 + 抗炎效应\n```\n\n#### 老年患者临床应用\n\n| 应用领域 | 证据 |\n|---------|------|\n| **抑郁/焦虑** | 显著降低HAMD-17和SDS评分，改善日常生活功能 |\n| **认知障碍（MCI）** | 24周taVNS显著提高MoCA评分和听觉词语学习测验 |\n| **心肌梗死** | 下调MMP9和TGF-β1，防止心脏重构 |\n| **消化功能** | 增强迷走神经传出，抑制NF-κB信号通路抗炎 |\n| *
