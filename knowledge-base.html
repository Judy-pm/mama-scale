（更新于2026-06-16）\n\n### 内分泌（今日重点）\n1. **所有新发房颤必查TSH** → 亚临床甲亢占13%\n2. **甲亢危象PTU先1小时后再给碘** → 关键顺序\n3. **黏液性水肿昏迷糖皮质激素先于L-T4** → 防肾上腺危象\n4. **席汉综合征四型辨证：脾肾阳虚90%** → 温补脾肾为基本法\n5. **退热禁用水杨酸**（甲状腺危象）→ 用对乙酰氨基酚\n6. **MHT窗口期<60岁/绝经<10年** → 代谢+骨+CV获益\n\n### 心电图（今日重点）\n1. **\"P波消失+QRS宽+T尖\"** = 高钾经典三联征\n2. **\"U波>T波\"** = 低钾特征\n3. **\"ST平直延长+T正常\"** = 低钙特征（与低钾鉴别）\n4. **\"QT缩短+Osborn波\"** = 高钙特征\n5. **新发房颤+窦速+静息也快+年轻女性** → 查甲功\n6. **退热禁用水杨酸**（甲状腺危象）→ 用对乙酰氨基酚\n\n### 后续内科轮换\n- 消化系统（胃食管反流/HP根除/IBD）\n- 肾脏系统（CKD分期/血液透析指征）\n- 呼吸系统（COPD/哮喘/肺炎/肺栓塞）\n- 血液/风湿/神经（按周轮换）\n\n### 后续心电图\n- 药物影响（地高辛/三环抗抑郁药）\n- 心肌病（肥厚型/ARVC/扩张型）\n- 离子通道病（Brugada/长QT）\n\n---\n\n## 方剂学习（周三轮换-6月17日新增）\n\n### 左归丸/右归丸（6月17日已学）\n1. **左归丸** → 滋阴补肾、壮水之主、阳中求阴 → 治真阴不足重证\n2. **右归丸** → 温补肾阳、益火之源、阴中求阳 → 治命门火衰重证\n3. **必先评估脾胃功能** → 苔厚腻者慎用（虚不受补）\n4. **附子先煎1小时** → 乌头碱水解减毒\n\n### POI/围绝经期中西医整合（6月17日已学）\n1. **POI 2025指南**采用ESHRE FSH>25 IU/L诊断阈值，关口前移\n2. **POI患者应尽早启动HRT**（POI本身即为适应证），持续至50岁\n3. **MHT窗口期**：绝经10年内/60岁前启动获益最大\n4. **经皮/阴道雌激素**较口服VTE风险低，血栓高风险者优先\n5. **态靶辨治理论**：POI分隐匿-亚临床-临床-衰竭4期，中西医精准介入\n6. **HRT与中药可安全联用**，避免大剂量紫河车/鹿茸/蜂王浆\n\n---\n\n**最后更新**：2026-06-17\n\n\n## 功能医学动态更新记录\n\n| 日期 | 主题 | 关键内容 | 笔记文件 |\n|------|-----|---------|---------|\n| 2026-05-22 | 818号令/NMN/肠道脑轴 | 肠道脑轴/桥本整合/最佳睡眠 | 功能医学动态/2026-05-22.md |\n| 2026-05-23 | 抗衰新指标 | 12项长寿面板/组蛋白时钟/视网膜年龄 | 功能医学动态/20260523-抗衰新指标与新证据.md |\n| 2026-05-30 | Menin-D-丝氨酸/活性B12 | IL-6通路/多器官年龄时钟 | 功能医学动态/2026-05-30.md |\n| 2026-06-06 | IAA-肠骨轴/IL-6通路悖论/NR vs NMN | 百岁老人代谢密码/IL-6死亡驱动因子/NAD+前体临床共识 | 功能医学动态/2026-06-06.md |\n| 2026-06-13 | 司美格鲁肽抗衰9%/41项表观遗传综述 | GLP-1抗衰/抗衰药物循证再评估/基因疗法首例/外泌体/4周抗衰/Medicare G0136 | 功能医学动态/2026-06-13.md |\n| **2026-06-20** | **器官血液年龄/细胞级蛋白组时钟/Sinclair人体试验/相控阵CT/AI-CT痴呆预测** | **斯坦福11器官血液年龄/AUC 0.84痴呆预测/嗅觉MRI/pTau217/ER-100/CDKN1A-LGALS3/CGAS/3件事多活10年/糖尿病前期逆转↓58%** | **功能医学动态/2026-06-20.md** |\n\n---\n\n## 运动处方更新记录\n\n| 日期 | 主题 | 关键内容 | 笔记文件 |\n|------|-----|---------|---------|\n| 2026-05-23 | 运动处方基础 | ACSM指南/FITT原则/更年期 | 营养与运动/运动处方/20260523-运动处方与更年期抗衰.md |\n| 202         var idx = globalIdx++;
        html += '<div class="file-item" data-idx="' + idx + '" onclick="openFile(' + idx + ')">';
        html += '<span class="file-date">' + f.date + '</span>';
        html += '<span class="file-name" title="' + escHtml(f.name) + '">' + escHtml(f.name) + '</span>';
        html += '<span class="file-desc">' + escHtml(f.desc) + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleCategory(el) {
  el.classList.toggle('expanded');
  var container = el.nextElementSibling;
  container.querySelectorAll('.subcategory').forEach(function(s) { s.classList.toggle('open', el.classList.contains('expanded')); });
  container.querySelectorAll('.file-list').forEach(function(f) { f.classList.toggle('open', el.classList.contains('expanded')); });
  container.querySelectorAll('.subcategory-header').forEach(function(h) {
    if (el.classList.contains('expanded')) h.classList.add('expanded'); else h.classList.remove('expanded');
  });
}

function toggleSubcategory(el) {
  el.classList.toggle('expanded');
  el.nextElementSibling.classList.toggle('open', el.classList.contains('expanded'));
}

function openFile(idx) {
  var file = ALL_FILES[idx];
  if (!file) return;
  activeFileId = idx;
  location.hash = idx;
  document.querySelectorAll('.file-item').forEach(function(el) { el.classList.remove('active'); });
  var target = document.querySelector('.file-item[data-idx="' + idx + '"]');
  if (target) { target.classList.add('active'); ensureVisible(target); }
  document.getElementById('welcome').style.display = 'none';
  var mdContent = document.getElementById('mdContent');
  mdContent.style.display = 'block';
  var breadcrumb = '<div class="content-breadcrumb">' +
    escHtml(file.cat) + ' <span class="sep">&#8250;</span> ' +
    escHtml(file.sub) + ' <span class="sep">&#8250;</span> ' +
    '<span class="current">' + escHtml(file.name) + '</span></div>';
  mdContent.innerHTML = breadcrumb + marked.parse(file.content || '（内容为空）');
  mdContent.querySelectorAll('pre code').forEach(function(block) { hljs.highlightElement(block); });
  document.getElementById('content').scrollTop = 0;
  if (window.innerWidth <= 768) closeSidebar();
}

function ensureVisible(el) {
  var p = el.closest('.file-list');
  if (p && !p.classList.contains('open')) { p.classList.add('open'); var h = p.previousElementSibling; if (h) h.classList.add('expanded'); }
  p = el.closest('.subcategory');
  if (p && !p.classList.contains('open')) p.classList.add('open');
  var c = el.closest('.subcategory-container');
  if (c) { var ch = c.previousElementSibling; if (ch && !ch.classList.contains('expanded')) ch.classList.add('expanded'); }
}

function handleSearch() {
  var query = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = query ? 'block' : 'none';
  var infoEl = document.getElementById('searchResultsInfo');
  if (!query) {
    infoEl.classList.remove('visible');
    document.querySelectorAll('.file-item').forEach(function(el) {
      el.style.display = '';
      el.querySelector('.file-name').innerHTML = el.querySelector('.file-name').getAttribute('title');
    });
    document.querySelectorAll('.category').forEach(function(el) { el.style.display = ''; });
    document.querySelectorAll('.subcategory').forEach(function(el) { el.style.display = ''; });
    return;
  }
  var matchCount = 0;
  var matchedCats = new Set();
  document.querySelectorAll('.file-item').forEach(function(el) {
    var idx = parseInt(el.dataset.idx);
    var file = ALL_FILES[idx];
    var nameMatch = file.name.toLowerCase().indexOf(query) !== -1;
    var descMatch = file.desc.toLowerCase().indexOf(query) !== -1;
    var contentMatch = file.content.toLowerCase().indexOf(query) !== -1;
    if (nameMatch || descMatch || contentMatch) {
      el.style.display = ''; matchCount++; matchedCats.add(el.closest('.category'));
      var nameEl = el.querySelector('.file-name');
      nameEl.innerHTML = nameMatch ? highlightText(file.name, query) : escHtml(file.name);
    } else { el.style.display = 'none'; }
  });
  document.querySelectorAll('.category').forEach(function(cat) {
    if (matchedCats.has(cat)) {
      cat.style.display = '';
      var h = cat.querySelector('.category-header');
      if (!h.classList.contains('expanded')) {
        h.classList.add('expanded');
        cat.querySelectorAll('.subcategory').forEach(function(s) { s.classList.add('open'); });
        cat.querySelectorAll('.file-list').forEach(function(f) { f.classList.add('open'); });
        cat.querySelectorAll('.subcategory-header').forEach(function(sh) { sh.classList.add('expanded'); });
      }
    } else { cat.style.display = 'none'; }
  });
  infoEl.textContent = '找到 ' + matchCount + ' 个匹配文件';
  infoEl.classList.add('visible');
}

function highlightText(text, query) {
  var escaped = escHtml(text);
  var regex = new RegExp('(' + escapeRegex(escHtml(query)) + ')', 'gi');
  return escaped.replace(regex, '<span class="highlight-match">$1</span>');
}

function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function clearSearch() { document.getElementById('searchInput').value = ''; handleSearch(); }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('overlay').classList.toggle('visible');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').classList.remove('visible');
}

marked.setOptions({ breaks:true, gfm:true, headerIds:true, mangle:false });

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') { clearSearch(); document.getElementById('searchInput').blur(); }
});

init();
</script>
</body>
</html>
